openapi: 3.1.0
info:
  title: LiteLLM API 文档
  description: 自建 LiteLLM 网关的 API 文档，完全兼容 OpenAI 格式。
  version: 1.11.0
servers:
  - url: 'https://aillm.nscloud.ai'
    description: 国际服务器
tags:
  - name: chat_completions
    x-page-title: 对话生成
    x-page-icon: message
    description: 对话生成相关的 API，包括聊天补全和文本补全
  - name: embeddings
    x-page-title: 向量嵌入
    x-page-icon: database
    description: 向量嵌入相关的 API，用于生成文本的向量表示
  - name: image_generations
    x-page-title: 图片生成
    x-page-icon: image
    description: 图片生成相关的 API，根据文本提示生成图像
  - name: image_edits
    x-page-title: 图片编辑
    x-page-icon: edit
    description: 图片编辑相关的 API，根据原始图像和提示创建编辑后的图像
  - name: audio_transcriptions
    x-page-title: 音频转录
    x-page-icon: microphone
    description: 音频转录相关的 API，将音频文件转录为文本
  - name: chat_completions_dashscope
    x-parent: chat_completions
    x-page-title: DashScope
    x-page-icon: brain
    description: DashScope 的对话生成 API
  - name: completions_dashscope
    x-parent: chat_completions
    x-page-title: DashScope
    x-page-icon: brain
    description: DashScope 的文本补全 API
  - name: messages_dashscope
    x-parent: chat_completions
    x-page-title: DashScope
    x-page-icon: brain
    description: DashScope 的 Messages 协议 API
  - name: responses_dashscope
    x-parent: chat_completions
    x-page-title: DashScope
    x-page-icon: brain
    description: DashScope 的 Responses 协议 API
  - name: image_generations_dashscope
    x-parent: image_generations
    x-page-title: DashScope
    x-page-icon: image
    description: DashScope 的图像生成 API
  - name: image_edits_dashscope
    x-parent: image_edits
    x-page-title: DashScope
    x-page-icon: image
    description: DashScope 的图像编辑 API
  - name: audio_transcriptions_dashscope
    x-parent: audio_transcriptions
    x-page-title: DashScope
    x-page-icon: mic
    description: DashScope 的音频转录 API
paths:
  /v1/chat/completions:
    post:
      tags:
        - chat_completions_dashscope
      summary: 创建聊天补全
      description: 基于输入的消息，生成模型回复。与 OpenAI 的 Chat API 完全兼容。
      operationId: createChatCompletion_dashscope
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChatCompletionRequest'
            examples:
              default:
                summary: 基础
                description: 一个简单的对话示例，包含系统提示和用户消息。
                value:
                  model: MiniMax-M2.5
                  messages:
                    - role: system
                      content: You are a helpful assistant.
                    - role: user
                      content: Hello!
                  temperature: 1
                  max_completion_tokens: 50
                  'n': 1
                  stream: false
              streaming:
                summary: 流式
                description: '通过设置 stream: true 启用流式响应。'
                value:
                  model: MiniMax-M2.5
                  messages:
                    - role: system
                      content: You are a helpful assistant.
                    - role: user
                      content: Tell me a story.
                  temperature: 0.7
                  max_completion_tokens: 100
                  stream: true
              image_input:
                summary: 图像输入（多模态）
                description: 使用支持视觉的模型分析图像。
                value:
                  model: MiniMax-M2.5
                  messages:
                    - role: user
                      content:
                        - type: text
                          text: What is in this image?
                        - type: image_url
                          image_url:
                            url: 'https://ark-project.tos-cn-beijing.volces.com/doc_image/seedream4_5_imageToimage.png'
                  max_completion_tokens: 300
              functions:
                summary: 函数调用
                description: 定义工具（函数）并让模型决定是否调用。
                value:
                  model: MiniMax-M2.5
                  messages:
                    - role: user
                      content: Read the content of the file report.txt
                  tools:
                    - type: function
                      function:
                        name: read_file
                        description: Read the content of a file
                        parameters:
                          type: object
                          properties:
                            file_path:
                              type: string
                              description: The path to the file to read
                          required:
                            - file_path
                  tool_choice: auto
                  max_completion_tokens: 150
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionResponse'
              examples:
                default-response:
                  summary: 基础响应
                  description: 对应基础聊天请求的响应示例。
                  value:
                    id: chatcmpl-BPzJw3iWI2jtsjCnR0rRCBvLCETq7
                    created: 1773197421
                    model: MiniMax-M2.5
                    object: chat.completion
                    choices:
                      - index: 0
                        message:
                          role: assistant
                          content: 'Hi! How can I help today? I can answer questions, explain topics, brainstorm ideas, write or edit text, solve problems, or analyze images.'
                        finish_reason: stop
                    usage:
                      completion_tokens: 174
                      prompt_tokens: 8
                      total_tokens: 182
                      completion_tokens_details:
                        reasoning_tokens: 128
                image_input-response:
                  summary: 图像输入响应
                  description: 模型根据图像内容生成的描述。
                  value:
                    id: chatcmpl-s71Ce6GRN8PzAOB0PbVmNFGdSlGjS
                    created: 1773197559
                    model: MiniMax-M2.5
                    object: chat.completion
                    choices:
                      - index: 0
                        message:
                          role: assistant
                          content: 'The image shows a person posing in a studio setup against a white backdrop, wearing a shiny, chrome-like metallic outfit with spiky, futuristic elements (including headpiece/hair). The face area is blurred/pixelated.'
                        finish_reason: stop
                    usage:
                      completion_tokens: 49
                      prompt_tokens: 704
                      total_tokens: 753
                functions-response:
                  summary: 函数调用响应
                  description: 模型返回一个函数调用请求。
                  value:
                    id: chatcmpl-ZjQIwmTgiAmyXrAeTCcoNXvvqiprq
                    created: 1773197541
                    model: MiniMax-M2.5
                    object: chat.completion
                    choices:
                      - index: 0
                        message:
                          role: assistant
                          content: 'I can''t directly access or read files on your system. If you''d like to share the content of report.txt, you can copy and paste it here, and I''ll help you analyze or work with it.'
                        finish_reason: stop
                    usage:
                      completion_tokens: 74
                      prompt_tokens: 13
                      total_tokens: 87
            text/event-stream:
              schema:
                type: string
                description: '流式响应以 Server-Sent Events 格式返回，每个事件是一行以 ''data: '' 开头的 JSON 数据块，最后以 ''data: [DONE]'' 结束。'
              examples:
                streaming-response:
                  summary: 流式响应示例
                  description: 展示流式聊天过程中陆续发送的事件。
                  value: |
                    data: {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"MiniMax-M2.5","choices":[{"index":0,"delta":{"role":"assistant"},"finish_reason":null}]}
                    data: {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"MiniMax-M2.5","choices":[{"index":0,"delta":{"content":"Hello"},"finish_reason":null}]}
                    data: {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"MiniMax-M2.5","choices":[{"index":0,"delta":{"content":" there!"},"finish_reason":null}]}
                    data: {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"MiniMax-M2.5","choices":[{"index":0,"delta":{},"finish_reason":"stop"}]}
                    data: [DONE]
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
  /v1/completions:
    post:
      tags:
        - completions_dashscope
      summary: 创建文本补全
      description: 基于提供的提示，生成一个或多个补全结果。与 OpenAI 的 Completions API 兼容。
      operationId: createCompletion_dashscope
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCompletionRequest'
            examples:
              default:
                summary: 基础
                description: 一个简单的文本补全示例。
                value:
                  model: MiniMax-M2.5
                  prompt: Once upon a time
                  max_tokens: 50
                  temperature: 0.7
                  'n': 1
                  stream: false
              streaming:
                summary: 流式
                description: '通过设置 stream: true 启用流式响应。'
                value:
                  model: MiniMax-M2.5
                  prompt: The future of AI is
                  max_tokens: 30
                  temperature: 0.8
                  stream: true
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompletionResponse'
              examples:
                default-response:
                  summary: 基础响应
                  description: 对应基础文本补全请求的响应示例。
                  value:
                    id: cmpl-123
                    object: text_completion
                    created: 1677652288
                    model: MiniMax-M2.5
                    choices:
                      - text: ' in a small village, there lived a young girl named Lily.'
                        index: 0
                        finish_reason: length
                    usage:
                      prompt_tokens: 4
                      completion_tokens: 12
                      total_tokens: 16
            text/event-stream:
              schema:
                type: string
                description: '流式响应以 Server-Sent Events 格式返回，每个事件是一行以 ''data: '' 开头的 JSON 数据块，最后以 ''data: [DONE]'' 结束。'
              examples:
                streaming-response:
                  summary: 流式响应示例
                  description: 展示流式文本补全过程中陆续发送的事件。
                  value: |
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"MiniMax-M2.5","choices":[{"text":"The","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"MiniMax-M2.5","choices":[{"text":" future","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"MiniMax-M2.5","choices":[{"text":" of","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"MiniMax-M2.5","choices":[{"text":" AI","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"MiniMax-M2.5","choices":[{"text":" is","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"MiniMax-M2.5","choices":[{"text":" bright","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"MiniMax-M2.5","choices":[{"text":".","index":0,"finish_reason":"length"}]}
                    data: [DONE]
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
  /v1/messages:
    post:
      tags:
        - messages_dashscope
      summary: 创建 Messages 消息
      description: 使用 Anthropic Messages 兼容格式创建消息响应。
      operationId: createMessage_dashscope
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - model
                - messages
              properties:
                model:
                  type: string
                messages:
                  type: array
                  items:
                    type: object
                    required:
                      - role
                      - content
                    properties:
                      role:
                        type: string
                      content:
                        oneOf:
                          - type: string
                          - type: array
                            items:
                              type: object
                max_tokens:
                  type: integer
                stream:
                  type: boolean
                  default: false
            examples:
              default:
                summary: 基础
                value:
                  model: qwen3.6-flash
                  messages:
                    - role: user
                      content: Hello
                  max_tokens: 128
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              examples:
                default:
                  summary: 基础响应
                  value:
                    id: msg_123
                    type: message
                    role: assistant
                    model: qwen3.6-flash
                    content:
                      - type: text
                        text: Hello! How can I help you today?
                    stop_reason: end_turn
                    usage:
                      input_tokens: 12
                      output_tokens: 9
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
  /v1/responses:
    post:
      tags:
        - responses_dashscope
      summary: 创建 Responses 响应
      description: 使用 OpenAI Responses 兼容格式创建模型响应。
      operationId: createResponse_dashscope
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - model
                - input
              properties:
                model:
                  type: string
                input:
                  oneOf:
                    - type: string
                    - type: array
                      items:
                        type: object
                stream:
                  type: boolean
                  default: false
            examples:
              default:
                summary: 基础
                value:
                  model: qwen3.6-flash
                  input: Hello
                  stream: false
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              examples:
                default:
                  summary: 基础响应
                  value:
                    id: resp_123
                    object: response
                    model: qwen3.6-flash
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
  /v1/images/generations:
    post:
      tags:
        - image_generations_dashscope
      summary: 创建图像
      description: 根据文本提示生成图像。与 OpenAI 的 Images API 兼容。
      operationId: createImageGeneration_dashscope
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateImageGenerationRequest'
            examples:
              default:
                summary: 基础
                description: 生成一张 1024x1024 的图像。
                value:
                  model: qwen-image-2.0
                  prompt: A cute cat sitting on a windowsill
                  'n': 1
                  size: 1024x1024
              hd-quality:
                summary: 高清质量
                description: 生成高清质量的图像。
                value:
                  model: qwen-image-2.0
                  prompt: A futuristic cityscape at sunset
                  'n': 1
                  quality: hd
                  size: 1792x1024
              b64-json:
                summary: Base64 格式
                description: 返回 base64 编码的图像数据。
                value:
                  model: qwen-image-2.0
                  prompt: A beautiful landscape
                  'n': 2
                  size: 512x512
                  response_format: b64_json
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponse'
              examples:
                default-response:
                  summary: 基础响应
                  description: 返回包含图像 URL 和可选字段的完整响应。
                  value:
                    created: 1680000000
                    background: opaque
                    output_format: png
                    quality: high
                    size: 1024x1024
                    data:
                      - url: 'https://example.com/images/cat.png'
                        revised_prompt: 'A cute cat sitting on a windowsill, looking out at a garden'
                    usage:
                      total_tokens: 100
                      input_tokens: 50
                      output_tokens: 50
                      input_tokens_details:
                        text_tokens: 10
                        image_tokens: 40
                b64-response:
                  summary: Base64 响应
                  description: 返回包含 base64 编码图像数据和可选字段的响应。
                  value:
                    created: 1680000001
                    background: opaque
                    output_format: png
                    quality: high
                    size: 1024x1024
                    data:
                      - b64_json: iVBORw0KGgoAAAANSUhEUgAA...
                        revised_prompt: A beautiful landscape with mountains and a lake
                      - b64_json: iVBORw0KGgoAAAANSUhEUgAA...
                    usage:
                      total_tokens: 200
                      input_tokens: 100
                      output_tokens: 100
                      input_tokens_details:
                        text_tokens: 20
                        image_tokens: 80
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
  /v1/images/edits:
    post:
      tags:
        - image_edits_dashscope
      summary: 编辑图像
      description: 根据原始图像和文本提示创建编辑后的图像。与 OpenAI 的 Images API 兼容。
      operationId: createImageEdit_dashscope
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateImageEditRequest'
            encoding:
              images:
                style: form
                explode: true
            examples:
              with-mask:
                summary: 带蒙版
                description: 使用图像、蒙版和提示进行编辑。
                value:
                  model: qwen-image-2.0
                  images:
                    - '@person.png'
                  mask: '@mask.png'
                  prompt: Add a hat to the person
                  'n': 1
                  size: 1024x1024
              no-mask:
                summary: 无蒙版
                description: 仅使用图像和提示进行编辑。
                value:
                  model: qwen-image-2.0
                  images:
                    - '@body-lotion.png'
                  prompt: Change the background to a beach
                  'n': 1
                  size: 1024x1024
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponse'
              examples:
                default-response:
                  summary: 编辑响应
                  description: 返回编辑后的图像及相关元数据。
                  value:
                    created: 1680000002
                    background: opaque
                    output_format: png
                    quality: high
                    size: 1024x1024
                    data:
                      - url: 'https://example.com/images/edited.png'
                        revised_prompt: 'A person with a hat, standing in a sunny park'
                    usage:
                      total_tokens: 120
                      input_tokens: 60
                      output_tokens: 60
                      input_tokens_details:
                        text_tokens: 12
                        image_tokens: 48
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
  /v1/audio/transcriptions:
    post:
      tags:
        - audio_transcriptions_dashscope
      summary: 音频转录
      description: 将音频文件转录为文本。与 OpenAI 的 Audio API 兼容。
      operationId: createTranscription_dashscope
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateTranscriptionRequest'
            examples:
              default:
                summary: 基础
                description: 将音频文件转录为 JSON 格式。
                value:
                  model: qwen3-asr-flash
                  file: (binary)
                  response_format: json
              with-timestamps:
                summary: 带时间戳
                description: 获取包含单词级时间戳的详细转录。
                value:
                  model: qwen3-asr-flash
                  file: (binary)
                  response_format: verbose_json
                  timestamp_granularities:
                    - word
              srt-format:
                summary: SRT 字幕
                description: 以 SRT 字幕格式返回转录。
                value:
                  model: qwen3-asr-flash
                  file: (binary)
                  response_format: srt
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranscriptionResponse'
              examples:
                json-response:
                  summary: JSON 响应
                  description: 默认的 JSON 格式转录。
                  value:
                    text: 'Hello, this is a test transcription.'
                verbose-json-response:
                  summary: 详细 JSON 响应
                  description: 包含单词级时间戳的详细转录。
                  value:
                    task: transcribe
                    language: english
                    duration: 2.95
                    text: 'Hello, this is a test transcription.'
                    words:
                      - word: Hello
                        start: 0.1
                        end: 0.5
                      - word: this
                        start: 0.6
                        end: 0.8
                      - word: is
                        start: 0.9
                        end: 1
                      - word: a
                        start: 1.1
                        end: 1.2
                      - word: test
                        start: 1.3
                        end: 1.8
                      - word: transcription
                        start: 1.9
                        end: 2.8
            application/x-srt:
              schema:
                type: string
                description: SRT 字幕格式的转录。
              examples:
                srt-response:
                  summary: SRT 响应
                  value: |
                    1
                    00:00:00,100 --> 00:00:00,500
                    Hello

                    2
                    00:00:00,600 --> 00:00:00,800
                    this

                    3
                    00:00:00,900 --> 00:00:01,000
                    is

                    4
                    00:00:01,100 --> 00:00:01,200
                    a

                    5
                    00:00:01,300 --> 00:00:01,800
                    test

                    6
                    00:00:01,900 --> 00:00:02,800
                    transcription
            text/plain:
              schema:
                type: string
                description: 纯文本格式的转录。
              examples:
                text-response:
                  summary: 纯文本响应
                  value: 'Hello, this is a test transcription.'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
components:
  schemas:
    CreateChatCompletionRequest:
      type: object
      properties:
        model:
          type: string
          description: 要使用的模型 ID
        messages:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
                enum:
                  - system
                  - user
                  - assistant
                  - tool
              content:
                oneOf:
                  - type: string
                  - type: array
                    items:
                      oneOf:
                        - type: object
                          properties:
                            type:
                              type: string
                              enum:
                                - text
                            text:
                              type: string
                          required:
                            - type
                            - text
                        - type: object
                          properties:
                            type:
                              type: string
                              enum:
                                - image_url
                            image_url:
                              type: object
                              properties:
                                url:
                                  type: string
                              required:
                                - url
                          required:
                            - type
                            - image_url
            required:
              - role
              - content
        temperature:
          type: number
