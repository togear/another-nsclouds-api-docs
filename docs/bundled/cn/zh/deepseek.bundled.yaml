openapi: 3.1.0
info:
  title: LiteLLM API 文档
  description: 自建 LiteLLM 网关的 API 文档，完全兼容 OpenAI 格式。
  version: 1.11.0
servers:
  - url: 'https://aillm.nsclouds.com'
    description: 国内服务器
tags:
  - name: chat_completions
    x-page-title: 对话生成
    x-page-icon: message
    description: 对话生成相关的 API，包括聊天补全和文本补全
  - name: embeddings
    x-page-title: 向量嵌入
    x-page-icon: database
    description: 向量嵌入相关的 API，用于生成文本的向量表示
  - name: image_generations
    x-page-title: 图片生成
    x-page-icon: image
    description: 图片生成相关的 API，根据文本提示生成图像
  - name: image_edits
    x-page-title: 图片编辑
    x-page-icon: edit
    description: 图片编辑相关的 API，根据原始图像和提示创建编辑后的图像
  - name: audio_transcriptions
    x-page-title: 音频转录
    x-page-icon: microphone
    description: 音频转录相关的 API，将音频文件转录为文本
  - name: chat_completions_deepseek
    x-parent: chat_completions
    x-page-title: DeepSeek
    x-page-icon: brain
    description: DeepSeek 的对话生成 API
  - name: completions_deepseek
    x-parent: chat_completions
    x-page-title: DeepSeek
    x-page-icon: brain
    description: DeepSeek 的文本补全 API
  - name: messages_deepseek
    x-parent: chat_completions
    x-page-title: DeepSeek
    x-page-icon: brain
    description: DeepSeek 的 Messages 协议 API
  - name: responses_deepseek
    x-parent: chat_completions
    x-page-title: DeepSeek
    x-page-icon: brain
    description: DeepSeek 的 Responses 协议 API
paths:
  /v1/chat/completions:
    post:
      tags:
        - chat_completions_deepseek
      summary: 创建聊天补全
      description: 基于输入的消息，生成模型回复。与 OpenAI 的 Chat API 完全兼容。
      operationId: createChatCompletion_deepseek
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChatCompletionRequest'
            examples:
              default:
                summary: 基础
                description: 一个简单的对话示例，包含系统提示和用户消息。
                value:
                  model: deepseek-r1
                  messages:
                    - role: system
                      content: You are a helpful assistant.
                    - role: user
                      content: Hello!
                  temperature: 1
                  max_completion_tokens: 50
                  'n': 1
                  stream: false
              streaming:
                summary: 流式
                description: '通过设置 stream: true 启用流式响应。'
                value:
                  model: deepseek-r1
                  messages:
                    - role: user
                      content: Hello!
                  stream: true
              image_input:
                summary: 图像输入（多模态）
                description: 使用支持视觉的模型分析图像。
                value:
                  model: deepseek-r1
                  messages:
                    - role: user
                      content:
                        - type: text
                          text: What is in this image?
                        - type: image_url
                          image_url:
                            url: 'https://ark-project.tos-cn-beijing.volces.com/doc_image/seedream4_5_imageToimage.png'
                  max_completion_tokens: 300
              functions:
                summary: 函数调用
                description: 定义工具（函数）并让模型决定是否调用。
                value:
                  model: deepseek-r1
                  messages:
                    - role: user
                      content: What is the weather in Boston?
                  tools:
                    - type: function
                      function:
                        name: get_current_weather
                        description: Get the current weather in a given location
                        parameters:
                          type: object
                          properties:
                            location:
                              type: string
                              description: 'The city and state, e.g. San Francisco, CA'
                            unit:
                              type: string
                              enum:
                                - celsius
                                - fahrenheit
                          required:
                            - location
                  tool_choice: auto
                  max_completion_tokens: 150
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionResponse'
              examples:
                default-response:
                  summary: 基础响应
                  description: 对应基础聊天请求的响应示例。
                  value:
                    id: chatcmpl-cdc11700-f52c-99a3-866c-cfac2a0b254c
                    object: chat.completion
                    created: 1772859125
                    model: deepseek-r1
                    choices:
                      - index: 0
                        message:
                          role: assistant
                          content: "Hello! How can I help you today? \U0001F60A"
                        finish_reason: stop
                    usage:
                      prompt_tokens: 15
                      completion_tokens: 11
                      total_tokens: 26
                image_input-response:
                  summary: 图像输入响应
                  description: 模型根据图像内容生成的描述。
                  value:
                    id: chatcmpl-856cd72d-f840-92da-a0b3-65f0061ac378
                    object: chat.completion
                    created: 1772861532
                    model: deepseek-r1
                    choices:
                      - index: 0
                        message:
                          role: assistant
                          content: |-
                            Of course. This is an image of a stylized, cartoon-style drawing of a **dragon wearing a backpack and holding a walking stick**.

                            Here are the details:

                            *   **Main Subject:** A friendly-looking dragon.
                            *   **Attire/Accessories:**
                                *   It's wearing a **backpack** with a strap across its chest.
                                *   It's holding a long **walking stick** or trekking pole in its right hand (claw).
                            *   **Setting:** The dragon appears to be on a journey or hike, walking on a simple ground line.
                            *   **Style:** The image is a black and white line drawing, likely intended as a coloring page for children. The lines are clear and simple, making it easy to color.

                            In short, it's an illustration of an adventurous dragon, ready for a hike or a quest.
                        finish_reason: stop
                    usage:
                      prompt_tokens: 13
                      completion_tokens: 179
                      total_tokens: 192
                functions-response:
                  summary: 函数调用响应
                  description: 模型返回一个函数调用请求。
                  value:
                    id: chatcmpl-7709ac0a-5dc2-9791-81ef-1364bf331761
                    object: chat.completion
                    created: 1772861551
                    model: deepseek-r1
                    choices:
                      - index: 0
                        message:
                          role: assistant
                          content: I'll check the current weather in Boston for
                          tool_calls:
                            - id: chatcmpl-tool-6701c1adf7ab40b598c423c3530190b9
                              type: function
                              function:
                                name: get_current_weather
                                arguments: '{"location": "Boston, MA"}'
                        finish_reason: tool_calls
                    usage:
                      prompt_tokens: 198
                      completion_tokens: 28
                      total_tokens: 226
            text/event-stream:
              schema:
                type: string
                description: '流式响应以 Server-Sent Events 格式返回，每个事件是一行以 ''data: '' 开头的 JSON 数据块，最后以 ''data: [DONE]'' 结束。'
              examples:
                streaming-response:
                  summary: 流式响应示例
                  description: 展示流式聊天过程中陆续发送的事件。
                  value: "data: {\"id\":\"chatcmpl-2e08cd46-ddf8-9aef-bce0-f94395447528\",\"object\":\"chat.completion.chunk\",\"created\":1772861378,\"model\":\"deepseek-r1\",\"choices\":[{\"index\":0,\"delta\":{\"content\":\"Hello\",\"role\":\"assistant\"}}]}\ndata: {\"id\":\"chatcmpl-2e08cd46-ddf8-9aef-bce0-f94395447528\",\"object\":\"chat.completion.chunk\",\"created\":1772861378,\"model\":\"deepseek-r1\",\"choices\":[{\"index\":0,\"delta\":{\"content\":\"! How\"}}]}\ndata: {\"id\":\"chatcmpl-2e08cd46-ddf8-9aef-bce0-f94395447528\",\"object\":\"chat.completion.chunk\",\"created\":1772861378,\"model\":\"deepseek-r1\",\"choices\":[{\"index\":0,\"delta\":{\"content\":\" can I help\"}}]}\ndata: {\"id\":\"chatcmpl-2e08cd46-ddf8-9aef-bce0-f94395447528\",\"object\":\"chat.completion.chunk\",\"created\":1772861378,\"model\":\"deepseek-r1\",\"choices\":[{\"index\":0,\"delta\":{\"content\":\" you today\"}}]}\ndata: {\"id\":\"chatcmpl-2e08cd46-ddf8-9aef-bce0-f94395447528\",\"object\":\"chat.completion.chunk\",\"created\":1772861378,\"model\":\"deepseek-r1\",\"choices\":[{\"index\":0,\"delta\":{\"content\":\"? \U0001F60A\"}}]}\ndata: {\"id\":\"chatcmpl-2e08cd46-ddf8-9aef-bce0-f94395447528\",\"object\":\"chat.completion.chunk\",\"created\":1772861378,\"model\":\"deepseek-r1\",\"choices\":[{\"finish_reason\":\"stop\",\"index\":0,\"delta\":{}}]}\ndata: [DONE]\n"
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
  /v1/completions:
    post:
      tags:
        - completions_deepseek
      summary: 创建文本补全
      description: 基于提供的提示，生成一个或多个补全结果。与 OpenAI 的 Completions API 兼容。
      operationId: createCompletion_deepseek
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCompletionRequest'
            examples:
              default:
                summary: 基础
                description: 一个简单的文本补全示例。
                value:
                  model: deepseek-r1
                  prompt: Say this is a test
                  max_tokens: 7
                  temperature: 0
                  'n': 1
                  stream: false
              streaming:
                summary: 流式
                description: '通过设置 stream: true 启用流式响应。'
                value:
                  model: deepseek-r1
                  prompt: Say this is a test
                  max_tokens: 7
                  temperature: 0
                  stream: true
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompletionResponse'
              examples:
                default-response:
                  summary: 基础响应
                  description: 对应基础文本补全请求的响应示例。
                  value:
                    id: 02177286136439468d44c5a45de4f1e59cc8a01ee3524bc4cf5a9
                    object: text_completion
                    created: 1772861365
                    model: deepseek-r1
                    choices:
                      - text: This is a test.
                        index: 0
                        finish_reason: stop
                    usage:
                      prompt_tokens: 10
                      completion_tokens: 6
                      total_tokens: 16
            text/event-stream:
              schema:
                type: string
                description: '流式响应以 Server-Sent Events 格式返回，每个事件是一行以 ''data: '' 开头的 JSON 数据块，最后以 ''data: [DONE]'' 结束。'
              examples:
                streaming-response:
                  summary: 流式响应示例
                  description: 展示流式文本补全过程中陆续发送的事件。
                  value: |
                    data: {"id":"02177286136439468d44c5a45de4f1e59cc8a01ee3524bc4cf5a9","object":"text_completion","created":1772861365,"model":"deepseek-r1","choices":[{"text":"This","index":0,"finish_reason":null}]}
                    data: {"id":"02177286136439468d44c5a45de4f1e59cc8a01ee3524bc4cf5a9","object":"text_completion","created":1772861365,"model":"deepseek-r1","choices":[{"text":" is","index":0,"finish_reason":null}]}
                    data: {"id":"02177286136439468d44c5a45de4f1e59cc8a01ee3524bc4cf5a9","object":"text_completion","created":1772861365,"model":"deepseek-r1","choices":[{"text":" a","index":0,"finish_reason":null}]}
                    data: {"id":"02177286136439468d44c5a45de4f1e59cc8a01ee3524bc4cf5a9","object":"text_completion","created":1772861365,"model":"deepseek-r1","choices":[{"text":" test","index":0,"finish_reason":null}]}
                    data: {"id":"02177286136439468d44c5a45de4f1e59cc8a01ee3524bc4cf5a9","object":"text_completion","created":1772861365,"model":"deepseek-r1","choices":[{"text":".","index":0,"finish_reason":"stop"}]}
                    data: [DONE]
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
  /v1/messages:
    post:
      tags:
        - messages_deepseek
      summary: 创建 Messages 消息
      description: 使用 Anthropic Messages 兼容格式创建消息响应。
      operationId: createMessage_deepseek
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - model
                - messages
              properties:
                model:
                  type: string
                messages:
                  type: array
                  items:
                    type: object
                    required:
                      - role
                      - content
                    properties:
                      role:
                        type: string
                      content:
                        oneOf:
                          - type: string
                          - type: array
                            items:
                              type: object
                max_tokens:
                  type: integer
                stream:
                  type: boolean
                  default: false
            examples:
              default:
                summary: 基础
                value:
                  model: deepseek-v4-flash
                  messages:
                    - role: user
                      content: Hello
                  max_tokens: 128
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              examples:
                default:
                  summary: 基础响应
                  value:
                    id: msg_123
                    type: message
                    role: assistant
                    model: deepseek-v4-flash
                    content:
                      - type: text
                        text: Hello! How can I help you today?
                    stop_reason: end_turn
                    usage:
                      input_tokens: 12
                      output_tokens: 9
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
  /v1/responses:
    post:
      tags:
        - responses_deepseek
      summary: 创建 Responses 响应
      description: 使用 OpenAI Responses 兼容格式创建模型响应。
      operationId: createResponse_deepseek
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - model
                - input
              properties:
                model:
                  type: string
                input:
                  oneOf:
                    - type: string
                    - type: array
                      items:
                        type: object
                stream:
                  type: boolean
                  default: false
            examples:
              default:
                summary: 基础
                value:
                  model: deepseek-v3.2
                  input: Hello
                  stream: false
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              examples:
                default:
                  summary: 基础响应
                  value:
                    id: resp_123
                    object: response
                    model: deepseek-v3.2
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
components:
  schemas:
    CreateChatCompletionRequest:
      type: object
      properties:
        model:
          type: string
          description: 要使用的模型 ID
        messages:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
                enum:
                  - system
                  - user
                  - assistant
                  - tool
              content:
                oneOf:
                  - type: string
                  - type: array
                    items:
                      oneOf:
                        - type: object
                          properties:
                            type:
                              type: string
                              enum:
                                - text
                            text:
                              type: string
                          required:
                            - type
                            - text
                        - type: object
                          properties:
                            type:
                              type: string
                              enum:
                                - image_url
                            image_url:
                              type: object
                              properties:
                                url:
                                  type: string
                              required:
                                - url
                          required:
                            - type
                            - image_url
            required:
              - role
              - content
        temperature:
          type: number
          default: 1
        max_completion_tokens:
          type: integer
        'n':
          type: integer
          default: 1
        stream:
          type: boolean
          default: false
      required:
        - model
        - messages
    ChatCompletionResponse:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
        created:
          type: integer
        model:
          type: string
        choices:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              message:
                type: object
                properties:
                  role:
                    type: string
                  content:
                    type:
                      - string
                      - 'null'
              finish_reason:
                type:
                  - string
                  - 'null'
        usage:
          type: object
          properties:
            prompt_tokens:
              type: integer
            completion_tokens:
              type: integer
            total_tokens:
              type: integer
    CreateCompletionRequest:
      type: object
      properties:
        model:
          type: string
          description: 要使用的模型 ID
        prompt:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        temperature:
          type: number
          default: 1
        max_tokens:
          type: integer
        'n':
          type: integer
          default: 1
        stream:
          type: boolean
          default: false
      required:
        - model
        - prompt
    CompletionResponse:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
        created:
          type: integer
        model:
          type: string
        choices:
          type: array
          items:
            type: object
            properties:
              text:
                type: string
              index:
                type: integer
              finish_reason:
                type:
                  - string
                  - 'null'
        usage:
          type: object
          properties:
            prompt_tokens:
              type: integer
            completion_tokens:
              type: integer
            total_tokens:
              type: integer
    CreateEmbeddingRequest:
      type: object
      properties:
        model:
          type: string
          description: 要使用的模型 ID
        input:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        encoding_format:
          type: string
          enum:
            - float
            - base64
          default: float
        dimensions:
          type: integer
      required:
        - model
        - input
    EmbeddingResponse:
      type: object
      properties:
        object:
          type: string
        data:
          type: array
          items:
            type: object
            properties:
              object:
                type: string
              embedding:
                oneOf:
                  - type: array
                    items:
                      type: number
                  - type: string
              index:
                type: integer
        model:
          type: string
        usage:
          type: object
          properties:
            prompt_tokens:
              type: integer
            total_tokens:
              type: integer
    CreateImageGenerationRequest:
      type: object
      properties:
        model:
          type: string
          description: 要使用的模型 ID
        prompt:
          type: string
          description: 生成图像的文本提示
        'n':
          type: integer
          default: 1
        size:
          type: string
          default: 1024x1024
        quality:
          type: string
          enum:
            - standard
            - hd
          default: standard
        response_format:
          type: string
          enum:
            - url
            - b64_json
          default: url
      required:
        - model
        - prompt
    CreateImageEditRequest:
      type: object
      properties:
        model:
          type: string
          description: 要使用的模型 ID
        'image[]':
          type: array
          items:
            type: string
            format: binary
          description: 要编辑的图像文件
        mask:
          type: string
          format: binary
          description: 可选的蒙版文件
        prompt:
          type: string
          description: 编辑图像的文本提示
        'n':
          type: integer
          default: 1
        size:
          type: string
          default: 1024x1024
        response_format:
          type: string
          enum:
            - url
            - b64_json
          default: url
      required:
        - model
        - 'image[]'
        - prompt
    ImageResponse:
      type: object
      properties:
        created:
          type: integer
        data:
          type: array
          items:
            type: object
            properties:
              url:
                type: string
              b64_json:
                type: string
              revised_prompt:
                type: string
        background:
          type: string
        output_format:
          type: string
        quality:
          type: string
        size:
          type: string
        usage:
          type: object
          properties:
            total_tokens:
              type: integer
            input_tokens:
              type: integer
            output_tokens:
              type: integer
    CreateTranscriptionRequest:
      type: object
      properties:
        model:
          type: string
          description: 要使用的模型 ID
        file:
          type: string
          format: binary
          description: 要转录的音频文件
        language:
          type: string
          description: 音频的语言代码（可选）
        prompt:
          type: string
          description: 可选的提示，用于指导模型的风格或内容
        response_format:
          type: string
          enum:
            - json
            - text
            - srt
            - verbose_json
            - vtt
          default: json
        temperature:
          type: number
          default: 0
      required:
        - model
        - file
    TranscriptionResponse:
      type: object
      properties:
        text:
          type: string
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            message:
              type: string
            type:
              type: string
            param:
              type:
                - string
                - 'null'
            code:
              type:
                - string
                - 'null'
  securitySchemes:
    APIKeyHeader:
      type: http
      scheme: bearer
      description: 使用 Bearer 令牌进行认证，格式：'Bearer YOUR_SECRET_TOKEN'
  responses:
    ErrorResponse:
      description: 错误响应
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
