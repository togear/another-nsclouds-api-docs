openapi: 3.1.0
info:
  title: NSCloud AI API Documentation
  description: API documentation for OpenAI-compatible and provider-compatible AI endpoints.
  version: 1.11.0
servers:
  - url: 'https://aillm.nsclouds.com'
    description: China Server
tags:
  - name: chat_completions
    x-page-title: Chat Completions
    x-page-icon: message
    description: Chat completion related APIs.
  - name: embeddings
    x-page-title: Embeddings
    x-page-icon: database
    description: Embedding related APIs for generating vector representations of text
  - name: image_generations
    x-page-title: Image Generations
    x-page-icon: image
    description: Image generation related APIs for creating images from text prompts
  - name: image_edits
    x-page-title: Image Edits
    x-page-icon: edit
    description: Image editing related APIs for creating edited images from original images and prompts
  - name: audio_transcriptions
    x-page-title: Audio Transcriptions
    x-page-icon: microphone
    description: Audio transcription related APIs for transcribing audio files to text
  - name: chat_completions_volcengine
    x-parent: chat_completions
    x-page-title: Volcengine
    x-page-icon: brain
    description: Volcengine's chat completions API
  - name: responses_volcengine
    x-parent: chat_completions
    x-page-title: Volcengine
    x-page-icon: brain
    description: Volcengine's Responses API
  - name: image_generations_volcengine
    x-parent: image_generations
    x-page-title: Volcengine
    x-page-icon: image
    description: Volcengine's image generations API
  - name: image_edits_volcengine
    x-parent: image_edits
    x-page-title: Volcengine
    x-page-icon: image
    description: Volcengine's image edits API
paths:
  /v1/chat/completions:
    post:
      tags:
        - chat_completions_volcengine
      summary: Create chat completion
      description: Provides an OpenAI-compatible Chat Completions endpoint. Supported parameters and behavior may vary by model.
      operationId: createChatCompletion_volcengine
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChatCompletionRequest'
            examples:
              default:
                summary: Basic
                description: A simple chat completion example.
                value:
                  model: doubao-seed-2-0-lite-260215
                  messages:
                    - role: user
                      content: Hello!
                  max_completion_tokens: 50
                  temperature: 0.7
                  'n': 1
                  stream: false
              streaming:
                summary: Streaming
                description: 'Enable streaming response by setting stream: true.'
                value:
                  model: doubao-seed-2-0-lite-260215
                  messages:
                    - role: user
                      content: Hello!
                  stream: true
              image_input:
                summary: Image Input (Multimodal)
                description: Use vision-enabled model to analyze images.
                value:
                  model: doubao-seed-2-0-lite-260215
                  messages:
                    - role: user
                      content:
                        - type: text
                          text: What is in this image?
                        - type: image_url
                          image_url:
                            url: 'https://ark-project.tos-cn-beijing.volces.com/doc_image/seedream4_5_imageToimage.png'
                  max_completion_tokens: 300
              functions:
                summary: Function Calling
                description: Define tools (functions) and let the model decide whether to call them.
                value:
                  model: doubao-seed-2-0-lite-260215
                  messages:
                    - role: user
                      content: What is the weather in Boston?
                  tools:
                    - type: function
                      function:
                        name: get_current_weather
                        description: Get the current weather in a given location
                        parameters:
                          type: object
                          properties:
                            location:
                              type: string
                              description: 'The city and state, e.g. San Francisco, CA'
                            unit:
                              type: string
                              enum:
                                - celsius
                                - fahrenheit
                          required:
                            - location
                  tool_choice: auto
                  max_completion_tokens: 150
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionResponse'
              examples:
                default-response:
                  summary: Basic Response
                  description: Response example corresponding to basic chat completion request.
                  value:
                    id: 021772864435690b7e0a86771f3aae54bdc5a127ef95baa9c2b48
                    object: chat.completion
                    created: 1772864438
                    model: doubao-seed-2-0-lite-260215
                    choices:
                      - index: 0
                        message:
                          role: assistant
                          content: "Hello there! \U0001F60A How can I assist you today?"
                          reasoning_content: "The user said \"Hello!\", so I need to respond with a friendly greeting. First, keep it natural and warm, like \"Hello there! \U0001F60A How can I assist you today?\" This both responds to the greeting and expresses willingness to help, which fits the AI's role. Let me check - the language is concise and friendly, with an emoji to make it more lively. That should work."
                        finish_reason: stop
                    usage:
                      prompt_tokens: 50
                      completion_tokens: 83
                      total_tokens: 133
                    service_tier: default
                image_input-response:
                  summary: Image Input Response
                  description: Model's description generated based on image content.
                  value:
                    id: 021772864507442454c0d8025bd4547674d07aeb10e65a37260a1
                    object: chat.completion
                    created: 1772864518
                    model: doubao-seed-2-0-lite-260215
                    choices:
                      - index: 0
                        message:
                          role: assistant
                          content: 'This is a futuristic, surreal, cyberpunk-style digital or 3D-rendered artwork: 1. The central subject is a humanoid figure, appearing feminine, posed dynamically with their head tilted back, arms outstretched, in front of a simple studio white backdrop on black support rigs. 2. The figure is covered in a **glossy, reflective liquid chrome/silver metallic substance** that forms an organic, fragmented "garment" with sharp, tendril-like, drippy edges, and also coats their head, forming spiky, wet-look "hair", arms, and hands. The material looks like it''s in a state of transformation, as if melting or solidifying onto the body. 3. The bright studio lighting emphasizes the highly reflective, polished surface of the metallic coating, creating strong highlights and deep shadows that give the material a viscous, molten appearance. 4. The overall aesthetic is sci-fi, futuristic high-fashion, with a biomechanical, otherworldly, almost "liquid metal being" vibe, recalling cyborg or synthetic entity concepts.'
                          reasoning_content: 'Got it, let''s break down this image. First, it''s a futuristic, cyberpunk-style 3D (or AI-generated) art piece of a figure (appears to be a woman) in a studio setting, in front of a white backdrop stand. The figure is covered in a **liquid-like, reflective metallic (silver/chrome) substance** that forms a fragmented, organic "dress" with sharp, tendril-like, drippy edges, and also covers her head (spiky, wet-looking chrome hair/coating) and parts of her arms. Her pose is dramatic: head tilted back, arms outstretched, looking upward, giving a sense of transformation or a futuristic, otherworldly vibe. The lighting is bright, studio-style, highlighting the reflective, glossy surface of the chrome material, creating strong highlights and shadows that emphasize the liquid, sculpted texture. The overall aesthetic is sci-fi, futuristic fashion, with a surreal, biomechanical/liquid metal feel, like a being made of or covered in a shifting, molten chrome substance.'
                        finish_reason: stop
                    usage:
                      prompt_tokens: 540
                      completion_tokens: 452
                      total_tokens: 992
                    service_tier: default
                functions-response:
                  summary: Function Call Response
                  description: Model returns a function call request.
                  value:
                    id: 02177286456308318cc8b35e794a1d5ce66758b690d3ae1fd30df
                    object: chat.completion
                    created: 1772864571
                    model: doubao-seed-2-0-lite-260215
                    choices:
                      - index: 0
                        message:
                          role: assistant
                          content: ''
                          tool_calls:
                            - id: call_xlu24zqz1ptz3git9mwjmn9x
                              type: function
                              function:
                                name: get_current_weather
                                arguments: ' {"location": "Boston, MA"}'
                          reasoning_content: 'Got it, let''s see. The user is asking about the weather in Boston. The function available is get_current_weather, which requires location and optionally unit. The location here is Boston, so I need to specify that. Wait, do I need to include state? The example uses "San Francisco, CA", but Boston is in Massachusetts, so maybe "Boston, MA" is better, but maybe just "Boston" works too? Wait, the function''s location parameter says city and state, but maybe if I just put Boston, it might still get it, but to be precise, I should include MA. Also, the unit isn''t specified by the user, so I can either leave it out (since it''s not required) or ask? Wait no, the required parameter is location, so unit is optional. So I can call the function with location "Boston, MA" and maybe not include unit, or let it default? Wait the function parameters say unit is optional, so I can omit it, but maybe the user would prefer a specific unit? But since they didn''t ask, I just call with location first. Let me structure the function call correctly. So the function name is get_current_weather, parameters location is "Boston, MA". Let me write that in the required format.'
                        finish_reason: tool_calls
                    usage:
                      prompt_tokens: 459
                      completion_tokens: 301
                      total_tokens: 760
                    service_tier: default
            text/event-stream:
              schema:
                type: string
                description: 'Streaming response is returned in Server-Sent Events format, each event is a line of JSON data block starting with ''data: '', ending with ''data: [DONE]''.'
              examples:
                streaming-response:
                  summary: Streaming Response Example
                  description: Shows events sent continuously during streaming chat process.
                  value: |
                    data: {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"doubao-seed-2-0-lite-260215","choices":[{"index":0,"delta":{"role":"assistant"},"finish_reason":null}]}
                    data: {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"doubao-seed-2-0-lite-260215","choices":[{"index":0,"delta":{"content":"Hello"},"finish_reason":null}]}
                    data: {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"doubao-seed-2-0-lite-260215","choices":[{"index":0,"delta":{"content":" there!"},"finish_reason":null}]}
                    data: {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"doubao-seed-2-0-lite-260215","choices":[{"index":0,"delta":{},"finish_reason":"stop"}]}
                    data: [DONE]
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
  /v1/responses:
    post:
      tags:
        - responses_volcengine
      summary: Create Response
      description: Provides an OpenAI-compatible Responses endpoint. Supported parameters and behavior may vary by model.
      operationId: createResponse_volcengine
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateResponseRequest'
            examples:
              default:
                summary: Basic
                description: A simple text-only Responses request.
                value:
                  model: doubao-seed-2-0-lite-260215
                  input: Hello
                  stream: false
              streaming:
                summary: Streaming
                description: Enable semantic event streaming by setting stream to true.
                value:
                  model: doubao-seed-2-0-lite-260215
                  input:
                    - role: user
                      content:
                        - type: input_text
                          text: Write a short welcome message for a new user.
                  stream: true
      responses:
        '200':
          description: Success Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseObject'
              examples:
                default:
                  summary: Basic Response
                  value:
                    id: resp_123
                    object: response
                    model: doubao-seed-2-0-lite-260215
                    output:
                      - id: msg_123
                        type: message
                        role: assistant
                        status: completed
                        content:
                          - type: output_text
                            text: Hello! How can I help you today?
                    usage:
                      input_tokens: 12
                      output_tokens: 9
                      total_tokens: 21
            text/event-stream:
              schema:
                type: string
                description: Responses streaming returns Server-Sent Events with typed semantic event payloads.
              examples:
                streaming-response:
                  summary: Streaming Response Example
                  description: Shows a minimal sequence of semantic events emitted during Responses streaming.
                  value: |
                    data: {"type":"response.created","sequence_number":0,"response":{"id":"resp_123","object":"response","created_at":1741487325,"status":"in_progress","model":"doubao-seed-2-0-lite-260215"}}
                    data: {"type":"response.output_text.delta","sequence_number":1,"item_id":"msg_123","output_index":0,"content_index":0,"delta":"Hello"}
                    data: {"type":"response.output_text.delta","sequence_number":2,"item_id":"msg_123","output_index":0,"content_index":0,"delta":" there!"}
                    data: {"type":"response.completed","sequence_number":3,"response":{"id":"resp_123","object":"response","created_at":1741487325,"status":"completed","model":"doubao-seed-2-0-lite-260215","output":[{"id":"msg_123","type":"message","role":"assistant","status":"completed","content":[{"type":"output_text","text":"Hello there!"}]}]}}
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
  /v1/images/generations:
    post:
      tags:
        - image_generations_volcengine
      summary: Generate image
      description: Provides an OpenAI-compatible Images generation endpoint. Supported capabilities may vary by model.
      operationId: createImage_volcengine
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateImageGenerationRequest'
            examples:
              default:
                summary: Basic
                description: A simple image generation example.
                value:
                  model: doubao-seedream-4-5-251128
                  prompt: A cat wearing a hat
                  'n': 1
                  size: 1024x1024
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponse'
              examples:
                default-response:
                  summary: Basic Response
                  description: Response example corresponding to basic image generation request.
                  value:
                    created: 1677825464
                    data:
                      - url: 'https://example.com/cat-hat.png'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
  /v1/images/edits:
    post:
      tags:
        - image_edits_volcengine
      summary: Edit image
      description: Provides an OpenAI-compatible Images editing endpoint. Supported capabilities may vary by model.
      operationId: createImageEdit_volcengine
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateImageEditRequest'
            examples:
              default:
                summary: Basic Image Editing
                description: Basic example of image editing.
                value:
                  model: doubao-seedream-4-5-251128
                  image:
                    - '@/path/to/image.png'
                  prompt: Add a hat to the cat
                  size: 1024x1024
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponse'
              examples:
                default-response:
                  summary: Basic Response
                  description: Response example corresponding to basic image editing request.
                  value:
                    created: 1677825464
                    data:
                      - url: 'https://example.com/edited-image.png'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
components:
  schemas:
    ChatMessageTextPart:
      type: object
      description: Text content part.
      properties:
        type:
          type: string
          description: Part type.
          enum:
            - text
        text:
          type: string
          description: Text content.
      required:
        - type
        - text
    ChatMessageImageUrl:
      type: object
      description: Image URL payload.
      properties:
        url:
          type: string
          description: Publicly accessible image URL or image data URL. Common image formats are supported; PNG may be used in examples.
        detail:
          type: string
          description: Optional image understanding detail level.
          enum:
            - auto
            - low
            - high
      required:
        - url
    ChatMessageImagePart:
      type: object
      description: Image input content part. Add multiple image_url parts to send multiple images.
      properties:
        type:
          type: string
          description: Part type.
          enum:
            - image_url
        image_url:
          $ref: '#/components/schemas/ChatMessageImageUrl'
      required:
        - type
        - image_url
    ChatMessageInputAudio:
      type: object
      description: Audio input payload.
      properties:
        data:
          type: string
          description: Base64-encoded audio data.
        format:
          type: string
          description: Audio format.
          enum:
            - wav
            - mp3
      required:
        - data
        - format
    ChatMessageInputAudioPart:
      type: object
      description: Audio input content part.
      properties:
        type:
          type: string
          description: Part type.
          enum:
            - input_audio
        input_audio:
          $ref: '#/components/schemas/ChatMessageInputAudio'
      required:
        - type
        - input_audio
    ChatMessageFileObject:
      type: object
      description: File payload passed in a Chat Completions content part. Chat file parts support inline file_data and keep OpenAI-compatible file_id; file_data is recommended today. They do not support file_url. Use Responses input_file.file_url for external file URLs.
      properties:
        file_id:
          type: string
          description: 'OpenAI-compatible field. Previously uploaded file ID from the Files API; this platform capability is under construction/adaptation, and actual availability depends on file hosting and model-side support.'
        file_data:
          type: string
          description: 'Inline base64-encoded file content, recommended today.'
        filename:
          type: string
          description: File name used together with inline file content.
      anyOf:
        - required:
            - file_id
        - required:
            - file_data
      additionalProperties: false
    ChatMessageFilePart:
      type: object
      description: File input content part for Chat Completions. Supports file_data and keeps file_id compatibility; external file URLs are not supported here. Use Responses input_file.file_url instead.
      properties:
        type:
          type: string
          description: Part type.
          enum:
            - file
        file:
          $ref: '#/components/schemas/ChatMessageFileObject'
      required:
        - type
        - file
    ChatToolFunction:
      type: object
      description: Function definition used by tool declarations.
      properties:
        name:
          type: string
          description: Function name.
        description:
          type: string
          description: Human-readable function description.
        parameters:
          type: object
          description: JSON Schema describing function arguments.
          additionalProperties: true
        strict:
          type: boolean
          description: Whether to enforce strict schema adherence.
      required:
        - name
      additionalProperties: true
    ChatCustomTool:
      type: object
      description: Custom tool definition used by tool declarations.
      properties:
        name:
          type: string
          description: Custom tool name.
        description:
          type: string
          description: Human-readable custom tool description.
        format:
          type: object
          description: Optional custom tool input format definition.
          additionalProperties: true
      required:
        - name
      additionalProperties: true
    ChatFunctionToolDefinition:
      type: object
      description: Function tool declaration for Chat Completions.
      properties:
        type:
          type: string
          description: Tool type.
          enum:
            - function
        function:
          $ref: '#/components/schemas/ChatToolFunction'
      required:
        - type
        - function
      additionalProperties: true
    ChatCustomToolDefinition:
      type: object
      description: Custom tool declaration for Chat Completions.
      properties:
        type:
          type: string
          description: Tool type.
          enum:
            - custom
        custom:
          $ref: '#/components/schemas/ChatCustomTool'
      required:
        - type
        - custom
      additionalProperties: true
    ChatToolDefinition:
      description: Tool declaration for Chat Completions.
      oneOf:
        - $ref: '#/components/schemas/ChatFunctionToolDefinition'
        - $ref: '#/components/schemas/ChatCustomToolDefinition'
    ChatNamedFunctionToolChoice:
      type: object
      description: Explicitly choose a named function tool.
      properties:
        type:
          type: string
          enum:
            - function
        function:
          type: object
          properties:
            name:
              type: string
              description: Function tool name.
          required:
            - name
          additionalProperties: true
      required:
        - type
        - function
      additionalProperties: true
    ChatNamedCustomToolChoice:
      type: object
      description: Explicitly choose a named custom tool.
      properties:
        type:
          type: string
          enum:
            - custom
        custom:
          type: object
          properties:
            name:
              type: string
              description: Custom tool name.
          required:
            - name
          additionalProperties: true
      required:
        - type
        - custom
      additionalProperties: true
    ChatAllowedToolsChoice:
      type: object
      description: Restrict tool choice to an allowed subset of tools.
      properties:
        type:
          type: string
          enum:
            - allowed_tools
        allowed_tools:
          type: object
          description: Allowed tool choice configuration.
          properties:
            mode:
              type: string
              description: Tool selection mode for the allowed subset.
            tools:
              type: array
              description: Allowed tool declarations.
              items:
                $ref: '#/components/schemas/ChatToolDefinition'
          required:
            - mode
            - tools
          additionalProperties: true
      required:
        - type
        - allowed_tools
      additionalProperties: true
    ChatToolChoice:
      description: Tool choice strategy.
      anyOf:
        - type: string
          description: 'Simple strategy such as none, auto, or required.'
          enum:
            - none
            - auto
            - required
        - $ref: '#/components/schemas/ChatNamedFunctionToolChoice'
        - $ref: '#/components/schemas/ChatNamedCustomToolChoice'
        - $ref: '#/components/schemas/ChatAllowedToolsChoice'
        - type: object
          description: Provider-specific tool choice object.
          additionalProperties: true
    ChatResponseFormat:
      type: object
      description: Structured output format configuration.
      properties:
        type:
          type: string
          description: 'Response format type such as text, json_object, or json_schema.'
        json_schema:
          type: object
          description: JSON Schema configuration when type=json_schema.
          additionalProperties: true
      additionalProperties: true
    ChatAudioRequestConfig:
      type: object
      description: Audio output request configuration.
      properties:
        voice:
          type: string
          description: Voice name for audio output.
        format:
          type: string
          description: Audio format.
      additionalProperties: true
    ChatAudioResponseMetadata:
      type: object
      description: Audio metadata returned with a chat message.
      properties:
        id:
          type: string
          description: Audio object identifier.
        expires_at:
          type: integer
          description: Expiration timestamp when provided.
        transcript:
          type: string
          description: Transcript associated with the audio output.
      additionalProperties: true
    ChatStreamOptions:
      type: object
      description: Streaming options for Chat Completions.
      properties:
        include_usage:
          type: boolean
          description: Include a final usage chunk in streamed responses.
        include_obfuscation:
          type: boolean
          description: Include obfuscation metadata when supported.
      additionalProperties: true
    ChatCompletionFunctionCall:
      type: object
      description: Deprecated function call structure returned by some models.
      properties:
        name:
          type: string
          description: Function name.
        arguments:
          type: string
          description: JSON string containing function arguments.
      additionalProperties: true
    ChatCompletionFunctionToolCall:
      type: object
      description: Function tool call emitted by the assistant.
      properties:
        id:
          type: string
          description: Tool call identifier.
        type:
          type: string
          description: Tool call type.
          enum:
            - function
        function:
          $ref: '#/components/schemas/ChatCompletionFunctionCall'
      required:
        - id
        - type
        - function
      additionalProperties: true
    ChatCompletionCustomToolCall:
      type: object
      description: Custom tool call emitted by the assistant.
      properties:
        id:
          type: string
          description: Tool call identifier.
        type:
          type: string
          description: Tool call type.
          enum:
            - custom
        custom:
          type: object
          description: Custom tool call payload.
          additionalProperties: true
      required:
        - id
        - type
        - custom
      additionalProperties: true
    ChatCompletionToolCall:
      description: Tool call emitted by the assistant.
      oneOf:
        - $ref: '#/components/schemas/ChatCompletionFunctionToolCall'
        - $ref: '#/components/schemas/ChatCompletionCustomToolCall'
    ChatCompletionAnnotation:
      type: object
      description: Annotation attached to a response message.
      additionalProperties: true
    ChatTextOnlyContent:
      description: Text-only chat message content.
      oneOf:
        - type: string
          description: Plain text content.
        - type: array
          description: Array of text content parts.
          items:
            $ref: '#/components/schemas/ChatMessageTextPart'
    ChatUserMessage:
      type: object
      description: 'User message. Supports text, image, audio, and file input parts.'
      properties:
        role:
          type: string
          enum:
            - user
        name:
          type: string
          description: Optional participant name.
        content:
          description: User message content.
          oneOf:
            - type: string
              description: Plain text content.
            - type: array
              description: Array of structured multimodal content parts.
              items:
                oneOf:
                  - $ref: '#/components/schemas/ChatMessageTextPart'
                  - $ref: '#/components/schemas/ChatMessageImagePart'
                  - $ref: '#/components/schemas/ChatMessageInputAudioPart'
                  - $ref: '#/components/schemas/ChatMessageFilePart'
      required:
        - role
        - content
      additionalProperties: true
    ChatDeveloperMessage:
      type: object
      description: Developer message. Supports text-only content.
      properties:
        role:
          type: string
          enum:
            - developer
        name:
          type: string
          description: Optional participant name.
        content:
          $ref: '#/components/schemas/ChatTextOnlyContent'
      required:
        - role
        - content
      additionalProperties: true
    ChatSystemMessage:
      type: object
      description: System message. Supports text-only content.
      properties:
        role:
          type: string
          enum:
            - system
        name:
          type: string
          description: Optional participant name.
        content:
          $ref: '#/components/schemas/ChatTextOnlyContent'
      required:
        - role
        - content
      additionalProperties: true
    ChatAssistantMessage:
      type: object
      description: 'Assistant message, including optional tool calls.'
      properties:
        role:
          type: string
          enum:
            - assistant
        name:
          type: string
          description: Optional participant name.
        content:
          description: Assistant message content.
          oneOf:
            - $ref: '#/components/schemas/ChatTextOnlyContent'
            - type: 'null'
              description: 'Null content, typically used when assistant emits tool calls.'
        tool_calls:
          type: array
          description: Tool calls emitted by the assistant.
          items:
            $ref: '#/components/schemas/ChatCompletionToolCall'
        function_call:
          oneOf:
            - $ref: '#/components/schemas/ChatCompletionFunctionCall'
            - type: 'null'
          description: Deprecated single function call payload.
        refusal:
          type:
            - string
            - 'null'
          description: Refusal text when the model declines the request.
        audio:
          oneOf:
            - $ref: '#/components/schemas/ChatAudioResponseMetadata'
            - type: 'null'
          description: Audio payload metadata associated with the message.
      required:
        - role
      additionalProperties: true
    ChatToolMessage:
      type: object
      description: Tool result message. Supports text-only content and requires the related tool call ID.
      properties:
        role:
          type: string
          enum:
            - tool
        content:
          $ref: '#/components/schemas/ChatTextOnlyContent'
        tool_call_id:
          type: string
          description: Tool call identifier this message responds to.
      required:
        - role
        - content
        - tool_call_id
      additionalProperties: true
    ChatFunctionMessage:
      type: object
      description: Deprecated function result message. Use tool messages for new integrations.
      properties:
        role:
          type: string
          enum:
            - function
        name:
          type: string
          description: Function name.
        content:
          type:
            - string
            - 'null'
          description: Function result content.
      required:
        - role
        - name
        - content
      additionalProperties: true
    ChatMessage:
      description: Chat message object.
      oneOf:
        - $ref: '#/components/schemas/ChatDeveloperMessage'
        - $ref: '#/components/schemas/ChatSystemMessage'
        - $ref: '#/components/schemas/ChatUserMessage'
        - $ref: '#/components/schemas/ChatAssistantMessage'
        - $ref: '#/components/schemas/ChatToolMessage'
        - $ref: '#/components/schemas/ChatFunctionMessage'
    Usage:
      type: object
      description: Token usage summary.
      properties:
        prompt_tokens:
          type: integer
          description: Number of input tokens consumed.
        completion_tokens:
          type: integer
          description: Number of output tokens consumed.
        total_tokens:
          type: integer
          description: Total number of tokens consumed.
        input_tokens:
          type: integer
          description: Number of input tokens consumed for protocols that expose this field.
        output_tokens:
          type: integer
          description: Number of output tokens consumed for protocols that expose this field.
        completion_tokens_details:
          type: object
          description: Optional breakdown of completion token usage.
          properties:
            reasoning_tokens:
              type: integer
              description: Tokens consumed by reasoning or chain-of-thought style generation.
          additionalProperties: true
        input_tokens_details:
          type: object
          description: Optional breakdown of input token usage.
          properties:
            text_tokens:
              type: integer
              description: Input tokens attributed to text.
            image_tokens:
              type: integer
              description: Input tokens attributed to images.
          additionalProperties: true
    CreateChatCompletionRequest:
      type: object
      description: Chat Completions request body.
      properties:
        model:
          type: string
          description: Model ID to invoke.
        messages:
          type: array
          description: Ordered conversation history sent to the model.
          items:
            $ref: '#/components/schemas/ChatMessage'
        temperature:
          type: number
          description: Sampling temperature. Higher values make output more random.
          default: 1
        top_p:
          type: number
          description: Nucleus sampling parameter.
        presence_penalty:
          type: number
          description: Penalize tokens based on whether they have appeared.
        frequency_penalty:
          type: number
          description: Penalize tokens based on how frequently they have appeared.
        stop:
          description: Up to four stop sequences.
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        max_completion_tokens:
          type: integer
          description: Maximum number of output tokens the model may generate.
        'n':
          type: integer
          description: Number of candidate completions to generate.
          default: 1
        seed:
          type: integer
          description: Best-effort deterministic sampling seed.
        reasoning_effort:
          type: string
          description: Reasoning effort level for supported reasoning models.
        response_format:
          $ref: '#/components/schemas/ChatResponseFormat'
        modalities:
          type: array
          description: 'Requested output modalities, such as text or audio.'
          items:
            type: string
        audio:
          $ref: '#/components/schemas/ChatAudioRequestConfig'
        store:
          type: boolean
          description: Whether to store the response for later retrieval or distillation.
        metadata:
          type: object
          description: Developer-defined metadata associated with the request.
          additionalProperties: true
        service_tier:
          type: string
          description: Requested service tier when supported.
        user:
          type: string
          description: End-user identifier.
        tools:
          type: array
          description: Tool declarations available to the model.
          items:
            $ref: '#/components/schemas/ChatToolDefinition'
        tool_choice:
          $ref: '#/components/schemas/ChatToolChoice'
        parallel_tool_calls:
          type: boolean
          description: Whether the model may emit multiple tool calls in parallel.
        stream:
          type: boolean
          description: Whether to return the response as a stream.
          default: false
        stream_options:
          $ref: '#/components/schemas/ChatStreamOptions'
      required:
        - model
        - messages
    ChatCompletionResponseMessage:
      type: object
      description: A generated message in a chat completion.
      properties:
        role:
          type: string
          description: 'Role of the generated message, usually assistant.'
        content:
          description: Generated message text. May be null in some tool-calling flows.
          type:
            - string
            - 'null'
        refusal:
          type:
            - string
            - 'null'
          description: Refusal text when the assistant declines to answer.
        annotations:
          type: array
          description: Optional annotations such as citations or URL references.
          items:
            $ref: '#/components/schemas/ChatCompletionAnnotation'
        tool_calls:
          type: array
          description: Tool calls emitted by the assistant.
          items:
            $ref: '#/components/schemas/ChatCompletionToolCall'
        function_call:
          oneOf:
            - $ref: '#/components/schemas/ChatCompletionFunctionCall'
            - type: 'null'
          description: Deprecated single function call payload.
        audio:
          oneOf:
            - $ref: '#/components/schemas/ChatAudioResponseMetadata'
            - type: 'null'
          description: Audio payload returned with the message.
    ChatCompletionChoice:
      type: object
      description: A single chat completion candidate.
      properties:
        index:
          type: integer
          description: Zero-based position of this choice in the returned list.
        message:
          $ref: '#/components/schemas/ChatCompletionResponseMessage'
        finish_reason:
          description: 'Reason generation stopped, such as stop, length, or tool_calls.'
          type:
            - string
            - 'null'
        logprobs:
          type:
            - object
            - 'null'
          description: Optional token-level log probability details.
          additionalProperties: true
    ChatCompletionResponse:
      type: object
      description: Chat Completions success response.
      properties:
        id:
          type: string
          description: Unique response ID.
        object:
          type: string
          description: 'Object type, usually chat.completion.'
        created:
          type: integer
          description: Unix timestamp in seconds when the response was created.
        model:
          type: string
          description: Model ID actually used for the request.
        service_tier:
          type: string
          description: Service tier used for the request when provided.
        system_fingerprint:
          type: string
          description: Backend configuration fingerprint when available.
        request_id:
          type: string
          description: Request identifier when exposed by the provider.
        choices:
          type: array
          description: Candidate outputs returned by the model.
          items:
            $ref: '#/components/schemas/ChatCompletionChoice'
        usage:
          $ref: '#/components/schemas/Usage'
    MessageContentPart:
      type: object
      description: Flexible content part used by Messages-compatible protocols.
      properties:
        type:
          type: string
          description: 'Part type, such as text, image, tool_use, or tool_result.'
        text:
          type: string
          description: Text content when the part carries plain text.
        image_url:
          type: object
          description: OpenAI-style image URL payload.
          additionalProperties: true
        source:
          type: object
          description: Anthropic-style media source payload.
          additionalProperties: true
        id:
          type: string
          description: Identifier for the content block or tool call.
        name:
          type: string
          description: 'Name of the tool, function, or block.'
        input:
          type: object
          description: Tool input payload or other structured arguments.
          additionalProperties: true
        content:
          description: 'Nested content carried by some protocols, often for tool_result blocks.'
          oneOf:
            - type: string
              description: Plain text nested content.
            - type: array
              description: Nested structured content parts.
              items:
                type: object
                additionalProperties: true
      additionalProperties: true
    MessagesRequestMessage:
      type: object
      description: A single input message for Messages-compatible protocols.
      properties:
        role:
          type: string
          description: Message role. Different vendors may support different role names.
        content:
          description: 'Message content, either plain text or an array of vendor-specific content parts.'
          oneOf:
            - type: string
              description: Plain text content.
            - type: array
              description: Structured content part array.
              items:
                $ref: '#/components/schemas/MessageContentPart'
      required:
        - role
        - content
      additionalProperties: true
    CreateMessagesRequest:
      type: object
      description: Messages protocol request body.
      properties:
        model:
          type: string
          description: Model ID to invoke.
        messages:
          type: array
          description: Input message list. Content parts are intentionally permissive to preserve vendor compatibility.
          items:
            $ref: '#/components/schemas/MessagesRequestMessage'
        max_tokens:
          type: integer
          description: Maximum number of output tokens.
        stream:
          type: boolean
          description: Whether to return the response as a stream.
          default: false
      required:
        - model
        - messages
      additionalProperties: true
    MessageResponse:
      type: object
      description: Messages protocol success response.
      properties:
        id:
          type: string
          description: Unique response ID.
        type:
          type: string
          description: 'Object type, usually message.'
        role:
          type: string
          description: 'Role of the returned message, usually assistant.'
        model:
          type: string
          description: Model ID actually used for the request.
        content:
          type: array
          description: 'Returned content parts. Vendors may include text, tool calls, citations, or reasoning blocks.'
          items:
            $ref: '#/components/schemas/MessageContentPart'
        stop_reason:
          type: string
          description: Reason generation stopped.
        usage:
          $ref: '#/components/schemas/Usage'
      additionalProperties: true
    ResponseInputTextPart:
      type: object
      description: Text input content part for the Responses protocol.
      properties:
        type:
          type: string
          description: Input part type.
          enum:
            - input_text
        text:
          type: string
          description: Text input value.
      required:
        - type
        - text
      additionalProperties: true
    ResponseInputImagePart:
      type: object
      description: Image input content part for the Responses protocol. Supports image_url or OpenAI-compatible file_id; image_url is recommended today. Add multiple input_image parts to send multiple images.
      properties:
        type:
          type: string
          description: Input part type.
          enum:
            - input_image
        image_url:
          type: string
          description: 'Publicly accessible image URL or image data URL. Common image formats are supported; for example, data:image/png;base64,...'
        file_id:
          type: string
          description: 'OpenAI-compatible field. Previously uploaded image file ID from the Files API; this platform capability is under construction/adaptation, and actual availability depends on file hosting and model-side support.'
        detail:
          type: string
          description: 'Detail level for image understanding, when supported.'
          default: auto
          enum:
            - auto
            - low
            - high
      required:
        - type
      anyOf:
        - required:
            - image_url
        - required:
            - file_id
      additionalProperties: true
    ResponseInputFilePart:
      type: object
      description: 'File input content part for the Responses protocol. Supports file_url, file_data, and OpenAI-compatible file_id; file_url or file_data is recommended today. Common document and text formats are supported; PDF is only one example.'
      properties:
        type:
          type: string
          description: Input part type.
          enum:
            - input_file
        file_id:
          type: string
          description: 'OpenAI-compatible field. Previously uploaded file ID from the Files API; this platform capability is under construction/adaptation, and actual availability depends on file hosting and model-side support.'
        file_url:
          type: string
          description: 'Publicly accessible file URL used by file input parts, recommended today. Common document and text formats are supported.'
        filename:
          type: string
          description: File name used together with file_data for inline file uploads.
        file_data:
          type: string
          description: 'Data URL containing base64-encoded file content, recommended today; for example, data:application/pdf;base64,... or data:text/plain;base64,...'
      required:
        - type
      anyOf:
        - required:
            - file_id
        - required:
            - file_url
        - required:
            - filename
            - file_data
      additionalProperties: true
    ResponseInputContentPart:
      description: 'Responses input content part. Supported input types are input_text, input_image, and input_file.'
      oneOf:
        - $ref: '#/components/schemas/ResponseInputTextPart'
        - $ref: '#/components/schemas/ResponseInputImagePart'
        - $ref: '#/components/schemas/ResponseInputFilePart'
    ResponseContentPart:
      type: object
      description: Flexible output content part used inside Responses output items.
      properties:
        type:
          type: string
          description: 'Output part type, such as output_text or tool_result.'
        text:
          type: string
          description: Text value carried by the part.
        annotations:
          type: array
          description: Optional annotations attached to the content part.
          items:
            type: object
            additionalProperties: true
      additionalProperties: true
    ResponseInputItem:
      type: object
      description: Structured input item for the Responses protocol.
      properties:
        type:
          type: string
          description: 'Input item type, such as message.'
        role:
          type: string
          description: Role associated with the input item.
        content:
          description: 'Input content, either plain text or structured parts.'
          oneOf:
            - type: string
              description: Plain text input.
            - type: array
              description: Structured content part array.
              items:
                $ref: '#/components/schemas/ResponseInputContentPart'
      additionalProperties: true
    CreateResponseRequest:
      type: object
      description: Responses protocol request body.
      properties:
        model:
          type: string
          description: Model ID to invoke.
        input:
          description: 'Input payload, either plain text or an array of structured items.'
          oneOf:
            - type: string
              description: Plain text input.
            - type: array
              description: Structured input array.
              items:
                $ref: '#/components/schemas/ResponseInputItem'
        stream:
          type: boolean
          description: Whether to return the response as a stream.
          default: false
      required:
        - model
        - input
      additionalProperties: true
    ResponseOutputItem:
      type: object
      description: A single item in a Responses output array.
      properties:
        id:
          type: string
          description: Unique identifier for the output item.
        type:
          type: string
          description: 'Output item type, such as message or tool_call.'
        role:
          type: string
          description: Role associated with the output item.
        status:
          type: string
          description: 'Processing status for the output item, when present.'
        content:
          type: array
          description: Structured output content parts.
          items:
            $ref: '#/components/schemas/ResponseContentPart'
      additionalProperties: true
    ResponseObject:
      type: object
      description: Responses protocol success response.
      properties:
        id:
          type: string
          description: Unique response ID.
        object:
          type: string
          description: 'Object type, usually response.'
        model:
          type: string
          description: Model ID actually used for the request.
        status:
          type: string
          description: 'Response processing status, such as completed, failed, or incomplete.'
        created_at:
          type: integer
          description: Unix timestamp in seconds when the response was created.
        output_text:
          type: string
          description: 'Convenience text output aggregated from output content, when provided.'
        output:
          type: array
          description: 'Generated output items. Vendors may include messages, tool calls, reasoning, or other structured records.'
          items:
            $ref: '#/components/schemas/ResponseOutputItem'
        error:
          type:
            - object
            - 'null'
          description: Error information when response generation fails.
          additionalProperties: true
        incomplete_details:
          type:
            - object
            - 'null'
          description: Details explaining why a response is incomplete.
          additionalProperties: true
        usage:
          $ref: '#/components/schemas/Usage'
      additionalProperties: true
    CreateEmbeddingRequest:
      type: object
      description: Embeddings request body.
      properties:
        model:
          type: string
          description: Model ID to invoke.
        input:
          description: Text input to embed. Can be one string or multiple strings.
          oneOf:
            - type: string
              description: Single input string.
            - type: array
              description: Multiple input strings.
              items:
                type: string
        encoding_format:
          type: string
          description: Encoding format for the returned vectors.
          enum:
            - float
            - base64
          default: float
        dimensions:
          type: integer
          description: Requested output vector dimensions. Supported only by some models.
      required:
        - model
        - input
    EmbeddingDataItem:
      type: object
      description: A single embedding result.
      properties:
        object:
          type: string
          description: 'Object type, usually embedding.'
        embedding:
          description: 'Vector value, returned either as a float array or a base64 string.'
          oneOf:
            - type: array
              items:
                type: number
            - type: string
        index:
          type: integer
          description: Zero-based position of this result in the input list.
    EmbeddingResponse:
      type: object
      description: Embeddings success response.
      properties:
        object:
          type: string
          description: 'Object type, usually list.'
        data:
          type: array
          description: Embedding result list.
          items:
            $ref: '#/components/schemas/EmbeddingDataItem'
        model:
          type: string
          description: Model ID actually used for the request.
        usage:
          $ref: '#/components/schemas/Usage'
    CreateImageGenerationRequest:
      type: object
      description: Image generation request body.
      properties:
        model:
          type: string
          description: Model ID to invoke.
        prompt:
          type: string
          description: Prompt used to generate the image.
        'n':
          type: integer
          description: Number of images to generate.
          default: 1
        size:
          type: string
          description: Requested output image size.
          default: 1024x1024
        quality:
          type: string
          description: Requested image quality level.
          enum:
            - standard
            - hd
          default: standard
        response_format:
          type: string
          description: Format used to return the image payload.
          enum:
            - url
            - b64_json
          default: url
      required:
        - model
        - prompt
    CreateImageEditRequest:
      type: object
      description: Image editing request body.
      properties:
        model:
          type: string
          description: Model ID to invoke.
        image:
          type: array
          description: 'Input image file(s) to edit. Use the image parameter; when sending multiple files with raw multipart/curl, send repeated image[] parts.'
          items:
            type: string
            format: binary
        mask:
          type: string
          format: binary
          description: Optional mask file describing editable regions.
        prompt:
          type: string
          description: Prompt used to guide image editing.
        'n':
          type: integer
          description: Number of images to generate.
          default: 1
        size:
          type: string
          description: Requested output image size.
          default: 1024x1024
        response_format:
          type: string
          description: Format used to return the image payload.
          enum:
            - url
            - b64_json
          default: url
      required:
        - model
        - image
        - prompt
    ImageDataItem:
      type: object
      description: A single generated image result.
      properties:
        url:
          type: string
          description: Image URL when response_format=url.
        b64_json:
          type: string
          description: Base64-encoded image bytes when response_format=b64_json.
        revised_prompt:
          type: string
          description: Prompt actually used or revised by the model.
    ImageUsage:
      type: object
      description: Resource usage summary for image generation.
      properties:
        total_tokens:
          type: integer
          description: Total token count.
        input_tokens:
          type: integer
          description: Input token count.
        output_tokens:
          type: integer
          description: Output token count.
        input_tokens_details:
          type: object
          description: Optional breakdown of input token usage.
          properties:
            text_tokens:
              type: integer
              description: Input tokens attributed to text prompts.
            image_tokens:
              type: integer
              description: Input tokens attributed to images.
          additionalProperties: true
    ImageResponse:
      type: object
      description: Image generation or edit success response.
      properties:
        created:
          type: integer
          description: Unix timestamp in seconds when the response was created.
        data:
          type: array
          description: Generated image results.
          items:
            $ref: '#/components/schemas/ImageDataItem'
        background:
          type: string
          description: Background type used for the generated image.
        output_format:
          type: string
          description: 'Output image format, such as png.'
        quality:
          type: string
          description: Effective image quality used by the model.
        size:
          type: string
          description: Final returned image size.
        usage:
          $ref: '#/components/schemas/ImageUsage'
    CreateTranscriptionRequest:
      type: object
      description: Audio transcription request body.
      properties:
        model:
          type: string
          description: Model ID to invoke.
        file:
          type: string
          format: binary
          description: Audio file to transcribe.
        language:
          type: string
          description: Optional language code for the audio.
        prompt:
          type: string
          description: 'Optional prompt to bias style, formatting, or terminology.'
        response_format:
          type: string
          description: Response format for the transcription result.
          enum:
            - json
            - text
            - srt
            - verbose_json
            - vtt
          default: json
        temperature:
          type: number
          description: Sampling temperature.
          default: 0
        timestamp_granularities:
          type: array
          description: Timestamp granularities to include when response_format is verbose_json.
          items:
            type: string
            enum:
              - word
              - segment
      required:
        - model
        - file
    TranscriptionResponse:
      type: object
      description: JSON transcription response.
      properties:
        text:
          type: string
          description: Transcribed text content.
    ErrorDetail:
      type: object
      description: Error detail object.
      properties:
        message:
          type: string
          description: Human-readable error message.
        type:
          type: string
          description: Error type.
        param:
          description: 'Parameter associated with the error, if any.'
          type:
            - string
            - 'null'
        code:
          description: 'Machine-readable error code, if any.'
          type:
            - string
            - 'null'
    ErrorResponse:
      type: object
      description: Error response payload.
      properties:
        error:
          $ref: '#/components/schemas/ErrorDetail'
  securitySchemes:
    APIKeyHeader:
      type: http
      scheme: bearer
      description: 'Authenticate using Bearer token format: ''Bearer YOUR_SECRET_TOKEN'''
  responses:
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
