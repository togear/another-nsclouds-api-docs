openapi: 3.1.0
info:
  title: LiteLLM API Documentation
  description: 'Self-hosted LiteLLM gateway API documentation, fully compatible with OpenAI format.'
  version: 1.11.0
servers:
  - url: 'https://aillm.nsclouds.com'
    description: China Server
tags:
  - name: chat_completions
    x-page-title: Chat Completions
    x-page-icon: message
    description: 'Chat completion related APIs, including chat completions and text completions'
  - name: embeddings
    x-page-title: Embeddings
    x-page-icon: database
    description: Embedding related APIs for generating vector representations of text
  - name: image_generations
    x-page-title: Image Generations
    x-page-icon: image
    description: Image generation related APIs for creating images from text prompts
  - name: image_edits
    x-page-title: Image Edits
    x-page-icon: edit
    description: Image editing related APIs for creating edited images from original images and prompts
  - name: audio_transcriptions
    x-page-title: Audio Transcriptions
    x-page-icon: microphone
    description: Audio transcription related APIs for transcribing audio files to text
  - name: chat_completions_moonshotai
    x-parent: chat_completions
    x-page-title: Moonshot AI
    x-page-icon: brain
    description: Moonshot AI's chat completions API
  - name: completions_moonshotai
    x-parent: chat_completions
    x-page-title: Moonshot AI
    x-page-icon: brain
    description: Moonshot AI's text completions API
  - name: messages_moonshotai
    x-parent: chat_completions
    x-page-title: Moonshot AI
    x-page-icon: brain
    description: Moonshot AI's Messages protocol API
paths:
  /v1/chat/completions:
    post:
      tags:
        - chat_completions_moonshotai
      summary: Create Chat Completion
      description: Generate model responses based on input messages. Fully compatible with OpenAI's Chat API.
      operationId: createChatCompletion_moonshotai
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChatCompletionRequest'
            examples:
              default:
                summary: Basic
                description: A simple conversation example with system prompt and user message.
                value:
                  model: kimi-k2.6
                  messages:
                    - role: system
                      content: You are a helpful assistant.
                    - role: user
                      content: Hello!
                  temperature: 1
                  max_completion_tokens: 50
                  'n': 1
                  stream: false
              streaming:
                summary: Streaming
                description: 'Enable streaming response by setting stream: true.'
                value:
                  model: kimi-k2.6
                  messages:
                    - role: system
                      content: You are a helpful assistant.
                    - role: user
                      content: Tell me a story.
                  temperature: 0.7
                  max_completion_tokens: 100
                  stream: true
              image_input:
                summary: Image Input (Multimodal)
                description: Use vision-enabled models to analyze images.
                value:
                  model: kimi-k2.6
                  messages:
                    - role: user
                      content:
                        - type: text
                          text: What's in this image?
                        - type: image_url
                          image_url:
                            url: 'https://example.com/cat.jpg'
                  max_completion_tokens: 300
              functions:
                summary: Function Calling
                description: Define tools (functions) and let the model decide whether to call them.
                value:
                  model: kimi-k2.6
                  messages:
                    - role: user
                      content: What's the weather in Boston?
                  tools:
                    - type: function
                      function:
                        name: get_current_weather
                        description: Get the current weather in a given location
                        parameters:
                          type: object
                          properties:
                            location:
                              type: string
                              description: 'The city and state, e.g. San Francisco, CA'
                            unit:
                              type: string
                              enum:
                                - celsius
                                - fahrenheit
                          required:
                            - location
                  tool_choice: auto
                  max_completion_tokens: 150
      responses:
        '200':
          description: Success Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionResponse'
              examples:
                default-response:
                  summary: Basic Response
                  description: Response example for basic chat request.
                  value:
                    id: chatcmpl-8415e78a-7989-99de-9e4f-2b0ec895f35f
                    object: chat.completion
                    created: 1773224824
                    model: kimi-k2.6
                    choices:
                      - index: 0
                        message:
                          role: assistant
                          content: "Hello! How can I help you today? \U0001F60A"
                          reasoning_content: ''
                        finish_reason: stop
                        provider_specific_fields: {}
                    usage:
                      prompt_tokens: 11
                      completion_tokens: 12
                      total_tokens: 23
                      completion_tokens_details:
                        text_tokens: 12
                      prompt_tokens_details:
                        cached_tokens: 0
                        text_tokens: 11
                image_input-response:
                  summary: Image Input Response
                  description: Description generated by the model based on image content.
                  value:
                    id: chatcmpl-789
                    object: chat.completion
                    created: 1677652300
                    model: kimi-k2.6
                    choices:
                      - index: 0
                        message:
                          role: assistant
                          content: 'The image shows a cute cat sitting on a windowsill, looking outside.'
                        finish_reason: stop
                    usage:
                      prompt_tokens: 123
                      completion_tokens: 15
                      total_tokens: 138
                functions-response:
                  summary: Function Calling Response
                  description: Model returns a function call request.
                  value:
                    id: chatcmpl-abc
                    object: chat.completion
                    created: 1677652310
                    model: kimi-k2.6
                    choices:
                      - index: 0
                        message:
                          role: assistant
                          content: null
                          tool_calls:
                            - id: call_123
                              type: function
                              function:
                                name: get_current_weather
                                arguments: '{"location": "Boston, MA", "unit": "fahrenheit"}'
                        finish_reason: tool_calls
                    usage:
                      prompt_tokens: 50
                      completion_tokens: 20
                      total_tokens: 70
            text/event-stream:
              schema:
                type: string
                description: 'Streaming responses are returned in Server-Sent Events format, each event is a JSON data block starting with ''data: '' and ending with ''data: [DONE]''.'
              examples:
                streaming-response:
                  summary: Streaming Response Example
                  description: Shows events sent sequentially during streaming chat process.
                  value: |
                    data: {"id":"chatcmpl-907c71cf-c857-907c-bfd4-238a07d3888f","object":"chat.completion.chunk","created":1773224832,"model":"kimi-k2.6","choices":[{"index":0,"delta":{"content":"Hello","role":"assistant"}}],"usage":{"completion_tokens":0,"prompt_tokens":0,"total_tokens":0}}
                    data: {"id":"chatcmpl-907c71cf-c857-907c-bfd4-238a07d3888f","object":"chat.completion.chunk","created":1773224832,"model":"kimi-k2.6","choices":[{"index":0,"delta":{"content":" there"}}],"usage":{"completion_tokens":0,"prompt_tokens":0,"total_tokens":0}}
                    data: {"id":"chatcmpl-907c71cf-c857-907c-bfd4-238a07d3888f","object":"chat.completion.chunk","created":1773224832,"model":"kimi-k2.6","choices":[{"index":0,"delta":{"content":"!"}}],"usage":{"completion_tokens":0,"prompt_tokens":0,"total_tokens":0}}
                    data: {"id":"chatcmpl-907c71cf-c857-907c-bfd4-238a07d3888f","object":"chat.completion.chunk","created":1773224832,"model":"kimi-k2.6","choices":[{"index":0,"delta":{"content":" How"}}],"usage":{"completion_tokens":0,"prompt_tokens":0,"total_tokens":0}}
                    data: {"id":"chatcmpl-907c71cf-c857-907c-bfd4-238a07d3888f","object":"chat.completion.chunk","created":1773224832,"model":"kimi-k2.6","choices":[{"index":0,"delta":{"content":" can"}}],"usage":{"completion_tokens":0,"prompt_tokens":0,"total_tokens":0}}
                    data: {"id":"chatcmpl-907c71cf-c857-907c-bfd4-238a07d3888f","object":"chat.completion.chunk","created":1773224832,"model":"kimi-k2.6","choices":[{"index":0,"delta":{"content":" I"}}],"usage":{"completion_tokens":0,"prompt_tokens":0,"total_tokens":0}}
                    data: {"id":"chatcmpl-907c71cf-c857-907c-bfd4-238a07d3888f","object":"chat.completion.chunk","created":1773224832,"model":"kimi-k2.6","choices":[{"index":0,"delta":{"content":" help"}}],"usage":{"completion_tokens":0,"prompt_tokens":0,"total_tokens":0}}
                    data: {"id":"chatcmpl-907c71cf-c857-907c-bfd4-238a07d3888f","object":"chat.completion.chunk","created":1773224832,"model":"kimi-k2.6","choices":[{"index":0,"delta":{"content":" you"}}],"usage":{"completion_tokens":0,"prompt_tokens":0,"total_tokens":0}}
                    data: {"id":"chatcmpl-907c71cf-c857-907c-bfd4-238a07d3888f","object":"chat.completion.chunk","created":1773224832,"model":"kimi-k2.6","choices":[{"index":0,"delta":{"content":" today"}}],"usage":{"completion_tokens":0,"prompt_tokens":0,"total_tokens":0}}
                    data: {"id":"chatcmpl-907c71cf-c857-907c-bfd4-238a07d3888f","object":"chat.completion.chunk","created":1773224832,"model":"kimi-k2.6","choices":[{"index":0,"delta":{"content":"?"}}],"usage":{"completion_tokens":0,"prompt_tokens":0,"total_tokens":0}}
                    data: {"id":"chatcmpl-907c71cf-c857-907c-bfd4-238a07d3888f","object":"chat.completion.chunk","created":1773224832,"model":"kimi-k2.6","choices":[{"finish_reason":"stop","index":0,"delta":{}}],"usage":{"completion_tokens":0,"prompt_tokens":0,"total_tokens":0}}
                    data: [DONE]
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
  /v1/completions:
    post:
      tags:
        - completions_moonshotai
      summary: Create Text Completion
      description: Generate one or more completions based on provided prompts. Compatible with OpenAI's Completions API.
      operationId: createCompletion_moonshotai
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCompletionRequest'
            examples:
              default:
                summary: Basic
                description: A simple text completion example.
                value:
                  model: kimi-k2.6
                  prompt: Once upon a time
                  max_tokens: 50
                  temperature: 0.7
                  'n': 1
                  stream: false
              streaming:
                summary: Streaming
                description: 'Enable streaming response by setting stream: true.'
                value:
                  model: kimi-k2.6
                  prompt: The future of AI is
                  max_tokens: 30
                  temperature: 0.8
                  stream: true
      responses:
        '200':
          description: Success Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompletionResponse'
              examples:
                default-response:
                  summary: Basic Response
                  description: Response example for basic text completion request.
                  value:
                    id: cmpl-123
                    object: text_completion
                    created: 1677652288
                    model: kimi-k2.6
                    choices:
                      - text: ' in a small village, there lived a young girl named Lily.'
                        index: 0
                        finish_reason: length
                    usage:
                      prompt_tokens: 4
                      completion_tokens: 12
                      total_tokens: 16
            text/event-stream:
              schema:
                type: string
                description: 'Streaming responses are returned in Server-Sent Events format, each event is a JSON data block starting with ''data: '' and ending with ''data: [DONE]''.'
              examples:
                streaming-response:
                  summary: Streaming Response Example
                  description: Shows events sent sequentially during streaming text completion process.
                  value: |
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"kimi-k2.6","choices":[{"text":"The","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"kimi-k2.6","choices":[{"text":" future","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"kimi-k2.6","choices":[{"text":" of","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"kimi-k2.6","choices":[{"text":" AI","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"kimi-k2.6","choices":[{"text":" is","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"kimi-k2.6","choices":[{"text":" bright","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"kimi-k2.6","choices":[{"text":".","index":0,"finish_reason":"length"}]}
                    data: [DONE]
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
  /v1/messages:
    post:
      tags:
        - messages_moonshotai
      summary: Create Message
      description: Create a message using Anthropic Messages-compatible payload.
      operationId: createMessage_moonshotai
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMessagesRequest'
            examples:
              default:
                summary: Basic
                value:
                  model: kimi-k2.6
                  messages:
                    - role: user
                      content: Hello
                  max_tokens: 128
      responses:
        '200':
          description: Success Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              examples:
                default:
                  summary: Basic Response
                  value:
                    id: msg_123
                    type: message
                    role: assistant
                    model: kimi-k2.6
                    content:
                      - type: text
                        text: Hello! How can I help you today?
                    stop_reason: end_turn
                    usage:
                      input_tokens: 12
                      output_tokens: 9
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
components:
  schemas:
    ChatMessageTextPart:
      type: object
      description: Text content part.
      properties:
        type:
          type: string
          description: Part type.
          enum:
            - text
        text:
          type: string
          description: Text content.
      required:
        - type
        - text
    ChatMessageImageUrl:
      type: object
      description: Image URL payload.
      properties:
        url:
          type: string
          description: 'Publicly accessible image URL, or a base64 data URL.'
      required:
        - url
    ChatMessageImagePart:
      type: object
      description: Image input content part.
      properties:
        type:
          type: string
          description: Part type.
          enum:
            - image_url
        image_url:
          $ref: '#/components/schemas/ChatMessageImageUrl'
      required:
        - type
        - image_url
    ChatMessage:
      type: object
      description: Chat message object.
      properties:
        role:
          type: string
          description: Role of the message sender.
          enum:
            - system
            - user
            - assistant
            - tool
        content:
          description: 'Message content, either plain text or structured multimodal parts.'
          oneOf:
            - type: string
              description: Plain text content.
            - type: array
              description: 'Array of structured content parts, typically used for multimodal input.'
              items:
                oneOf:
                  - $ref: '#/components/schemas/ChatMessageTextPart'
                  - $ref: '#/components/schemas/ChatMessageImagePart'
      required:
        - role
        - content
    Usage:
      type: object
      description: Token usage summary.
      properties:
        prompt_tokens:
          type: integer
          description: Number of input tokens consumed.
        completion_tokens:
          type: integer
          description: Number of output tokens consumed.
        total_tokens:
          type: integer
          description: Total number of tokens consumed.
        input_tokens:
          type: integer
          description: Number of input tokens consumed for protocols that expose this field.
        output_tokens:
          type: integer
          description: Number of output tokens consumed for protocols that expose this field.
        completion_tokens_details:
          type: object
          description: Optional breakdown of completion token usage.
          properties:
            reasoning_tokens:
              type: integer
              description: Tokens consumed by reasoning or chain-of-thought style generation.
          additionalProperties: true
        input_tokens_details:
          type: object
          description: Optional breakdown of input token usage.
          properties:
            text_tokens:
              type: integer
              description: Input tokens attributed to text.
            image_tokens:
              type: integer
              description: Input tokens attributed to images.
          additionalProperties: true
    CreateChatCompletionRequest:
      type: object
      description: Chat Completions request body.
      properties:
        model:
          type: string
          description: Model ID to invoke.
        messages:
          type: array
          description: Ordered conversation history sent to the model.
          items:
            $ref: '#/components/schemas/ChatMessage'
        temperature:
          type: number
          description: Sampling temperature. Higher values make output more random.
          default: 1
        max_completion_tokens:
          type: integer
          description: Maximum number of output tokens the model may generate.
        'n':
          type: integer
          description: Number of candidate completions to generate.
          default: 1
        stream:
          type: boolean
          description: Whether to return the response as a stream.
          default: false
      required:
        - model
        - messages
    ChatCompletionResponseMessage:
      type: object
      description: A generated message in a chat completion.
      properties:
        role:
          type: string
          description: 'Role of the generated message, usually assistant.'
        content:
          description: Generated message text. May be null in some tool-calling flows.
          type:
            - string
            - 'null'
    ChatCompletionChoice:
      type: object
      description: A single chat completion candidate.
      properties:
        index:
          type: integer
          description: Zero-based position of this choice in the returned list.
        message:
          $ref: '#/components/schemas/ChatCompletionResponseMessage'
        finish_reason:
          description: 'Reason generation stopped, such as stop, length, or tool_calls.'
          type:
            - string
            - 'null'
    ChatCompletionResponse:
      type: object
      description: Chat Completions success response.
      properties:
        id:
          type: string
          description: Unique response ID.
        object:
          type: string
          description: 'Object type, usually chat.completion.'
        created:
          type: integer
          description: Unix timestamp in seconds when the response was created.
        model:
          type: string
          description: Model ID actually used for the request.
        choices:
          type: array
          description: Candidate outputs returned by the model.
          items:
            $ref: '#/components/schemas/ChatCompletionChoice'
        usage:
          $ref: '#/components/schemas/Usage'
    CreateCompletionRequest:
      type: object
      description: Text Completions request body.
      properties:
        model:
          type: string
          description: Model ID to invoke.
        prompt:
          description: Prompt used for text completion. Can be a single string or an array of strings.
          oneOf:
            - type: string
              description: Single prompt string.
            - type: array
              description: Multiple prompt strings.
              items:
                type: string
        temperature:
          type: number
          description: Sampling temperature. Higher values make output more random.
          default: 1
        max_tokens:
          type: integer
          description: Maximum number of output tokens.
        'n':
          type: integer
          description: Number of completion candidates to return.
          default: 1
        stream:
          type: boolean
          description: Whether to return the response as a stream.
          default: false
      required:
        - model
        - prompt
    CompletionChoice:
      type: object
      description: A single text completion candidate.
      properties:
        text:
          type: string
          description: Generated text output.
        index:
          type: integer
          description: Zero-based position of this choice in the returned list.
        finish_reason:
          description: Reason generation stopped.
          type:
            - string
            - 'null'
    CompletionResponse:
      type: object
      description: Text Completions success response.
      properties:
        id:
          type: string
          description: Unique response ID.
        object:
          type: string
          description: 'Object type, usually text_completion.'
        created:
          type: integer
          description: Unix timestamp in seconds when the response was created.
        model:
          type: string
          description: Model ID actually used for the request.
        choices:
          type: array
          description: Completion candidates returned by the model.
          items:
            $ref: '#/components/schemas/CompletionChoice'
        usage:
          $ref: '#/components/schemas/Usage'
    MessageContentPart:
      type: object
      description: Flexible content part used by Messages-compatible protocols.
      properties:
        type:
          type: string
          description: 'Part type, such as text, image, tool_use, or tool_result.'
        text:
          type: string
          description: Text content when the part carries plain text.
        image_url:
          type: object
          description: OpenAI-style image URL payload.
          additionalProperties: true
        source:
          type: object
          description: Anthropic-style media source payload.
          additionalProperties: true
        id:
          type: string
          description: Identifier for the content block or tool call.
        name:
          type: string
          description: 'Name of the tool, function, or block.'
        input:
          type: object
          description: Tool input payload or other structured arguments.
          additionalProperties: true
        content:
          description: 'Nested content carried by some protocols, often for tool_result blocks.'
          oneOf:
            - type: string
              description: Plain text nested content.
            - type: array
              description: Nested structured content parts.
              items:
                type: object
                additionalProperties: true
      additionalProperties: true
    MessagesRequestMessage:
      type: object
      description: A single input message for Messages-compatible protocols.
      properties:
        role:
          type: string
          description: Message role. Different vendors may support different role names.
        content:
          description: 'Message content, either plain text or an array of vendor-specific content parts.'
          oneOf:
            - type: string
              description: Plain text content.
            - type: array
              description: Structured content part array.
              items:
                $ref: '#/components/schemas/MessageContentPart'
      required:
        - role
        - content
      additionalProperties: true
    CreateMessagesRequest:
      type: object
      description: Messages protocol request body.
      properties:
        model:
          type: string
          description: Model ID to invoke.
        messages:
          type: array
          description: Input message list. Content parts are intentionally permissive to preserve vendor compatibility.
          items:
            $ref: '#/components/schemas/MessagesRequestMessage'
        max_tokens:
          type: integer
          description: Maximum number of output tokens.
        stream:
          type: boolean
          description: Whether to return the response as a stream.
          default: false
      required:
        - model
        - messages
      additionalProperties: true
    MessageResponse:
      type: object
      description: Messages protocol success response.
      properties:
        id:
          type: string
          description: Unique response ID.
        type:
          type: string
          description: 'Object type, usually message.'
        role:
          type: string
          description: 'Role of the returned message, usually assistant.'
        model:
          type: string
          description: Model ID actually used for the request.
        content:
          type: array
          description: 'Returned content parts. Vendors may include text, tool calls, citations, or reasoning blocks.'
          items:
            $ref: '#/components/schemas/MessageContentPart'
        stop_reason:
          type: string
          description: Reason generation stopped.
        usage:
          $ref: '#/components/schemas/Usage'
      additionalProperties: true
    ResponseContentPart:
      type: object
      description: Flexible content part used inside Responses input and output items.
      properties:
        type:
          type: string
          description: 'Part type, such as input_text, input_image, output_text, or tool_result.'
        text:
          type: string
          description: Text value carried by the part.
        image_url:
          type: string
          description: Publicly accessible image URL or data URL used by image input parts.
        file_id:
          type: string
          description: Referenced file identifier.
        file_url:
          type: string
          description: Referenced file URL.
        detail:
          type: string
          description: 'Detail level for image understanding, when supported.'
        annotations:
          type: array
          description: Optional annotations attached to the content part.
          items:
            type: object
            additionalProperties: true
      additionalProperties: true
    ResponseInputItem:
      type: object
      description: Structured input item for the Responses protocol.
      properties:
        type:
          type: string
          description: 'Input item type, such as message.'
        role:
          type: string
          description: Role associated with the input item.
        content:
          description: 'Input content, either plain text or structured parts.'
          oneOf:
            - type: string
              description: Plain text input.
            - type: array
              description: Structured content part array.
              items:
                $ref: '#/components/schemas/ResponseContentPart'
      additionalProperties: true
    CreateResponseRequest:
      type: object
      description: Responses protocol request body.
      properties:
        model:
          type: string
          description: Model ID to invoke.
        input:
          description: 'Input payload, either plain text or an array of structured items.'
          oneOf:
            - type: string
              description: Plain text input.
            - type: array
              description: Structured input array.
              items:
                $ref: '#/components/schemas/ResponseInputItem'
        stream:
          type: boolean
          description: Whether to return the response as a stream.
          default: false
      required:
        - model
        - input
      additionalProperties: true
    ResponseOutputItem:
      type: object
      description: A single item in a Responses output array.
      properties:
        id:
          type: string
          description: Unique identifier for the output item.
        type:
          type: string
          description: 'Output item type, such as message or tool_call.'
        role:
          type: string
          description: Role associated with the output item.
        status:
          type: string
          description: 'Processing status for the output item, when present.'
        content:
          type: array
          description: Structured output content parts.
          items:
            $ref: '#/components/schemas/ResponseContentPart'
      additionalProperties: true
    ResponseObject:
      type: object
      description: Responses protocol success response.
      properties:
        id:
          type: string
          description: Unique response ID.
        object:
          type: string
          description: 'Object type, usually response.'
        model:
          type: string
          description: Model ID actually used for the request.
        status:
          type: string
          description: 'Response processing status, such as completed, failed, or incomplete.'
        created_at:
          type: integer
          description: Unix timestamp in seconds when the response was created.
        output_text:
          type: string
          description: 'Convenience text output aggregated from output content, when provided.'
        output:
          type: array
          description: 'Generated output items. Vendors may include messages, tool calls, reasoning, or other structured records.'
          items:
            $ref: '#/components/schemas/ResponseOutputItem'
        error:
          type:
            - object
            - 'null'
          description: Error information when response generation fails.
          additionalProperties: true
        incomplete_details:
          type:
            - object
            - 'null'
          description: Details explaining why a response is incomplete.
          additionalProperties: true
        usage:
          $ref: '#/components/schemas/Usage'
      additionalProperties: true
    CreateEmbeddingRequest:
      type: object
      description: Embeddings request body.
      properties:
        model:
          type: string
          description: Model ID to invoke.
        input:
          description: Text input to embed. Can be one string or multiple strings.
          oneOf:
            - type: string
              description: Single input string.
            - type: array
              description: Multiple input strings.
              items:
                type: string
        encoding_format:
          type: string
          description: Encoding format for the returned vectors.
          enum:
            - float
            - base64
          default: float
        dimensions:
          type: integer
          description: Requested output vector dimensions. Supported only by some models.
      required:
        - model
        - input
    EmbeddingDataItem:
      type: object
      description: A single embedding result.
      properties:
        object:
          type: string
          description: 'Object type, usually embedding.'
        embedding:
          description: 'Vector value, returned either as a float array or a base64 string.'
          oneOf:
            - type: array
              items:
                type: number
            - type: string
        index:
          type: integer
          description: Zero-based position of this result in the input list.
    EmbeddingResponse:
      type: object
      description: Embeddings success response.
      properties:
        object:
          type: string
          description: 'Object type, usually list.'
        data:
          type: array
          description: Embedding result list.
          items:
            $ref: '#/components/schemas/EmbeddingDataItem'
        model:
          type: string
          description: Model ID actually used for the request.
        usage:
          $ref: '#/components/schemas/Usage'
    CreateImageGenerationRequest:
      type: object
      description: Image generation request body.
      properties:
        model:
          type: string
          description: Model ID to invoke.
        prompt:
          type: string
          description: Prompt used to generate the image.
        'n':
          type: integer
          description: Number of images to generate.
          default: 1
        size:
          type: string
          description: Requested output image size.
          default: 1024x1024
        quality:
          type: string
          description: Requested image quality level.
          enum:
            - standard
            - hd
          default: standard
        response_format:
          type: string
          description: Format used to return the image payload.
          enum:
            - url
            - b64_json
          default: url
      required:
        - model
        - prompt
    CreateImageEditRequest:
      type: object
      description: Image editing request body.
      properties:
        model:
          type: string
          description: Model ID to invoke.
        image:
          type: array
          description: 'Input image file(s) to edit. Use the image parameter; when sending multiple files with raw multipart/curl, send repeated image[] parts.'
          items:
            type: string
            format: binary
        mask:
          type: string
          format: binary
          description: Optional mask file describing editable regions.
        prompt:
          type: string
          description: Prompt used to guide image editing.
        'n':
          type: integer
          description: Number of images to generate.
          default: 1
        size:
          type: string
          description: Requested output image size.
          default: 1024x1024
        response_format:
          type: string
          description: Format used to return the image payload.
          enum:
            - url
            - b64_json
          default: url
      required:
        - model
        - image
        - prompt
    ImageDataItem:
      type: object
      description: A single generated image result.
      properties:
        url:
          type: string
          description: Image URL when response_format=url.
        b64_json:
          type: string
          description: Base64-encoded image bytes when response_format=b64_json.
        revised_prompt:
          type: string
          description: Prompt actually used or revised by the model.
    ImageUsage:
      type: object
      description: Resource usage summary for image generation.
      properties:
        total_tokens:
          type: integer
          description: Total token count.
        input_tokens:
          type: integer
          description: Input token count.
        output_tokens:
          type: integer
          description: Output token count.
        input_tokens_details:
          type: object
          description: Optional breakdown of input token usage.
          properties:
            text_tokens:
              type: integer
              description: Input tokens attributed to text prompts.
            image_tokens:
              type: integer
              description: Input tokens attributed to images.
          additionalProperties: true
    ImageResponse:
      type: object
      description: Image generation or edit success response.
      properties:
        created:
          type: integer
          description: Unix timestamp in seconds when the response was created.
        data:
          type: array
          description: Generated image results.
          items:
            $ref: '#/components/schemas/ImageDataItem'
        background:
          type: string
          description: Background type used for the generated image.
        output_format:
          type: string
          description: 'Output image format, such as png.'
        quality:
          type: string
          description: Effective image quality used by the model.
        size:
          type: string
          description: Final returned image size.
        usage:
          $ref: '#/components/schemas/ImageUsage'
    CreateTranscriptionRequest:
      type: object
      description: Audio transcription request body.
      properties:
        model:
          type: string
          description: Model ID to invoke.
        file:
          type: string
          format: binary
          description: Audio file to transcribe.
        language:
          type: string
          description: Optional language code for the audio.
        prompt:
          type: string
          description: 'Optional prompt to bias style, formatting, or terminology.'
        response_format:
          type: string
          description: Response format for the transcription result.
          enum:
            - json
            - text
            - srt
            - verbose_json
            - vtt
          default: json
        temperature:
          type: number
          description: Sampling temperature.
          default: 0
        timestamp_granularities:
          type: array
          description: Timestamp granularities to include when response_format is verbose_json.
          items:
            type: string
            enum:
              - word
              - segment
      required:
        - model
        - file
    TranscriptionResponse:
      type: object
      description: JSON transcription response.
      properties:
        text:
          type: string
          description: Transcribed text content.
    ErrorDetail:
      type: object
      description: Error detail object.
      properties:
        message:
          type: string
          description: Human-readable error message.
        type:
          type: string
          description: Error type.
        param:
          description: 'Parameter associated with the error, if any.'
          type:
            - string
            - 'null'
        code:
          description: 'Machine-readable error code, if any.'
          type:
            - string
            - 'null'
    ErrorResponse:
      type: object
      description: Error response payload.
      properties:
        error:
          $ref: '#/components/schemas/ErrorDetail'
  securitySchemes:
    APIKeyHeader:
      type: http
      scheme: bearer
      description: 'Authenticate using Bearer token format: ''Bearer YOUR_SECRET_TOKEN'''
  responses:
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
