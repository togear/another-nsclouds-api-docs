---
openapi: 3.1.0
info:
  "$ref": "./_common.yaml#/info"
servers:
  "$ref": "./_common.yaml#/servers"
tags:
- "$ref": "./_common.yaml#/tags/0"
- "$ref": "./_common.yaml#/tags/1"
- "$ref": "./_common.yaml#/tags/2"
- "$ref": "./_common.yaml#/tags/3"
- "$ref": "./_common.yaml#/tags/4"
- name: chat_completions_anthropic
  x-parent: chat_completions
  x-page-title: Anthropic
  x-page-icon: brain
  description: Anthropic's chat completions API
- name: completions_anthropic
  x-parent: chat_completions
  x-page-title: Anthropic
  x-page-icon: brain
  description: Anthropic's text completions API
- name: messages_anthropic
  x-parent: chat_completions
  x-page-title: Anthropic
  x-page-icon: brain
  description: Anthropic's Messages protocol API
paths:
  "/v1/chat/completions":
    post:
      tags:
      - chat_completions_anthropic
      summary: Create Chat Completion
      description: Generate model responses based on input messages. Fully compatible
        with OpenAI's Chat API.
      operationId: createChatCompletion_anthropic
      security:
      - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateChatCompletionRequest"
            examples:
              default:
                summary: Basic
                description: A simple conversation example with system prompt and
                  user message.
                value:
                  model: claude-haiku-4-5-20251001
                  messages:
                  - role: system
                    content: You are a helpful assistant.
                  - role: user
                    content: Hello!
                  temperature: 1
                  max_completion_tokens: 50
                  n: 1
                  stream: false
              streaming:
                summary: Streaming
                description: Enable streaming response by setting stream True.
                value:
                  model: claude-haiku-4-5-20251001
                  messages:
                  - role: system
                    content: You are a helpful assistant.
                  - role: user
                    content: Tell me a story.
                  temperature: 0.7
                  max_completion_tokens: 100
                  stream: true
              image_input:
                summary: Image Input (Multimodal)
                description: Use vision-enabled models to analyze images.
                value:
                  model: claude-haiku-4-5-20251001
                  messages:
                  - role: user
                    content:
                    - type: text
                      text: What's in this image?
                    - type: image_url
                      image_url:
                        url: https://example.com/cat.jpg
                  max_completion_tokens: 300
              functions:
                summary: Function Calling
                description: Define tools (functions) and let the model decide whether
                  to call them.
                value:
                  model: claude-haiku-4-5-20251001
                  messages:
                  - role: user
                    content: What's the weather in Boston?
                  tools:
                  - type: function
                    function:
                      name: get_current_weather
                      description: Get the current weather in a given location
                      parameters:
                        type: object
                        properties:
                          location:
                            type: string
                            description: The city and state, e.g. San Francisco, CA
                          unit:
                            type: string
                            enum:
                            - celsius
                            - fahrenheit
                        required:
                        - location
                  tool_choice: auto
                  max_completion_tokens: 150
      responses:
        '200':
          description: Success Response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ChatCompletionResponse"
              examples:
                default-response:
                  summary: Basic Response
                  description: Response example for basic chat request.
                  value:
                    id: chatcmpl-02VKOdtBIb7RkHb97f0WePbsjjQkB
                    object: chat.completion
                    created: 1773222937
                    model: claude-haiku-4-5-20251001
                    choices:
                    - index: 0
                      message:
                        role: assistant
                        content: "Hello! How are you doing today? Is there something
                          I can help you with? \U0001F60A"
                      finish_reason: stop
                    usage:
                      completion_tokens: 23
                      prompt_tokens: 9
                      total_tokens: 32
                image_input-response:
                  summary: Image Input Response
                  description: Description generated by the model based on image content.
                  value:
                    id: chatcmpl-789
                    object: chat.completion
                    created: 1677652300
                    model: claude-haiku-4-5-20251001
                    choices:
                    - index: 0
                      message:
                        role: assistant
                        content: The image shows a cute cat sitting on a windowsill,
                          looking outside.
                      finish_reason: stop
                    usage:
                      prompt_tokens: 123
                      completion_tokens: 15
                      total_tokens: 138
                functions-response:
                  summary: Function Calling Response
                  description: Model returns a function call request.
                  value:
                    id: chatcmpl-abc
                    object: chat.completion
                    created: 1677652310
                    model: claude-haiku-4-5-20251001
                    choices:
                    - index: 0
                      message:
                        role: assistant
                        content: 
                        tool_calls:
                        - id: call_123
                          type: function
                          function:
                            name: get_current_weather
                            arguments: '{"location": "Boston, MA", "unit": "fahrenheit"}'
                      finish_reason: tool_calls
                    usage:
                      prompt_tokens: 50
                      completion_tokens: 20
                      total_tokens: 70
            text/event-stream:
              schema:
                type: string
                description: 'Streaming responses are returned in Server-Sent Events
                  format, each event is a JSON data block starting with ''data: ''
                  and ending with ''data: [DONE]''.'
              examples:
                streaming-response:
                  summary: Streaming Response Example
                  description: Shows events sent sequentially during streaming chat.
                  value: "data: {\"id\":\"chatcmpl-WWcxVVS3hexiKVbk3QCGSMV5wToGL\",\"created\":1773222960,\"model\":\"claude-haiku-4-5-20251001\",\"object\":\"chat.completion.chunk\",\"choices\":[{\"index\":0,\"delta\":{\"content\":\"Hello!
                    How are\",\"role\":\"assistant\"}}]}\ndata: {\"id\":\"chatcmpl-WWcxVVS3hexiKVbk3QCGSMV5wToGL\",\"created\":1773222960,\"model\":\"claude-haiku-4-5-20251001\",\"object\":\"chat.completion.chunk\",\"choices\":[{\"index\":0,\"delta\":{\"content\":\"
                    you doing today? Is there anything I\"}}]}\ndata: {\"id\":\"chatcmpl-WWcxVVS3hexiKVbk3QCGSMV5wToGL\",\"created\":1773222960,\"model\":\"claude-haiku-4-5-20251001\",\"object\":\"chat.completion.chunk\",\"choices\":[{\"index\":0,\"delta\":{\"content\":\"
                    can help you with?\"}}]}\ndata: {\"id\":\"chatcmpl-WWcxVVS3hexiKVbk3QCGSMV5wToGL\",\"created\":1773222960,\"model\":\"claude-haiku-4-5-20251001\",\"object\":\"chat.completion.chunk\",\"choices\":[{\"index\":0,\"delta\":{\"content\":\"
                    \"}}]}\ndata: {\"id\":\"chatcmpl-WWcxVVS3hexiKVbk3QCGSMV5wToGL\",\"created\":1773222960,\"model\":\"claude-haiku-4-5-20251001\",\"object\":\"chat.completion.chunk\",\"choices\":[{\"index\":0,\"delta\":{\"content\":\"\U0001F60A\"}}]}\ndata:
                    {\"id\":\"chatcmpl-WWcxVVS3hexiKVbk3QCGSMV5wToGL\",\"created\":1773222960,\"model\":\"claude-haiku-4-5-20251001\",\"object\":\"chat.completion.chunk\",\"choices\":[{\"finish_reason\":\"stop\",\"index\":0,\"delta\":{}}]}\ndata:
                    [DONE]\n"
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
  "/v1/completions":
    post:
      tags:
      - completions_anthropic
      summary: Create Text Completion
      description: Generate one or more completion results based on the provided prompt.
        Compatible with OpenAI's Completions API.
      operationId: createCompletion_anthropic
      security:
      - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateCompletionRequest"
            examples:
              default:
                summary: Basic
                description: A simple text completion example.
                value:
                  model: claude-haiku-4-5-20251001
                  prompt: Once upon a time
                  max_tokens: 50
                  temperature: 0.7
                  n: 1
                  stream: false
              streaming:
                summary: Streaming
                description: 'Enable streaming response by setting stream: true.'
                value:
                  model: claude-haiku-4-5-20251001
                  prompt: The future of AI is
                  max_tokens: 30
                  temperature: 0.8
                  stream: true
      responses:
        '200':
          description: Success Response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/CompletionResponse"
              examples:
                default-response:
                  summary: Basic Response
                  description: Response example for basic text completion request.
                  value:
                    id: msg_01MMX9dbQ7ZPgjhMhgLPRuCz
                    object: text_completion
                    created: 1773223039
                    model: claude-haiku-4-5-20251001
                    choices:
                    - finish_reason: stop
                      index: 0
                      text: This is a test.
                      logprobs: 
                    usage:
                      completion_tokens: 8
                      prompt_tokens: 12
                      total_tokens: 20
                      completion_tokens_details: 
                      prompt_tokens_details:
                        audio_tokens: 
                        cached_tokens: 
                        text_tokens: 
                        image_tokens: 
                        cached_tokens_details: {}
                      claude_cache_creation_5_m_tokens: 0
                      claude_cache_creation_1_h_tokens: 0
                      web_search_queries: 0
            text/event-stream:
              schema:
                type: string
                description: 'Streaming responses are returned in Server-Sent Events
                  format, each event is a JSON data block starting with ''data: ''
                  and ending with ''data: [DONE]''.'
              examples:
                streaming-response:
                  summary: Streaming Response Example
                  description: Shows events sent sequentially during streaming text
                    completion.
                  value: |
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"claude-haiku-4-5-20251001","choices":[{"text":"The","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"claude-haiku-4-5-20251001","choices":[{"text":" future","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"claude-haiku-4-5-20251001","choices":[{"text":" of","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"claude-haiku-4-5-20251001","choices":[{"text":" AI","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"claude-haiku-4-5-20251001","choices":[{"text":" is","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"claude-haiku-4-5-20251001","choices":[{"text":" bright","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"claude-haiku-4-5-20251001","choices":[{"text":".","index":0,"finish_reason":"length"}]}
                    data: [DONE]
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
  "/v1/messages":
    post:
      tags:
      - messages_anthropic
      summary: Create Message
      description: Create a message using Anthropic Messages-compatible payload.
      operationId: createMessage_anthropic
      security:
      - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateMessagesRequest"
            examples:
              default:
                summary: Basic
                value:
                  model: claude-haiku-4-5-20251001
                  messages:
                  - role: user
                    content: Hello
                  max_tokens: 128
      responses:
        '200':
          description: Success Response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/MessageResponse"
              examples:
                default:
                  summary: Basic Response
                  value:
                    id: msg_123
                    type: message
                    role: assistant
                    model: claude-haiku-4-5-20251001
                    content:
                    - type: text
                      text: Hello! How can I help you today?
                    stop_reason: end_turn
                    usage:
                      input_tokens: 12
                      output_tokens: 9
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
components:
  "$ref": "./_common.yaml#/components"
