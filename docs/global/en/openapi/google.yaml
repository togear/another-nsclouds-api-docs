---
openapi: 3.1.0
info:
  "$ref": "./_common.yaml#/info"
servers:
  "$ref": "./_common.yaml#/servers"
tags:
- "$ref": "./_common.yaml#/tags/0"
- "$ref": "./_common.yaml#/tags/1"
- "$ref": "./_common.yaml#/tags/2"
- "$ref": "./_common.yaml#/tags/3"
- "$ref": "./_common.yaml#/tags/4"
- name: chat_completions_google
  x-parent: chat_completions
  x-page-title: Google
  x-page-icon: brain
  description: Google's chat completions API
- name: completions_google
  x-parent: chat_completions
  x-page-title: Google
  x-page-icon: brain
  description: Google's text completions API
- name: messages_google
  x-parent: chat_completions
  x-page-title: Google
  x-page-icon: brain
  description: Google's Messages protocol API
- name: gemini_native_google
  x-parent: chat_completions
  x-page-title: Google
  x-page-icon: brain
  description: Google's Gemini native API
paths:
  "/v1/chat/completions":
    post:
      tags:
      - chat_completions_google
      summary: Create chat completion
      description: Generate model response based on input messages. Fully compatible
        with OpenAI's Chat API.
      operationId: createChatCompletion_google
      security:
      - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateChatCompletionRequest"
            examples:
              default:
                summary: Basic
                description: A simple conversation example with system prompt and
                  user message.
                value:
                  model: gemini-3-flash-preview
                  messages:
                  - role: system
                    content: You are a helpful assistant.
                  - role: user
                    content: Hello!
                  temperature: 1
                  max_completion_tokens: 50
                  n: 1
                  stream: false
              streaming:
                summary: Streaming
                description: 'Enable streaming response by setting stream: true.'
                value:
                  model: gemini-3-flash-preview
                  messages:
                  - role: system
                    content: You are a helpful assistant.
                  - role: user
                    content: Tell me a story.
                  temperature: 0.7
                  max_completion_tokens: 100
                  stream: true
              image_input:
                summary: Image Input (Multimodal)
                description: Use vision-enabled model to analyze images.
                value:
                  model: gemini-3-flash-preview
                  messages:
                  - role: user
                    content:
                    - type: text
                      text: What's in this image?
                    - type: image_url
                      image_url:
                        url: https://example.com/cat.jpg
                  max_completion_tokens: 300
              functions:
                summary: Function Calling
                description: Define tools (functions) and let the model decide whether
                  to call them.
                value:
                  model: gemini-3-flash-preview
                  messages:
                  - role: user
                    content: What's the weather in Boston?
                  tools:
                  - type: function
                    function:
                      name: get_current_weather
                      description: Get the current weather in a given location
                      parameters:
                        type: object
                        properties:
                          location:
                            type: string
                            description: The city and state, e.g. San Francisco, CA
                          unit:
                            type: string
                            enum:
                            - celsius
                            - fahrenheit
                        required:
                        - location
                  tool_choice: auto
                  max_completion_tokens: 150
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ChatCompletionResponse"
              examples:
                default-response:
                  summary: Basic Response
                  description: Response example corresponding to basic chat request.
                  value:
                    id: chatcmpl-9AP1q66BDnIuuBx14ROTmOQFTQjZm
                    object: chat.completion
                    created: 1773220495
                    model: gemini-3-flash-preview
                    choices:
                    - index: 0
                      message:
                        role: assistant
                        content: Hello! How can I help you today?
                      finish_reason: stop
                    usage:
                      completion_tokens: 363
                      prompt_tokens: 2
                      total_tokens: 365
                      completion_tokens_details:
                        reasoning_tokens: 354
                image_input-response:
                  summary: Image Input Response
                  description: Model's description generated based on image content.
                  value:
                    id: chatcmpl-789
                    object: chat.completion
                    created: 1677652300
                    model: gemini-3-flash-preview
                    choices:
                    - index: 0
                      message:
                        role: assistant
                        content: The image shows a cute cat sitting on a windowsill,
                          looking outside.
                      finish_reason: stop
                    usage:
                      prompt_tokens: 123
                      completion_tokens: 15
                      total_tokens: 138
                functions-response:
                  summary: Function Call Response
                  description: Model returns a function call request.
                  value:
                    id: chatcmpl-abc
                    object: chat.completion
                    created: 1677652310
                    model: gemini-3-flash-preview
                    choices:
                    - index: 0
                      message:
                        role: assistant
                        content: 
                        tool_calls:
                        - id: call_123
                          type: function
                          function:
                            name: get_current_weather
                            arguments: '{"location": "Boston, MA", "unit": "fahrenheit"}'
                      finish_reason: tool_calls
                    usage:
                      prompt_tokens: 50
                      completion_tokens: 20
                      total_tokens: 70
            text/event-stream:
              schema:
                type: string
                description: 'Streaming response is returned in Server-Sent Events
                  format, each event is a line of JSON data block starting with ''data:
                  '', ending with ''data: [DONE]''.'
              examples:
                streaming-response:
                  summary: Streaming Response Example
                  description: Shows events sent continuously during streaming chat
                    process.
                  value: |
                    data: {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"gemini-3-flash-preview","choices":[{"index":0,"delta":{"role":"assistant"},"finish_reason":null}]}
                    data: {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"gemini-3-flash-preview","choices":[{"index":0,"delta":{"content":"Hello"},"finish_reason":null}]}
                    data: {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"gemini-3-flash-preview","choices":[{"index":0,"delta":{"content":" there!"},"finish_reason":null}]}
                    data: {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"gemini-3-flash-preview","choices":[{"index":0,"delta":{},"finish_reason":"stop"}]}
                    data: [DONE]
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
  "/v1/completions":
    post:
      tags:
      - completions_google
      summary: Create text completion
      description: Generate one or more completions based on the provided prompt.
        Compatible with OpenAI's Completions API.
      operationId: createCompletion_google
      security:
      - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateCompletionRequest"
            examples:
              default:
                summary: Basic
                description: A simple text completion example.
                value:
                  model: gemini-3-flash-preview
                  prompt: Once upon a time
                  max_tokens: 50
                  temperature: 0.7
                  n: 1
                  stream: false
              streaming:
                summary: Streaming
                description: 'Enable streaming response by setting stream: true.'
                value:
                  model: gemini-3-flash-preview
                  prompt: The future of AI is
                  max_tokens: 30
                  temperature: 0.8
                  stream: true
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/CompletionResponse"
              examples:
                default-response:
                  summary: Basic Response
                  description: Response example corresponding to basic text completion
                    request.
                  value:
                    id: chatcmpl-a51a50d7-0f0a-4db9-a268-ba0e4d49342b
                    object: text_completion
                    created: 1773220530
                    model: gemini-3-flash-preview
                    choices:
                    - finish_reason: length
                      index: 0
                      text: ''
                      logprobs: 
                    usage:
                      completion_tokens: 12
                      prompt_tokens: 6
                      total_tokens: 18
                      completion_tokens_details:
                        accepted_prediction_tokens: 
                        audio_tokens: 
                        reasoning_tokens: 12
                        rejected_prediction_tokens: 
                        text_tokens: 
                      prompt_tokens_details:
                        audio_tokens: 
                        cached_tokens: 
                        text_tokens: 6
                        image_tokens: 
                        cached_tokens_details: {}
                      claude_cache_creation_5_m_tokens: 0
                      claude_cache_creation_1_h_tokens: 0
                      web_search_queries: 0
            text/event-stream:
              schema:
                type: string
                description: 'Streaming response is returned in Server-Sent Events
                  format, each event is a line of JSON data block starting with ''data:
                  '', ending with ''data: [DONE]''.'
              examples:
                streaming-response:
                  summary: Streaming Response Example
                  description: Shows events sent continuously during streaming text
                    completion process.
                  value: |
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"gemini-3-flash-preview","choices":[{"text":"The","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"gemini-3-flash-preview","choices":[{"text":" future","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"gemini-3-flash-preview","choices":[{"text":" of","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"gemini-3-flash-preview","choices":[{"text":" AI","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"gemini-3-flash-preview","choices":[{"text":" is","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"gemini-3-flash-preview","choices":[{"text":" bright","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"gemini-3-flash-preview","choices":[{"text":".","index":0,"finish_reason":"length"}]}
                    data: [DONE]
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
  "/v1/messages":
    post:
      tags:
      - messages_google
      summary: Create Message
      description: Create a message using the Messages-compatible payload.
      operationId: createMessage_google
      security:
      - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - model
              - messages
              properties:
                model:
                  type: string
                messages:
                  type: array
                  items:
                    type: object
                    required:
                    - role
                    - content
                    properties:
                      role:
                        type: string
                      content:
                        oneOf:
                        - type: string
                        - type: array
                          items:
                            type: object
                max_tokens:
                  type: integer
                stream:
                  type: boolean
                  default: false
            examples:
              default:
                summary: Basic
                value:
                  model: gemini-3-flash-preview
                  messages:
                  - role: user
                    content: Hello
                  max_tokens: 128
      responses:
        '200':
          description: Success Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              examples:
                default:
                  summary: Basic Response
                  value:
                    id: msg_123
                    type: message
                    role: assistant
                    model: gemini-3-flash-preview
                    content:
                    - type: text
                      text: Hello! How can I help you today?
                    stop_reason: end_turn
                    usage:
                      input_tokens: 12
                      output_tokens: 9
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
  "/v1/models/{model}:generateContent":
    post:
      tags:
      - gemini_native_google
      summary: Gemini Generate Content (v1)
      description: Gemini native protocol endpoint for generateContent.
      operationId: generateContentV1_google
      security:
      - APIKeyHeader: []
      parameters:
      - name: model
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            examples:
              default:
                summary: Basic
                value:
                  contents:
                  - role: user
                    parts:
                    - text: Hello
      responses:
        '200':
          description: Success Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              examples:
                default:
                  summary: Basic Response
                  value:
                    candidates:
                    - content:
                        role: model
                        parts:
                        - text: Hello! How can I help you today?
                      finishReason: STOP
                    modelVersion: gemini-3-flash-preview
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
  "/v1beta/models/{model}:generateContent":
    post:
      tags:
      - gemini_native_google
      summary: Gemini Generate Content (v1beta)
      description: Gemini native protocol endpoint for generateContent (v1beta).
      operationId: generateContentV1beta_google
      security:
      - APIKeyHeader: []
      parameters:
      - name: model
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            examples:
              default:
                summary: Basic
                value:
                  contents:
                  - role: user
                    parts:
                    - text: Hello
      responses:
        '200':
          description: Success Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              examples:
                default:
                  summary: Basic Response
                  value:
                    candidates:
                    - content:
                        role: model
                        parts:
                        - text: Hello! How can I help you today?
                      finishReason: STOP
                    modelVersion: gemini-3-flash-preview
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
  "/v1beta/models/{model}:streamGenerateContent":
    post:
      tags:
      - gemini_native_google
      summary: Gemini Stream Generate Content (v1beta)
      description: Gemini native protocol endpoint for streamGenerateContent (v1beta).
      operationId: streamGenerateContentV1beta_google
      security:
      - APIKeyHeader: []
      parameters:
      - name: model
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            examples:
              default:
                summary: Streaming
                value:
                  contents:
                  - role: user
                    parts:
                    - text: Tell me a short greeting
      responses:
        '200':
          description: Success Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              examples:
                default:
                  summary: Basic Response
                  value:
                    candidates:
                    - content:
                        role: model
                        parts:
                        - text: Hello there!
                      finishReason: STOP
            text/event-stream:
              schema:
                type: string
                description: Server-Sent Events stream.
              examples:
                default:
                  summary: Streaming Response
                  value: |
                    data: {"candidates":[{"content":{"role":"model","parts":[{"text":"Hello"}]}}]}
                    data: {"candidates":[{"content":{"role":"model","parts":[{"text":" there!"}]},"finishReason":"STOP"}]}
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
components:
  "$ref": "./_common.yaml#/components"
