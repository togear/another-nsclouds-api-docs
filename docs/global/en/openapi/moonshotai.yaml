---
openapi: 3.1.0
info:
  "$ref": "./_common.yaml#/info"
servers:
  "$ref": "./_common.yaml#/servers"
tags:
- "$ref": "./_common.yaml#/tags/0"
- "$ref": "./_common.yaml#/tags/1"
- "$ref": "./_common.yaml#/tags/2"
- "$ref": "./_common.yaml#/tags/3"
- "$ref": "./_common.yaml#/tags/4"
- name: chat_completions_moonshotai
  x-parent: chat_completions
  x-page-title: Moonshot AI
  x-page-icon: brain
  description: Moonshot AI's chat completions API
- name: completions_moonshotai
  x-parent: chat_completions
  x-page-title: Moonshot AI
  x-page-icon: brain
  description: Moonshot AI's text completions API
- name: messages_moonshotai
  x-parent: chat_completions
  x-page-title: Moonshot AI
  x-page-icon: brain
  description: Moonshot AI's Messages protocol API
paths:
  "/v1/chat/completions":
    post:
      tags:
      - chat_completions_moonshotai
      summary: Create Chat Completion
      description: Generate model responses based on input messages. Fully compatible
        with OpenAI's Chat API.
      operationId: createChatCompletion_moonshotai
      security:
      - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateChatCompletionRequest"
            examples:
              default:
                summary: Basic
                description: A simple conversation example with system prompt and
                  user message.
                value:
                  model: moonshotai/kimi-k2.6
                  messages:
                  - role: system
                    content: You are a helpful assistant.
                  - role: user
                    content: Hello!
                  temperature: 1
                  max_completion_tokens: 50
                  n: 1
                  stream: false
              streaming:
                summary: Streaming
                description: 'Enable streaming response by setting stream: true.'
                value:
                  model: moonshotai/kimi-k2.6
                  messages:
                  - role: system
                    content: You are a helpful assistant.
                  - role: user
                    content: Tell me a story.
                  temperature: 0.7
                  max_completion_tokens: 100
                  stream: true
              image_input:
                summary: Image Input (Multimodal)
                description: Use vision-enabled models to analyze images.
                value:
                  model: moonshotai/kimi-k2.6
                  messages:
                  - role: user
                    content:
                    - type: text
                      text: What's in this image?
                    - type: image_url
                      image_url:
                        url: https://example.com/cat.jpg
                  max_completion_tokens: 300
              functions:
                summary: Function Calling
                description: Define tools (functions) and let the model decide whether
                  to call them.
                value:
                  model: moonshotai/kimi-k2.6
                  messages:
                  - role: user
                    content: What's the weather in Boston?
                  tools:
                  - type: function
                    function:
                      name: get_current_weather
                      description: Get the current weather in a given location
                      parameters:
                        type: object
                        properties:
                          location:
                            type: string
                            description: The city and state, e.g. San Francisco, CA
                          unit:
                            type: string
                            enum:
                            - celsius
                            - fahrenheit
                        required:
                        - location
                  tool_choice: auto
                  max_completion_tokens: 150
      responses:
        '200':
          description: Success Response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ChatCompletionResponse"
              examples:
                default-response:
                  summary: Basic Response
                  description: Response example for basic chat request.
                  value:
                    id: chatcmpl-8415e78a-7989-99de-9e4f-2b0ec895f35f
                    object: chat.completion
                    created: 1773224824
                    model: moonshotai/kimi-k2.6
                    choices:
                    - index: 0
                      message:
                        role: assistant
                        content: "Hello! How can I help you today? \U0001F60A"
                        reasoning_content: ''
                      finish_reason: stop
                      provider_specific_fields: {}
                    usage:
                      prompt_tokens: 11
                      completion_tokens: 12
                      total_tokens: 23
                      completion_tokens_details:
                        text_tokens: 12
                      prompt_tokens_details:
                        cached_tokens: 0
                        text_tokens: 11
                image_input-response:
                  summary: Image Input Response
                  description: Description generated by the model based on image content.
                  value:
                    id: chatcmpl-789
                    object: chat.completion
                    created: 1677652300
                    model: moonshotai/kimi-k2.6
                    choices:
                    - index: 0
                      message:
                        role: assistant
                        content: The image shows a cute cat sitting on a windowsill,
                          looking outside.
                      finish_reason: stop
                    usage:
                      prompt_tokens: 123
                      completion_tokens: 15
                      total_tokens: 138
                functions-response:
                  summary: Function Calling Response
                  description: Model returns a function call request.
                  value:
                    id: chatcmpl-abc
                    object: chat.completion
                    created: 1677652310
                    model: moonshotai/kimi-k2.6
                    choices:
                    - index: 0
                      message:
                        role: assistant
                        content: 
                        tool_calls:
                        - id: call_123
                          type: function
                          function:
                            name: get_current_weather
                            arguments: '{"location": "Boston, MA", "unit": "fahrenheit"}'
                      finish_reason: tool_calls
                    usage:
                      prompt_tokens: 50
                      completion_tokens: 20
                      total_tokens: 70
            text/event-stream:
              schema:
                type: string
                description: 'Streaming responses are returned in Server-Sent Events
                  format, each event is a JSON data block starting with ''data: ''
                  and ending with ''data: [DONE]''.'
              examples:
                streaming-response:
                  summary: Streaming Response Example
                  description: Shows events sent sequentially during streaming chat
                    process.
                  value: |
                    data: {"id":"chatcmpl-907c71cf-c857-907c-bfd4-238a07d3888f","object":"chat.completion.chunk","created":1773224832,"model":"moonshotai/kimi-k2.6","choices":[{"index":0,"delta":{"content":"Hello","role":"assistant"}}],"usage":{"completion_tokens":0,"prompt_tokens":0,"total_tokens":0}}
                    data: {"id":"chatcmpl-907c71cf-c857-907c-bfd4-238a07d3888f","object":"chat.completion.chunk","created":1773224832,"model":"moonshotai/kimi-k2.6","choices":[{"index":0,"delta":{"content":" there"}}],"usage":{"completion_tokens":0,"prompt_tokens":0,"total_tokens":0}}
                    data: {"id":"chatcmpl-907c71cf-c857-907c-bfd4-238a07d3888f","object":"chat.completion.chunk","created":1773224832,"model":"moonshotai/kimi-k2.6","choices":[{"index":0,"delta":{"content":"!"}}],"usage":{"completion_tokens":0,"prompt_tokens":0,"total_tokens":0}}
                    data: {"id":"chatcmpl-907c71cf-c857-907c-bfd4-238a07d3888f","object":"chat.completion.chunk","created":1773224832,"model":"moonshotai/kimi-k2.6","choices":[{"index":0,"delta":{"content":" How"}}],"usage":{"completion_tokens":0,"prompt_tokens":0,"total_tokens":0}}
                    data: {"id":"chatcmpl-907c71cf-c857-907c-bfd4-238a07d3888f","object":"chat.completion.chunk","created":1773224832,"model":"moonshotai/kimi-k2.6","choices":[{"index":0,"delta":{"content":" can"}}],"usage":{"completion_tokens":0,"prompt_tokens":0,"total_tokens":0}}
                    data: {"id":"chatcmpl-907c71cf-c857-907c-bfd4-238a07d3888f","object":"chat.completion.chunk","created":1773224832,"model":"moonshotai/kimi-k2.6","choices":[{"index":0,"delta":{"content":" I"}}],"usage":{"completion_tokens":0,"prompt_tokens":0,"total_tokens":0}}
                    data: {"id":"chatcmpl-907c71cf-c857-907c-bfd4-238a07d3888f","object":"chat.completion.chunk","created":1773224832,"model":"moonshotai/kimi-k2.6","choices":[{"index":0,"delta":{"content":" help"}}],"usage":{"completion_tokens":0,"prompt_tokens":0,"total_tokens":0}}
                    data: {"id":"chatcmpl-907c71cf-c857-907c-bfd4-238a07d3888f","object":"chat.completion.chunk","created":1773224832,"model":"moonshotai/kimi-k2.6","choices":[{"index":0,"delta":{"content":" you"}}],"usage":{"completion_tokens":0,"prompt_tokens":0,"total_tokens":0}}
                    data: {"id":"chatcmpl-907c71cf-c857-907c-bfd4-238a07d3888f","object":"chat.completion.chunk","created":1773224832,"model":"moonshotai/kimi-k2.6","choices":[{"index":0,"delta":{"content":" today"}}],"usage":{"completion_tokens":0,"prompt_tokens":0,"total_tokens":0}}
                    data: {"id":"chatcmpl-907c71cf-c857-907c-bfd4-238a07d3888f","object":"chat.completion.chunk","created":1773224832,"model":"moonshotai/kimi-k2.6","choices":[{"index":0,"delta":{"content":"?"}}],"usage":{"completion_tokens":0,"prompt_tokens":0,"total_tokens":0}}
                    data: {"id":"chatcmpl-907c71cf-c857-907c-bfd4-238a07d3888f","object":"chat.completion.chunk","created":1773224832,"model":"moonshotai/kimi-k2.6","choices":[{"finish_reason":"stop","index":0,"delta":{}}],"usage":{"completion_tokens":0,"prompt_tokens":0,"total_tokens":0}}
                    data: [DONE]
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
  "/v1/completions":
    post:
      tags:
      - completions_moonshotai
      summary: Create Text Completion
      description: Generate one or more completions based on provided prompts. Compatible
        with OpenAI's Completions API.
      operationId: createCompletion_moonshotai
      security:
      - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateCompletionRequest"
            examples:
              default:
                summary: Basic
                description: A simple text completion example.
                value:
                  model: moonshotai/kimi-k2.6
                  prompt: Once upon a time
                  max_tokens: 50
                  temperature: 0.7
                  n: 1
                  stream: false
              streaming:
                summary: Streaming
                description: 'Enable streaming response by setting stream: true.'
                value:
                  model: moonshotai/kimi-k2.6
                  prompt: The future of AI is
                  max_tokens: 30
                  temperature: 0.8
                  stream: true
      responses:
        '200':
          description: Success Response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/CompletionResponse"
              examples:
                default-response:
                  summary: Basic Response
                  description: Response example for basic text completion request.
                  value:
                    id: cmpl-123
                    object: text_completion
                    created: 1677652288
                    model: moonshotai/kimi-k2.6
                    choices:
                    - text: " in a small village, there lived a young girl named Lily."
                      index: 0
                      finish_reason: length
                    usage:
                      prompt_tokens: 4
                      completion_tokens: 12
                      total_tokens: 16
            text/event-stream:
              schema:
                type: string
                description: 'Streaming responses are returned in Server-Sent Events
                  format, each event is a JSON data block starting with ''data: ''
                  and ending with ''data: [DONE]''.'
              examples:
                streaming-response:
                  summary: Streaming Response Example
                  description: Shows events sent sequentially during streaming text
                    completion process.
                  value: |
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"moonshotai/kimi-k2.6","choices":[{"text":"The","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"moonshotai/kimi-k2.6","choices":[{"text":" future","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"moonshotai/kimi-k2.6","choices":[{"text":" of","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"moonshotai/kimi-k2.6","choices":[{"text":" AI","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"moonshotai/kimi-k2.6","choices":[{"text":" is","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"moonshotai/kimi-k2.6","choices":[{"text":" bright","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"moonshotai/kimi-k2.6","choices":[{"text":".","index":0,"finish_reason":"length"}]}
                    data: [DONE]
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
  "/v1/messages":
    post:
      tags:
      - messages_moonshotai
      summary: Create Message
      description: Create a message using Anthropic Messages-compatible payload.
      operationId: createMessage_moonshotai
      security:
      - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - model
              - messages
              properties:
                model:
                  type: string
                messages:
                  type: array
                  items:
                    type: object
                    required:
                    - role
                    - content
                    properties:
                      role:
                        type: string
                      content:
                        oneOf:
                        - type: string
                        - type: array
                          items:
                            type: object
                max_tokens:
                  type: integer
                stream:
                  type: boolean
                  default: false
            examples:
              default:
                summary: Basic
                value:
                  model: moonshotai/kimi-k2.6
                  messages:
                  - role: user
                    content: Hello
                  max_tokens: 128
      responses:
        '200':
          description: Success Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              examples:
                default:
                  summary: Basic Response
                  value:
                    id: msg_123
                    type: message
                    role: assistant
                    model: moonshotai/kimi-k2.6
                    content:
                    - type: text
                      text: Hello! How can I help you today?
                    stop_reason: end_turn
                    usage:
                      input_tokens: 12
                      output_tokens: 9
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
components:
  "$ref": "./_common.yaml#/components"
