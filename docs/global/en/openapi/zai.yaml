---
openapi: 3.1.0
info:
  "$ref": "./_common.yaml#/info"
servers:
  "$ref": "./_common.yaml#/servers"
tags:
- "$ref": "./_common.yaml#/tags/0"
- "$ref": "./_common.yaml#/tags/1"
- "$ref": "./_common.yaml#/tags/2"
- "$ref": "./_common.yaml#/tags/3"
- "$ref": "./_common.yaml#/tags/4"
- name: chat_completions_zai
  x-parent: chat_completions
  x-page-title: Z.AI
  x-page-icon: brain
  description: Z.AI's chat completions API
- name: responses_zai
  x-parent: chat_completions
  x-page-title: Z.AI
  x-page-icon: brain
  description: Z.AI's Responses API
- name: image_generations_zai
  x-parent: image_generations
  x-page-title: Z.AI
  x-page-icon: image
  description: Z.AI's image generations API
- name: audio_transcriptions_zai
  x-parent: audio_transcriptions
  x-page-title: Z.AI
  x-page-icon: mic
  description: Z.AI's audio transcriptions API
paths:
  "/v1/chat/completions":
    post:
      tags:
      - chat_completions_zai
      summary: Create chat completion
      description: Provides an OpenAI-compatible Chat Completions endpoint. Supported
        parameters and behavior may vary by model.
      operationId: createChatCompletion_zai
      security:
      - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateChatCompletionRequest"
            examples:
              default:
                summary: Basic
                description: A simple conversation example with system prompt and
                  user message.
                value:
                  model: glm-4.6v
                  messages:
                  - role: system
                    content: You are a helpful assistant.
                  - role: user
                    content: Hello!
                  temperature: 1
                  max_completion_tokens: 50
                  n: 1
                  stream: false
              streaming:
                summary: Streaming
                description: 'Enable streaming response by setting stream: true.'
                value:
                  model: glm-4.6v
                  messages:
                  - role: system
                    content: You are a helpful assistant.
                  - role: user
                    content: Tell me a story.
                  temperature: 0.7
                  max_completion_tokens: 100
                  stream: true
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ChatCompletionResponse"
              examples:
                default-response:
                  summary: Basic Response
                  description: Response example corresponding to basic chat request.
                  value:
                    id: chatcmpl-123
                    object: chat.completion
                    created: 1677652288
                    model: glm-4.6v
                    choices:
                    - index: 0
                      message:
                        role: assistant
                        content: Hello there! How can I assist you today?
                      finish_reason: stop
                    usage:
                      prompt_tokens: 9
                      completion_tokens: 12
                      total_tokens: 21
            text/event-stream:
              schema:
                type: string
                description: 'Streaming response is returned in Server-Sent Events
                  format, each event is a line of JSON data block starting with ''data:
                  '', ending with ''data: [DONE]''.'
              examples:
                streaming-response:
                  summary: Streaming Response Example
                  description: Shows events sent continuously during streaming chat
                    process.
                  value: |
                    data: {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"glm-4.6v","choices":[{"index":0,"delta":{"role":"assistant"},"finish_reason":null}]}
                    data: {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"glm-4.6v","choices":[{"index":0,"delta":{"content":"Hello"},"finish_reason":null}]}
                    data: {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"glm-4.6v","choices":[{"index":0,"delta":{"content":" there!"},"finish_reason":null}]}
                    data: {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"glm-4.6v","choices":[{"index":0,"delta":{},"finish_reason":"stop"}]}
                    data: [DONE]
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
  "/v1/responses":
    post:
      tags:
      - responses_zai
      summary: Create Response
      description: Provides an OpenAI-compatible Responses endpoint. Supported parameters
        and behavior may vary by model.
      operationId: createResponse_zai
      security:
      - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateResponseRequest"
            examples:
              default:
                summary: Basic
                description: A simple text-only Responses request.
                value:
                  model: glm-4.7
                  input: Hello
                  stream: false
              streaming:
                summary: Streaming
                description: Enable semantic event streaming by setting stream to
                  true.
                value:
                  model: glm-4.7
                  input:
                  - role: user
                    content:
                    - type: input_text
                      text: Write a short welcome message for a new user.
                  stream: true
      responses:
        '200':
          description: Success Response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ResponseObject"
              examples:
                default:
                  summary: Basic Response
                  value:
                    id: resp_123
                    object: response
                    model: glm-4.7
                    output:
                    - id: msg_123
                      type: message
                      role: assistant
                      status: completed
                      content:
                      - type: output_text
                        text: Hello! How can I help you today?
                    usage:
                      input_tokens: 12
                      output_tokens: 9
                      total_tokens: 21
            text/event-stream:
              schema:
                type: string
                description: Responses streaming returns Server-Sent Events with typed
                  semantic event payloads.
              examples:
                streaming-response:
                  summary: Streaming Response Example
                  description: Shows a minimal sequence of semantic events emitted
                    during Responses streaming.
                  value: |
                    data: {"type":"response.created","sequence_number":0,"response":{"id":"resp_123","object":"response","created_at":1741487325,"status":"in_progress","model":"glm-4.7"}}
                    data: {"type":"response.output_text.delta","sequence_number":1,"item_id":"msg_123","output_index":0,"content_index":0,"delta":"Hello"}
                    data: {"type":"response.output_text.delta","sequence_number":2,"item_id":"msg_123","output_index":0,"content_index":0,"delta":" there!"}
                    data: {"type":"response.completed","sequence_number":3,"response":{"id":"resp_123","object":"response","created_at":1741487325,"status":"completed","model":"glm-4.7","output":[{"id":"msg_123","type":"message","role":"assistant","status":"completed","content":[{"type":"output_text","text":"Hello there!"}]}]}}
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
  "/v1/images/generations":
    post:
      tags:
      - image_generations_zai
      summary: Create Image
      description: Provides an OpenAI-compatible Images generation endpoint. Supported
        capabilities may vary by model.
      operationId: createImageGeneration_zai
      security:
      - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateImageGenerationRequest"
            examples:
              default:
                summary: Basic
                description: Generate a 1024x1024 image.
                value:
                  model: cogview-4-250304
                  prompt: A cute cat sitting on a windowsill
                  n: 1
                  size: 1024x1024
              hd-quality:
                summary: HD Quality
                description: Generate high-definition quality images.
                value:
                  model: cogview-4-250304
                  prompt: A futuristic cityscape at sunset
                  n: 1
                  quality: hd
                  size: 1792x1024
              b64-json:
                summary: Base64 Format
                description: Return base64-encoded image data.
                value:
                  model: cogview-4-250304
                  prompt: A beautiful landscape
                  n: 2
                  size: 512x512
                  response_format: b64_json
      responses:
        '200':
          description: Success Response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ImageResponse"
              examples:
                default-response:
                  summary: Basic Response
                  description: Complete response containing image URL and optional
                    fields.
                  value:
                    created: 1680000000
                    background: opaque
                    output_format: png
                    quality: high
                    size: 1024x1024
                    data:
                    - url: https://example.com/images/cat.png
                      revised_prompt: A cute cat sitting on a windowsill, looking
                        out at a garden
                    usage:
                      total_tokens: 100
                      input_tokens: 50
                      output_tokens: 50
                      input_tokens_details:
                        text_tokens: 10
                        image_tokens: 40
                b64-response:
                  summary: Base64 Response
                  description: Response containing base64-encoded image data and optional
                    fields.
                  value:
                    created: 1680000001
                    background: opaque
                    output_format: png
                    quality: high
                    size: 1024x1024
                    data:
                    - b64_json: iVBORw0KGgoAAAANSUhEUgAA...
                      revised_prompt: A beautiful landscape with mountains and a lake
                    - b64_json: iVBORw0KGgoAAAANSUhEUgAA...
                    usage:
                      total_tokens: 200
                      input_tokens: 100
                      output_tokens: 100
                      input_tokens_details:
                        text_tokens: 20
                        image_tokens: 80
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
  "/v1/audio/transcriptions":
    post:
      tags:
      - audio_transcriptions_zai
      summary: Audio Transcription
      description: Provides an OpenAI-compatible Audio Transcriptions endpoint. Supported
        capabilities may vary by model.
      operationId: createTranscription_zai
      security:
      - APIKeyHeader: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              "$ref": "#/components/schemas/CreateTranscriptionRequest"
            examples:
              default:
                summary: Basic
                description: Transcribe audio file to JSON format.
                value:
                  model: glm-asr-2512
                  file: "(binary)"
                  response_format: json
              with-timestamps:
                summary: With Timestamps
                description: Get detailed transcription with word-level timestamps.
                value:
                  model: glm-asr-2512
                  file: "(binary)"
                  response_format: verbose_json
                  timestamp_granularities:
                  - word
              srt-format:
                summary: SRT Subtitles
                description: Return transcription in SRT subtitle format.
                value:
                  model: glm-asr-2512
                  file: "(binary)"
                  response_format: srt
      responses:
        '200':
          description: Success Response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/TranscriptionResponse"
              examples:
                json-response:
                  summary: JSON Response
                  description: Default JSON format transcription.
                  value:
                    text: Hello, this is a test transcription.
                verbose-json-response:
                  summary: Verbose JSON Response
                  description: Detailed transcription with word-level timestamps.
                  value:
                    task: transcribe
                    language: english
                    duration: 2.95
                    text: Hello, this is a test transcription.
                    words:
                    - word: Hello
                      start: 0.1
                      end: 0.5
                    - word: this
                      start: 0.6
                      end: 0.8
                    - word: is
                      start: 0.9
                      end: 1
                    - word: a
                      start: 1.1
                      end: 1.2
                    - word: test
                      start: 1.3
                      end: 1.8
                    - word: transcription
                      start: 1.9
                      end: 2.8
            application/x-srt:
              schema:
                type: string
                description: Transcription in SRT subtitle format.
              examples:
                srt-response:
                  summary: SRT Response
                  value: |
                    1
                    00:00:00,100 --> 00:00:00,500
                    Hello

                    2
                    00:00:00,600 --> 00:00:00,800
                    this

                    3
                    00:00:00,900 --> 00:00:01,000
                    is

                    4
                    00:00:01,100 --> 00:00:01,200
                    a

                    5
                    00:00:01,300 --> 00:00:01,800
                    test

                    6
                    00:00:01,900 --> 00:00:02,800
                    transcription
            text/plain:
              schema:
                type: string
                description: Transcription in plain text format.
              examples:
                text-response:
                  summary: Plain Text Response
                  value: Hello, this is a test transcription.
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
components:
  "$ref": "./_common.yaml#/components"
