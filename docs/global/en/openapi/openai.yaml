---
openapi: 3.1.0
info:
  "$ref": "./_common.yaml#/info"
servers:
  "$ref": "./_common.yaml#/servers"
tags:
- "$ref": "./_common.yaml#/tags/0"
- "$ref": "./_common.yaml#/tags/1"
- "$ref": "./_common.yaml#/tags/2"
- "$ref": "./_common.yaml#/tags/3"
- "$ref": "./_common.yaml#/tags/4"
- name: chat_completions_openai
  x-parent: chat_completions
  x-page-title: OpenAI
  x-page-icon: brain
  description: OpenAI's chat completions API
- name: messages_openai
  x-parent: chat_completions
  x-page-title: OpenAI
  x-page-icon: brain
  description: OpenAI's Messages protocol API
- name: responses_openai
  x-parent: chat_completions
  x-page-title: OpenAI
  x-page-icon: brain
  description: OpenAI's Responses API
- name: image_generations_openai
  x-parent: image_generations
  x-page-title: OpenAI
  x-page-icon: image
  description: OpenAI's image generations API
- name: image_edits_openai
  x-parent: image_edits
  x-page-title: OpenAI
  x-page-icon: image
  description: OpenAI's image edits API
paths:
  "/v1/chat/completions":
    post:
      tags:
      - chat_completions_openai
      summary: Create Chat Completion
      description: Follows the OpenAI Chat Completions protocol.
      operationId: createChatCompletion_openai
      security:
      - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateChatCompletionRequest"
            examples:
              default:
                summary: Basic
                description: A simple conversation using the developer role plus a
                  user message.
                value:
                  model: gpt-5
                  messages:
                  - role: developer
                    content: You are a helpful assistant.
                  - role: user
                    content: Hello!
                  temperature: 1
                  max_completion_tokens: 50
                  n: 1
                  stream: false
              streaming:
                summary: Streaming
                description: Enable streaming response and include a final usage chunk.
                value:
                  model: gpt-5.2
                  messages:
                  - role: developer
                    content: You are a helpful assistant.
                  - role: user
                    content: Tell me a story.
                  temperature: 0.7
                  max_completion_tokens: 100
                  stream: true
                  stream_options:
                    include_usage: true
              image_input:
                summary: Image Input (URL)
                description: Analyze one or more images by URL using image_url parts.
                value:
                  model: gpt-5.4
                  messages:
                  - role: user
                    content:
                    - type: text
                      text: What is in this image?
                    - type: image_url
                      image_url:
                        url: https://ark-project.tos-cn-beijing.volces.com/doc_image/seedream4_5_imageToimage.png
                        detail: high
                  max_completion_tokens: 300
              image_data_url_input:
                summary: Image Input (Base64)
                description: Analyze one or more inline image data URLs using image_url
                  parts. PNG is shown as an example format.
                value:
                  model: gpt-5.4
                  messages:
                  - role: user
                    content:
                    - type: image_url
                      image_url:
                        url: data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAwMCAO+ip1sAAAAASUVORK5CYII=
                    - type: text
                      text: What's in this image?
                  max_completion_tokens: 300
              file_input:
                summary: File Input (Base64)
                description: Send inline base64 file content into Chat Completions,
                  with file_data recommended today. This endpoint does not accept
                  file_url; use Responses input_file.file_url for external file URLs.
                value:
                  model: gpt-5
                  messages:
                  - role: user
                    content:
                    - type: text
                      text: Summarize the attached document in five bullet points.
                    - type: file
                      file:
                        filename: report.pdf
                        file_data: data:application/pdf;base64,
                  max_completion_tokens: 300
              audio_input:
                summary: Audio Input
                description: Send audio plus text instructions in a single chat request.
                value:
                  model: gpt-5.4
                  messages:
                  - role: user
                    content:
                    - type: text
                      text: Transcribe this audio and extract the action items.
                    - type: input_audio
                      input_audio:
                        data: UklGRsZrAABXQVZFZm10IBAAAAABAAEA...
                        format: wav
                  max_completion_tokens: 300
              tools:
                summary: Tool Calling
                description: Define tools and let the model decide whether to call
                  them.
                value:
                  model: gpt-5.2
                  messages:
                  - role: user
                    content: Read the content of the file report.txt
                  tools:
                  - type: function
                    function:
                      name: read_file
                      description: Read the content of a file
                      parameters:
                        type: object
                        properties:
                          file_path:
                            type: string
                            description: The path to the file to read
                        required:
                        - file_path
                  tool_choice: auto
                  parallel_tool_calls: true
                  max_completion_tokens: 150
              structured_output:
                summary: Structured Output
                description: Request JSON Schema-constrained output using response_format.
                value:
                  model: gpt-5
                  messages:
                  - role: user
                    content: Extract the event name and date from "OpenAI Dev Day
                      is on October 1, 2026."
                  response_format:
                    type: json_schema
                    json_schema:
                      name: event_extraction
                      strict: true
                      schema:
                        type: object
                        properties:
                          event_name:
                            type: string
                          event_date:
                            type: string
                        additionalProperties: false
                        required:
                        - event_name
                        - event_date
                  max_completion_tokens: 120
      responses:
        '200':
          description: Success Response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ChatCompletionResponse"
              examples:
                default-response:
                  summary: Basic Response
                  description: Response example for basic chat request.
                  value:
                    id: chatcmpl-BPzJw3iWI2jtsjCnR0rRCBvLCETq7
                    created: 1773197421
                    model: gpt-5
                    object: chat.completion
                    choices:
                    - index: 0
                      message:
                        role: assistant
                        content: Hi! How can I help today? I can answer questions,
                          explain topics, brainstorm ideas, write or edit text, solve
                          problems, or analyze images.
                      finish_reason: stop
                    usage:
                      completion_tokens: 174
                      prompt_tokens: 8
                      total_tokens: 182
                      completion_tokens_details:
                        reasoning_tokens: 128
                image_input-response:
                  summary: Image Input Response
                  description: Model-generated description based on image content.
                  value:
                    id: chatcmpl-s71Ce6GRN8PzAOB0PbVmNFGdSlGjS
                    created: 1773197559
                    model: gpt-5.2
                    object: chat.completion
                    choices:
                    - index: 0
                      message:
                        role: assistant
                        content: The image shows a person posing in a studio setup
                          against a white backdrop, wearing a shiny, chrome-like metallic
                          outfit with spiky, futuristic elements (including headpiece/hair).
                          The face area is blurred/pixelated.
                      finish_reason: stop
                    usage:
                      completion_tokens: 49
                      prompt_tokens: 704
                      total_tokens: 753
                tools-response:
                  summary: Tool Calling Response
                  description: Model returns a tool call instead of plain text content.
                  value:
                    id: chatcmpl-ZjQIwmTgiAmyXrAeTCcoNXvvqiprq
                    created: 1773197541
                    model: gpt-5.2
                    object: chat.completion
                    service_tier: default
                    choices:
                    - index: 0
                      message:
                        role: assistant
                        tool_calls:
                        - id: call_123
                          type: function
                          function:
                            name: read_file
                            arguments: '{"file_path":"report.txt"}'
                      finish_reason: tool_calls
                    usage:
                      completion_tokens: 41
                      prompt_tokens: 13
                      total_tokens: 54
            text/event-stream:
              schema:
                type: string
                description: 'Streaming responses are returned in Server-Sent Events
                  format, each event is a JSON data block starting with ''data: ''
                  and ending with ''data: [DONE]''.'
              examples:
                streaming-response:
                  summary: Streaming Response Example
                  description: Shows events sent sequentially during streaming chat
                    process.
                  value: |
                    data: {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"gpt-5.2","choices":[{"index":0,"delta":{"role":"assistant"},"finish_reason":null}]}
                    data: {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"gpt-5.2","choices":[{"index":0,"delta":{"content":"Hello"},"finish_reason":null}]}
                    data: {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"gpt-5.2","choices":[{"index":0,"delta":{"content":" there!"},"finish_reason":null}]}
                    data: {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"gpt-5.2","choices":[{"index":0,"delta":{},"finish_reason":"stop"}]}
                    data: [DONE]
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
  "/v1/messages":
    post:
      tags:
      - messages_openai
      summary: Create Message
      description: Create a message using the Messages-compatible payload.
      operationId: createMessage_openai
      security:
      - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateMessagesRequest"
            examples:
              default:
                summary: Basic
                value:
                  model: gpt-5.4
                  messages:
                  - role: user
                    content: Hello
                  max_tokens: 128
      responses:
        '200':
          description: Success Response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/MessageResponse"
              examples:
                default:
                  summary: Basic Response
                  value:
                    id: msg_123
                    type: message
                    role: assistant
                    model: gpt-5.4
                    content:
                    - type: text
                      text: Hello! How can I help you today?
                    stop_reason: end_turn
                    usage:
                      input_tokens: 12
                      output_tokens: 9
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
  "/v1/responses":
    post:
      tags:
      - responses_openai
      summary: Create Response
      description: Create a model response using OpenAI Responses-compatible payload.
      operationId: createResponse_openai
      security:
      - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateResponseRequest"
            examples:
              default:
                summary: Basic
                description: A simple text-only Responses request.
                value:
                  model: gpt-5.4
                  input: Hello
                  stream: false
              streaming:
                summary: Streaming
                description: Enable semantic event streaming by setting stream to
                  true.
                value:
                  model: gpt-5.4
                  input:
                  - role: user
                    content:
                    - type: input_text
                      text: Write a short welcome message for a new user.
                  stream: true
              image_url_input:
                summary: Image Input (URL)
                description: Analyze an image from a public URL with a Responses-compatible
                  multimodal payload.
                value:
                  model: gpt-5.4
                  input:
                  - role: user
                    content:
                    - type: input_text
                      text: What is in this image?
                    - type: input_image
                      image_url: https://api.nga.gov/iiif/a2e6da57-3cd1-4235-b20e-95dcaefed6c8/full/!800,800/0/default.jpg
                      detail: high
                  stream: false
              image_data_url_input:
                summary: Image Input (Base64)
                description: Analyze one or more inline image data URLs using input_image
                  parts. PNG is shown as an example format.
                value:
                  model: gpt-5.4
                  input:
                  - role: user
                    content:
                    - type: input_text
                      text: What's in this image?
                    - type: input_image
                      image_url: data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAwMCAO+ip1sAAAAASUVORK5CYII=
                  stream: false
              file_url_input:
                summary: File Input (URL)
                description: Reference an external PDF or document URL as input_file.
                value:
                  model: gpt-5
                  input:
                  - role: user
                    content:
                    - type: input_file
                      file_url: https://www.berkshirehathaway.com/letters/2024ltr.pdf
                    - type: input_text
                      text: Analyze the document and summarize the key points.
                  stream: false
              file_base64_input:
                summary: File Input (Base64)
                description: Send inline file data using filename plus a base64 data
                  URL.
                value:
                  model: gpt-5
                  input:
                  - role: user
                    content:
                    - type: input_file
                      filename: report.pdf
                      file_data: data:application/pdf;base64,
                    - type: input_text
                      text: Extract the action items from this file.
                  stream: false
      responses:
        '200':
          description: Success Response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ResponseObject"
              examples:
                default:
                  summary: Basic Response
                  value:
                    id: resp_123
                    object: response
                    model: gpt-5.4
                    output:
                    - id: msg_123
                      type: message
                      role: assistant
                      status: completed
                      content:
                      - type: output_text
                        text: Hello! How can I help you today?
                    usage:
                      input_tokens: 12
                      output_tokens: 9
                      total_tokens: 21
            text/event-stream:
              schema:
                type: string
                description: Responses streaming returns Server-Sent Events with typed
                  semantic event payloads.
              examples:
                streaming-response:
                  summary: Streaming Response Example
                  description: Shows a minimal sequence of semantic events emitted
                    during Responses streaming.
                  value: |
                    data: {"type":"response.created","sequence_number":0,"response":{"id":"resp_123","object":"response","created_at":1741487325,"status":"in_progress","model":"gpt-5.4"}}
                    data: {"type":"response.output_text.delta","sequence_number":1,"item_id":"msg_123","output_index":0,"content_index":0,"delta":"Hello"}
                    data: {"type":"response.output_text.delta","sequence_number":2,"item_id":"msg_123","output_index":0,"content_index":0,"delta":" there!"}
                    data: {"type":"response.completed","sequence_number":3,"response":{"id":"resp_123","object":"response","created_at":1741487325,"status":"completed","model":"gpt-5.4","output":[{"id":"msg_123","type":"message","role":"assistant","status":"completed","content":[{"type":"output_text","text":"Hello there!"}]}]}}
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
  "/v1/images/generations":
    post:
      tags:
      - image_generations_openai
      summary: Create Image
      description: Generate images based on text prompts. Compatible with OpenAI's
        Images API.
      operationId: createImageGeneration_openai
      security:
      - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: gpt-image-2 image generation request body.
              properties:
                model:
                  type: string
                  description: Model ID to invoke.
                prompt:
                  type: string
                  maxLength: 32000
                  description: Prompt used to generate the image.
                n:
                  type: integer
                  minimum: 1
                  maximum: 10
                  default: 1
                  description: Number of images to request. The actual returned count
                    can be lower than requested.
                size:
                  type: string
                  description: Requested output image size.
                  enum:
                  - auto
                  - 1024x1024
                  - 1024x1536
                  - 1536x1024
                  - 2048x2048
                  - 2048x1152
                  - 3840x2160
                  - 2160x3840
                  - 2048x1360
                  - 1360x2048
                  - 1152x2048
                  - 2048x1536
                  - 1536x2048
                  - 2048x880
                  - 880x2048
                  - 688x2048
                  - 2048x688
                  - 2048x1024
                  - 1024x2048
                  default: 1024x1024
                quality:
                  type: string
                  description: Requested image quality level.
                  enum:
                  - low
                  - medium
                  - high
                  default: high
                background:
                  type: string
                  description: Background handling mode.
                  enum:
                  - opaque
                  - auto
                moderation:
                  type: string
                  description: Moderation strictness for image generation.
                  enum:
                  - low
                  - auto
                output_format:
                  type: string
                  description: Output image format.
                  enum:
                  - png
                  - jpeg
                  default: png
                output_compression:
                  type: integer
                  minimum: 0
                  maximum: 100
                  description: Compression level from 0 to 100. Applies only to jpeg;
                    omit for png or set to 100.
              required:
              - model
              - prompt
            examples:
              default:
                summary: Basic PNG
                description: Generate a low-quality 1024x1024 PNG image.
                value:
                  model: gpt-image-2
                  prompt: A cute cat sitting on a windowsill
                  n: 1
                  quality: low
                  size: 1024x1024
                  background: opaque
                  moderation: auto
                  output_format: png
              jpeg-compression:
                summary: JPEG Output
                description: Generate a compressed JPEG image.
                value:
                  model: gpt-image-2
                  prompt: A futuristic cityscape at sunset
                  n: 1
                  quality: high
                  size: 2048x1152
                  background: auto
                  moderation: low
                  output_format: jpeg
                  output_compression: 80
              multiple-images:
                summary: Multiple Images
                description: Request multiple medium-quality PNG images.
                value:
                  model: gpt-image-2
                  prompt: A beautiful landscape
                  n: 2
                  quality: medium
                  size: 1536x1024
                  output_format: png
      responses:
        '200':
          description: Success Response
          content:
            application/json:
              schema:
                type: object
                description: gpt-image-2 image generation response.
                properties:
                  created:
                    type: integer
                    description: Unix timestamp in seconds when the response was created.
                  background:
                    type: string
                    description: Background type used for the generated image.
                  output_format:
                    type: string
                    description: Output image format.
                  quality:
                    type: string
                    description: Effective image quality used by the model.
                  size:
                    type: string
                    description: Final returned image size.
                  data:
                    type: array
                    description: Generated image results.
                    items:
                      type: object
                      properties:
                        url:
                          type: string
                          description: Generated image URL.
                        revised_prompt:
                          type: string
                          description: Prompt actually used or revised by the model.
                  usage:
                    "$ref": "#/components/schemas/ImageUsage"
              examples:
                default-response:
                  summary: PNG Response
                  description: Complete response containing a PNG image URL and optional
                    metadata.
                  value:
                    created: 1680000000
                    background: opaque
                    output_format: png
                    quality: low
                    size: 1024x1024
                    data:
                    - url: https://example.com/images/cat.png
                      revised_prompt: A cute cat sitting on a windowsill, looking
                        out at a garden
                    usage:
                      total_tokens: 100
                      input_tokens: 50
                      output_tokens: 50
                      input_tokens_details:
                        text_tokens: 10
                        image_tokens: 40
                jpeg-response:
                  summary: JPEG Response
                  description: Complete response containing a JPEG image URL and optional
                    metadata.
                  value:
                    created: 1680000001
                    background: auto
                    output_format: jpeg
                    quality: high
                    size: 2048x1152
                    data:
                    - url: https://example.com/images/cityscape.jpg
                      revised_prompt: A futuristic cityscape at sunset with warm reflective
                        glass towers
                    usage:
                      total_tokens: 120
                      input_tokens: 40
                      output_tokens: 80
                      input_tokens_details:
                        text_tokens: 12
                        image_tokens: 28
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
  "/v1/images/edits":
    post:
      tags:
      - image_edits_openai
      summary: Edit Image
      description: Create edited images based on original images and text prompts.
        Compatible with OpenAI's Images API.
      operationId: createImageEdit_openai
      security:
      - APIKeyHeader: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              description: gpt-image-2 image editing request body.
              properties:
                model:
                  type: string
                  description: Model ID to invoke.
                image:
                  description: Input image or images. Supports file uploads, URLs,
                    base64 strings, and data URIs.
                  anyOf:
                  - type: string
                    format: binary
                  - type: array
                    items:
                      type: string
                      format: binary
                  - type: string
                  - type: array
                    items:
                      type: string
                prompt:
                  type: string
                  maxLength: 32000
                  description: Prompt used to guide image editing.
                mask:
                  description: Optional mask. Transparent areas represent regions
                    to edit.
                  anyOf:
                  - type: string
                    format: binary
                  - type: string
                n:
                  type: integer
                  minimum: 1
                  maximum: 10
                  default: 1
                  description: Number of images to request. The actual returned count
                    can be lower than requested.
                size:
                  type: string
                  description: Requested output image size.
                  enum:
                  - auto
                  - 1024x1024
                  - 1024x1536
                  - 1536x1024
                  - 2048x2048
                  - 2048x1152
                  - 3840x2160
                  - 2160x3840
                  - 2048x1360
                  - 1360x2048
                  - 1152x2048
                  - 2048x1536
                  - 1536x2048
                  - 2048x880
                  - 880x2048
                  - 688x2048
                  - 2048x688
                  - 2048x1024
                  - 1024x2048
                  default: 1024x1024
                quality:
                  type: string
                  description: Requested image quality level.
                  enum:
                  - low
                  - medium
                  - high
                  default: high
                background:
                  type: string
                  description: Background handling mode.
                  enum:
                  - opaque
                  - auto
                output_format:
                  type: string
                  description: Output image format.
                  enum:
                  - png
                  - jpeg
                  default: png
              required:
              - model
              - image
              - prompt
            encoding:
              image:
                style: form
                explode: true
            examples:
              with-mask:
                summary: With Mask
                description: Edit using image, mask, and prompt.
                value:
                  model: gpt-image-2
                  image:
                  - "@person.png"
                  mask: "@mask.png"
                  prompt: Add a hat to the person
                  n: 1
                  size: 1024x1024
                  quality: medium
                  background: auto
                  output_format: png
              multiple-references:
                summary: Multiple References
                description: Edit using multiple reference images.
                value:
                  model: gpt-image-2
                  image:
                  - "@body-lotion.png"
                  - https://example.com/images/reference.png
                  prompt: Change the background to a beach
                  n: 1
                  size: 2048x1152
                  quality: high
                  background: opaque
                  output_format: jpeg
      responses:
        '200':
          description: Success Response
          content:
            application/json:
              schema:
                type: object
                description: gpt-image-2 image edit response.
                properties:
                  created:
                    type: integer
                    description: Unix timestamp in seconds when the response was created.
                  background:
                    type: string
                    description: Background type used for the edited image.
                  output_format:
                    type: string
                    description: Output image format.
                  quality:
                    type: string
                    description: Effective image quality used by the model.
                  size:
                    type: string
                    description: Final returned image size.
                  data:
                    type: array
                    description: Edited image results.
                    items:
                      type: object
                      properties:
                        url:
                          type: string
                          description: Edited image URL.
                        revised_prompt:
                          type: string
                          description: Prompt actually used or revised by the model.
                  usage:
                    "$ref": "#/components/schemas/ImageUsage"
              examples:
                default-response:
                  summary: Edit Response
                  description: Return edited image and related metadata.
                  value:
                    created: 1680000002
                    background: opaque
                    output_format: png
                    quality: high
                    size: 1024x1024
                    data:
                    - url: https://example.com/images/edited.png
                      revised_prompt: A person with a hat, standing in a sunny park
                    usage:
                      total_tokens: 120
                      input_tokens: 60
                      output_tokens: 60
                      input_tokens_details:
                        text_tokens: 12
                        image_tokens: 48
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
components:
  "$ref": "./_common.yaml#/components"
