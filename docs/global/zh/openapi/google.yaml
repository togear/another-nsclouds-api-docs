---
openapi: 3.1.0
info:
  "$ref": "./_common.yaml#/info"
servers:
  "$ref": "./_common.yaml#/servers"
tags:
- "$ref": "./_common.yaml#/tags/0"
- "$ref": "./_common.yaml#/tags/1"
- "$ref": "./_common.yaml#/tags/2"
- "$ref": "./_common.yaml#/tags/3"
- "$ref": "./_common.yaml#/tags/4"
- name: chat_completions_google
  x-parent: chat_completions
  x-page-title: Google
  x-page-icon: brain
  description: Google 的对话生成 API
- name: gemini_native_google
  x-parent: chat_completions
  x-page-title: Google
  x-page-icon: brain
  description: Google 的 Gemini 原生协议 API
paths:
  "/v1/chat/completions":
    post:
      tags:
      - chat_completions_google
      summary: 创建聊天补全
      description: 提供与 OpenAI Chat Completions 兼容的对话接口。具体支持的参数和行为因模型而异。
      operationId: createChatCompletion_google
      security:
      - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateChatCompletionRequest"
            examples:
              default:
                summary: 基础
                description: 一个简单的对话示例，包含系统提示和用户消息。
                value:
                  model: gemini-3-flash-preview
                  messages:
                  - role: system
                    content: You are a helpful assistant.
                  - role: user
                    content: Hello!
                  temperature: 1
                  max_completion_tokens: 50
                  n: 1
                  stream: false
              streaming:
                summary: 流式
                description: '通过设置 stream: true 启用流式响应。'
                value:
                  model: gemini-3-flash-preview
                  messages:
                  - role: system
                    content: You are a helpful assistant.
                  - role: user
                    content: Tell me a story.
                  temperature: 0.7
                  max_completion_tokens: 100
                  stream: true
              image_input:
                summary: 图像输入（多模态）
                description: 使用支持视觉的模型分析图像。
                value:
                  model: gemini-3-flash-preview
                  messages:
                  - role: user
                    content:
                    - type: text
                      text: What's in this image?
                    - type: image_url
                      image_url:
                        url: https://example.com/cat.jpg
                  max_completion_tokens: 300
              functions:
                summary: 函数调用
                description: 定义工具（函数）并让模型决定是否调用。
                value:
                  model: gemini-3-flash-preview
                  messages:
                  - role: user
                    content: What's the weather in Boston?
                  tools:
                  - type: function
                    function:
                      name: get_current_weather
                      description: Get the current weather in a given location
                      parameters:
                        type: object
                        properties:
                          location:
                            type: string
                            description: The city and state, e.g. San Francisco, CA
                          unit:
                            type: string
                            enum:
                            - celsius
                            - fahrenheit
                        required:
                        - location
                  tool_choice: auto
                  max_completion_tokens: 150
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ChatCompletionResponse"
              examples:
                default-response:
                  summary: 基础响应
                  description: 对应基础聊天请求的响应示例。
                  value:
                    id: chatcmpl-9AP1q66BDnIuuBx14ROTmOQFTQjZm
                    object: chat.completion
                    created: 1773220495
                    model: gemini-3-flash-preview
                    choices:
                    - index: 0
                      message:
                        role: assistant
                        content: Hello! How can I help you today?
                      finish_reason: stop
                    usage:
                      completion_tokens: 363
                      prompt_tokens: 2
                      total_tokens: 365
                      completion_tokens_details:
                        reasoning_tokens: 354
                image_input-response:
                  summary: 图像输入响应
                  description: 模型根据图像内容生成的描述。
                  value:
                    id: chatcmpl-789
                    object: chat.completion
                    created: 1677652300
                    model: gemini-3-flash-preview
                    choices:
                    - index: 0
                      message:
                        role: assistant
                        content: The image shows a cute cat sitting on a windowsill,
                          looking outside.
                      finish_reason: stop
                    usage:
                      prompt_tokens: 123
                      completion_tokens: 15
                      total_tokens: 138
                functions-response:
                  summary: 函数调用响应
                  description: 模型返回一个函数调用请求。
                  value:
                    id: chatcmpl-abc
                    object: chat.completion
                    created: 1677652310
                    model: gemini-3-flash-preview
                    choices:
                    - index: 0
                      message:
                        role: assistant
                        content: 
                        tool_calls:
                        - id: call_123
                          type: function
                          function:
                            name: get_current_weather
                            arguments: '{"location": "Boston, MA", "unit": "fahrenheit"}'
                      finish_reason: tool_calls
                    usage:
                      prompt_tokens: 50
                      completion_tokens: 20
                      total_tokens: 70
            text/event-stream:
              schema:
                type: string
                description: '流式响应以 Server-Sent Events 格式返回，每个事件是一行以 ''data: '' 开头的
                  JSON 数据块，最后以 ''data: [DONE]'' 结束。'
              examples:
                streaming-response:
                  summary: 流式响应示例
                  description: 展示流式聊天过程中陆续发送的事件。
                  value: |
                    data: {"id":"chatcmpl-cjo4zIwpUamQ17CrksTp2uSheKXFL","created":1773220521,"model":"gemini-3-flash-preview","object":"chat.completion.chunk","choices":[{"index":0,"delta":{"content":"Hello! How can I help you today?","role":"assistant"}}]}
                    data: {"id":"chatcmpl-cjo4zIwpUamQ17CrksTp2uSheKXFL","created":1773220521,"model":"gemini-3-flash-preview","object":"chat.completion.chunk","choices":[{"finish_reason":"stop","index":0,"delta":{}}]}
                    data: [DONE]
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
  "/v1beta/models/{model}:generateContent":
    post:
      tags:
      - gemini_native_google
      summary: Gemini 生成内容 (v1beta)
      description: 提供与 Google Gemini 原生协议兼容的接口。
      operationId: generateContentV1beta_google
      security:
      - APIKeyHeader: []
      parameters:
      - name: model
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            examples:
              default:
                summary: 基础
                value:
                  contents:
                  - role: user
                    parts:
                    - text: Hello
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              examples:
                default:
                  summary: 基础响应
                  value:
                    candidates:
                    - content:
                        role: model
                        parts:
                        - text: Hello! How can I help you today?
                      finishReason: STOP
                    modelVersion: gemini-3-flash-preview
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
  "/v1beta/models/{model}:streamGenerateContent":
    post:
      tags:
      - gemini_native_google
      summary: Gemini 流式生成内容 (v1beta)
      description: 提供与 Google Gemini 原生协议兼容的接口。
      operationId: streamGenerateContentV1beta_google
      security:
      - APIKeyHeader: []
      parameters:
      - name: model
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            examples:
              default:
                summary: 流式
                value:
                  contents:
                  - role: user
                    parts:
                    - text: Tell me a short greeting
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              examples:
                default:
                  summary: 基础响应
                  value:
                    candidates:
                    - content:
                        role: model
                        parts:
                        - text: Hello there!
                      finishReason: STOP
            text/event-stream:
              schema:
                type: string
                description: Server-Sent Events 流。
              examples:
                default:
                  summary: 流式响应
                  value: |
                    data: {"candidates":[{"content":{"role":"model","parts":[{"text":"Hello"}]}}]}
                    data: {"candidates":[{"content":{"role":"model","parts":[{"text":" there!"}]},"finishReason":"STOP"}]}
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
components:
  "$ref": "./_common.yaml#/components"
