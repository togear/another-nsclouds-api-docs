---
openapi: 3.1.0
info:
  "$ref": "./_common.yaml#/info"
servers:
  "$ref": "./_common.yaml#/servers"
tags:
- "$ref": "./_common.yaml#/tags/0"
- "$ref": "./_common.yaml#/tags/1"
- "$ref": "./_common.yaml#/tags/2"
- "$ref": "./_common.yaml#/tags/3"
- "$ref": "./_common.yaml#/tags/4"
- name: chat_completions_openai
  x-parent: chat_completions
  x-page-title: OpenAI
  x-page-icon: brain
  description: OpenAI 的对话生成 API
- name: messages_openai
  x-parent: chat_completions
  x-page-title: OpenAI
  x-page-icon: brain
  description: OpenAI 的 Messages 协议 API
- name: responses_openai
  x-parent: chat_completions
  x-page-title: OpenAI
  x-page-icon: brain
  description: OpenAI 的 Responses 协议 API
- name: image_generations_openai
  x-parent: image_generations
  x-page-title: OpenAI
  x-page-icon: image
  description: OpenAI 的图像生成 API
- name: image_edits_openai
  x-parent: image_edits
  x-page-title: OpenAI
  x-page-icon: image
  description: OpenAI 的图像编辑 API
paths:
  "/v1/chat/completions":
    post:
      tags:
      - chat_completions_openai
      summary: 创建聊天补全
      description: 遵循 OpenAI Chat Completions 协议。
      operationId: createChatCompletion_openai
      security:
      - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateChatCompletionRequest"
            examples:
              default:
                summary: 基础
                description: 一个使用 developer 角色和用户消息的基础对话示例。
                value:
                  model: gpt-5
                  messages:
                  - role: developer
                    content: You are a helpful assistant.
                  - role: user
                    content: Hello!
                  temperature: 1
                  max_completion_tokens: 50
                  n: 1
                  stream: false
              streaming:
                summary: 流式
                description: '通过设置 stream: true 启用流式响应，并在末尾附带 usage。'
                value:
                  model: gpt-5.2
                  messages:
                  - role: developer
                    content: You are a helpful assistant.
                  - role: user
                    content: Tell me a story.
                  temperature: 0.7
                  max_completion_tokens: 100
                  stream: true
                  stream_options:
                    include_usage: true
              image_input:
                summary: 图像输入（URL）
                description: 使用 image_url 内容片段分析一个或多个图片 URL。
                value:
                  model: gpt-5.4
                  messages:
                  - role: user
                    content:
                    - type: text
                      text: What is in this image?
                    - type: image_url
                      image_url:
                        url: https://ark-project.tos-cn-beijing.volces.com/doc_image/seedream4_5_imageToimage.png
                        detail: high
                  max_completion_tokens: 300
              image_data_url_input:
                summary: 图像输入（base64）
                description: 使用 image_url 内容片段分析一个或多个内联图片 data URL。这里以 PNG 格式为例。
                value:
                  model: gpt-5.4
                  messages:
                  - role: user
                    content:
                    - type: image_url
                      image_url:
                        url: data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAwMCAO+ip1sAAAAASUVORK5CYII=
                    - type: text
                      text: What's in this image?
                  max_completion_tokens: 300
              file_input:
                summary: 文件输入（Base64）
                description: 在 Chat Completions 中以内联 base64 传入文件内容，当前推荐优先使用 file_data。此端点不接受
                  file_url；外部文件 URL 请使用 Responses 的 input_file.file_url。
                value:
                  model: gpt-5
                  messages:
                  - role: user
                    content:
                    - type: text
                      text: Summarize the attached document in five bullet points.
                    - type: file
                      file:
                        filename: report.pdf
                        file_data: data:application/pdf;base64,
                  max_completion_tokens: 300
              audio_input:
                summary: 音频输入
                description: 在单次 chat 请求中同时发送音频和文本指令。
                value:
                  model: gpt-5.4
                  messages:
                  - role: user
                    content:
                    - type: text
                      text: Transcribe this audio and extract the action items.
                    - type: input_audio
                      input_audio:
                        data: UklGRsZrAABXQVZFZm10IBAAAAABAAEA...
                        format: wav
                  max_completion_tokens: 300
              tools:
                summary: 工具调用
                description: 定义工具并让模型决定是否调用。
                value:
                  model: gpt-5.2
                  messages:
                  - role: user
                    content: Read the content of the file report.txt
                  tools:
                  - type: function
                    function:
                      name: read_file
                      description: Read the content of a file
                      parameters:
                        type: object
                        properties:
                          file_path:
                            type: string
                            description: The path to the file to read
                        required:
                        - file_path
                  tool_choice: auto
                  parallel_tool_calls: true
                  max_completion_tokens: 150
              structured_output:
                summary: 结构化输出
                description: 使用 response_format 请求符合 JSON Schema 的结构化结果。
                value:
                  model: gpt-5
                  messages:
                  - role: user
                    content: Extract the event name and date from "OpenAI Dev Day
                      is on October 1, 2026."
                  response_format:
                    type: json_schema
                    json_schema:
                      name: event_extraction
                      strict: true
                      schema:
                        type: object
                        properties:
                          event_name:
                            type: string
                          event_date:
                            type: string
                        additionalProperties: false
                        required:
                        - event_name
                        - event_date
                  max_completion_tokens: 120
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ChatCompletionResponse"
              examples:
                default-response:
                  summary: 基础响应
                  description: 对应基础聊天请求的响应示例。
                  value:
                    id: chatcmpl-BPzJw3iWI2jtsjCnR0rRCBvLCETq7
                    created: 1773197421
                    model: gpt-5
                    object: chat.completion
                    choices:
                    - index: 0
                      message:
                        role: assistant
                        content: Hi! How can I help today? I can answer questions,
                          explain topics, brainstorm ideas, write or edit text, solve
                          problems, or analyze images.
                      finish_reason: stop
                    usage:
                      completion_tokens: 174
                      prompt_tokens: 8
                      total_tokens: 182
                      completion_tokens_details:
                        reasoning_tokens: 128
                image_input-response:
                  summary: 图像输入响应
                  description: 模型根据图像内容生成的描述。
                  value:
                    id: chatcmpl-s71Ce6GRN8PzAOB0PbVmNFGdSlGjS
                    created: 1773197559
                    model: gpt-5.2
                    object: chat.completion
                    choices:
                    - index: 0
                      message:
                        role: assistant
                        content: The image shows a person posing in a studio setup
                          against a white backdrop, wearing a shiny, chrome-like metallic
                          outfit with spiky, futuristic elements (including headpiece/hair).
                          The face area is blurred/pixelated.
                      finish_reason: stop
                    usage:
                      completion_tokens: 49
                      prompt_tokens: 704
                      total_tokens: 753
                tools-response:
                  summary: 工具调用响应
                  description: 模型返回 tool call，而不是普通文本内容。
                  value:
                    id: chatcmpl-ZjQIwmTgiAmyXrAeTCcoNXvvqiprq
                    created: 1773197541
                    model: gpt-5.2
                    object: chat.completion
                    service_tier: default
                    choices:
                    - index: 0
                      message:
                        role: assistant
                        tool_calls:
                        - id: call_123
                          type: function
                          function:
                            name: read_file
                            arguments: '{"file_path":"report.txt"}'
                      finish_reason: tool_calls
                    usage:
                      completion_tokens: 41
                      prompt_tokens: 13
                      total_tokens: 54
            text/event-stream:
              schema:
                type: string
                description: '流式响应以 Server-Sent Events 格式返回，每个事件是一行以 ''data: '' 开头的
                  JSON 数据块，最后以 ''data: [DONE]'' 结束。'
              examples:
                streaming-response:
                  summary: 流式响应示例
                  description: 展示流式聊天过程中陆续发送的事件。
                  value: |
                    data: {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"gpt-5.2","choices":[{"index":0,"delta":{"role":"assistant"},"finish_reason":null}]}
                    data: {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"gpt-5.2","choices":[{"index":0,"delta":{"content":"Hello"},"finish_reason":null}]}
                    data: {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"gpt-5.2","choices":[{"index":0,"delta":{"content":" there!"},"finish_reason":null}]}
                    data: {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"gpt-5.2","choices":[{"index":0,"delta":{},"finish_reason":"stop"}]}
                    data: [DONE]
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
  "/v1/messages":
    post:
      tags:
      - messages_openai
      summary: 创建 Messages 消息
      description: 使用 Messages 兼容格式创建消息响应。
      operationId: createMessage_openai
      security:
      - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateMessagesRequest"
            examples:
              default:
                summary: 基础
                value:
                  model: gpt-5.4
                  messages:
                  - role: user
                    content: Hello
                  max_tokens: 128
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/MessageResponse"
              examples:
                default:
                  summary: 基础响应
                  value:
                    id: msg_123
                    type: message
                    role: assistant
                    model: gpt-5.4
                    content:
                    - type: text
                      text: Hello! How can I help you today?
                    stop_reason: end_turn
                    usage:
                      input_tokens: 12
                      output_tokens: 9
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
  "/v1/responses":
    post:
      tags:
      - responses_openai
      summary: 创建 Responses 响应
      description: 使用 OpenAI Responses 兼容格式创建模型响应。
      operationId: createResponse_openai
      security:
      - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateResponseRequest"
            examples:
              default:
                summary: 基础
                description: 一个纯文本的基础 Responses 请求示例。
                value:
                  model: gpt-5.4
                  input: Hello
                  stream: false
              streaming:
                summary: 流式
                description: '通过设置 stream: true 启用语义化事件流返回。'
                value:
                  model: gpt-5.4
                  input:
                  - role: user
                    content:
                    - type: input_text
                      text: Write a short welcome message for a new user.
                  stream: true
              image_url_input:
                summary: 图像输入（URL）
                description: 使用公开图片 URL 按 Responses 多模态格式发起分析请求。
                value:
                  model: gpt-5.4
                  input:
                  - role: user
                    content:
                    - type: input_text
                      text: What is in this image?
                    - type: input_image
                      image_url: https://api.nga.gov/iiif/a2e6da57-3cd1-4235-b20e-95dcaefed6c8/full/!800,800/0/default.jpg
                      detail: high
                  stream: false
              image_data_url_input:
                summary: 图像输入（base64）
                description: 使用 input_image 内容片段分析一个或多个内联图片 data URL。这里以 PNG 格式为例。
                value:
                  model: gpt-5.4
                  input:
                  - role: user
                    content:
                    - type: input_text
                      text: What's in this image?
                    - type: input_image
                      image_url: data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAwMCAO+ip1sAAAAASUVORK5CYII=
                  stream: false
              file_url_input:
                summary: 文件输入（URL）
                description: 通过 input_file 引用外部 PDF 或文档 URL。
                value:
                  model: gpt-5
                  input:
                  - role: user
                    content:
                    - type: input_text
                      text: Analyze the document and summarize the key points.
                    - type: input_file
                      file_url: https://www.berkshirehathaway.com/letters/2024ltr.pdf
                  stream: false
              file_base64_input:
                summary: 文件输入（Base64）
                description: 通过 filename 加 base64 data URL 直接内联传递文件内容。
                value:
                  model: gpt-5
                  input:
                  - role: user
                    content:
                    - type: input_file
                      filename: report.pdf
                      file_data: data:application/pdf;base64,
                    - type: input_text
                      text: Extract the action items from this file.
                  stream: false
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ResponseObject"
              examples:
                default:
                  summary: 基础响应
                  value:
                    id: resp_123
                    object: response
                    model: gpt-5.4
                    output:
                    - id: msg_123
                      type: message
                      role: assistant
                      status: completed
                      content:
                      - type: output_text
                        text: Hello! How can I help you today?
                    usage:
                      input_tokens: 12
                      output_tokens: 9
                      total_tokens: 21
            text/event-stream:
              schema:
                type: string
                description: Responses 流式返回使用 Server-Sent Events，并携带带类型的语义化事件。
              examples:
                streaming-response:
                  summary: 流式响应示例
                  description: 展示 Responses 流式调用期间的最小事件序列。
                  value: |
                    data: {"type":"response.created","sequence_number":0,"response":{"id":"resp_123","object":"response","created_at":1741487325,"status":"in_progress","model":"gpt-5.4"}}
                    data: {"type":"response.output_text.delta","sequence_number":1,"item_id":"msg_123","output_index":0,"content_index":0,"delta":"Hello"}
                    data: {"type":"response.output_text.delta","sequence_number":2,"item_id":"msg_123","output_index":0,"content_index":0,"delta":" there!"}
                    data: {"type":"response.completed","sequence_number":3,"response":{"id":"resp_123","object":"response","created_at":1741487325,"status":"completed","model":"gpt-5.4","output":[{"id":"msg_123","type":"message","role":"assistant","status":"completed","content":[{"type":"output_text","text":"Hello there!"}]}]}}
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
  "/v1/images/generations":
    post:
      tags:
      - image_generations_openai
      summary: 创建图像
      description: 根据文本提示生成图像。与 OpenAI 的 Images API 兼容。
      operationId: createImageGeneration_openai
      security:
      - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateImageGenerationRequest"
            examples:
              default:
                summary: 基础
                description: 生成一张 1024x1024 的图像。
                value:
                  model: gpt-image-2
                  prompt: A cute cat sitting on a windowsill
                  n: 1
                  size: 1024x1024
              hd-quality:
                summary: 高清质量
                description: 生成高清质量的图像。
                value:
                  model: gpt-image-2
                  prompt: A futuristic cityscape at sunset
                  n: 1
                  quality: hd
                  size: 1792x1024
              b64-json:
                summary: Base64 格式
                description: 返回 base64 编码的图像数据。
                value:
                  model: gpt-image-2
                  prompt: A beautiful landscape
                  n: 2
                  size: 512x512
                  response_format: b64_json
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ImageResponse"
              examples:
                default-response:
                  summary: 基础响应
                  description: 返回包含图像 URL 和可选字段的完整响应。
                  value:
                    created: 1680000000
                    background: opaque
                    output_format: png
                    quality: high
                    size: 1024x1024
                    data:
                    - url: https://example.com/images/cat.png
                      revised_prompt: A cute cat sitting on a windowsill, looking
                        out at a garden
                    usage:
                      total_tokens: 100
                      input_tokens: 50
                      output_tokens: 50
                      input_tokens_details:
                        text_tokens: 10
                        image_tokens: 40
                b64-response:
                  summary: Base64 响应
                  description: 返回包含 base64 编码图像数据和可选字段的响应。
                  value:
                    created: 1680000001
                    background: opaque
                    output_format: png
                    quality: high
                    size: 1024x1024
                    data:
                    - b64_json: iVBORw0KGgoAAAANSUhEUgAA...
                      revised_prompt: A beautiful landscape with mountains and a lake
                    - b64_json: iVBORw0KGgoAAAANSUhEUgAA...
                    usage:
                      total_tokens: 200
                      input_tokens: 100
                      output_tokens: 100
                      input_tokens_details:
                        text_tokens: 20
                        image_tokens: 80
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
  "/v1/images/edits":
    post:
      tags:
      - image_edits_openai
      summary: 编辑图像
      description: 根据原始图像和文本提示创建编辑后的图像。与 OpenAI 的 Images API 兼容。
      operationId: createImageEdit_openai
      security:
      - APIKeyHeader: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              "$ref": "#/components/schemas/CreateImageEditRequest"
            encoding:
              image:
                style: form
                explode: true
            examples:
              with-mask:
                summary: 带蒙版
                description: 使用图像、蒙版和提示进行编辑。
                value:
                  model: gpt-image-2
                  image:
                  - "@person.png"
                  mask: "@mask.png"
                  prompt: Add a hat to the person
                  n: 1
                  size: 1024x1024
              no-mask:
                summary: 无蒙版
                description: 仅使用图像和提示进行编辑。
                value:
                  model: gpt-image-2
                  image:
                  - "@body-lotion.png"
                  prompt: Change the background to a beach
                  n: 1
                  size: 1024x1024
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ImageResponse"
              examples:
                default-response:
                  summary: 编辑响应
                  description: 返回编辑后的图像及相关元数据。
                  value:
                    created: 1680000002
                    background: opaque
                    output_format: png
                    quality: high
                    size: 1024x1024
                    data:
                    - url: https://example.com/images/edited.png
                      revised_prompt: A person with a hat, standing in a sunny park
                    usage:
                      total_tokens: 120
                      input_tokens: 60
                      output_tokens: 60
                      input_tokens_details:
                        text_tokens: 12
                        image_tokens: 48
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
components:
  "$ref": "./_common.yaml#/components"
