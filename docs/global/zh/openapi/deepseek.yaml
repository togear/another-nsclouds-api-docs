---
openapi: 3.1.0
info:
  "$ref": "./_common.yaml#/info"
servers:
  "$ref": "./_common.yaml#/servers"
tags:
- "$ref": "./_common.yaml#/tags/0"
- "$ref": "./_common.yaml#/tags/1"
- "$ref": "./_common.yaml#/tags/2"
- "$ref": "./_common.yaml#/tags/3"
- "$ref": "./_common.yaml#/tags/4"
- name: chat_completions_deepseek
  x-parent: chat_completions
  x-page-title: DeepSeek
  x-page-icon: brain
  description: DeepSeek 的对话生成 API
- name: completions_deepseek
  x-parent: chat_completions
  x-page-title: DeepSeek
  x-page-icon: brain
  description: DeepSeek 的文本补全 API
- name: messages_deepseek
  x-parent: chat_completions
  x-page-title: DeepSeek
  x-page-icon: brain
  description: DeepSeek 的 Messages 协议 API
paths:
  "/v1/chat/completions":
    post:
      tags:
      - chat_completions_deepseek
      summary: 创建聊天补全
      description: 基于输入的消息，生成模型回复。与 OpenAI 的 Chat API 完全兼容。
      operationId: createChatCompletion_deepseek
      security:
      - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateChatCompletionRequest"
            examples:
              default:
                summary: 基础
                description: 一个简单的对话示例，包含系统提示和用户消息。
                value:
                  model: deepseek-r1
                  messages:
                  - role: system
                    content: You are a helpful assistant.
                  - role: user
                    content: Hello!
                  temperature: 1
                  max_completion_tokens: 50
                  n: 1
                  stream: false
              streaming:
                summary: 流式
                description: '通过设置 stream: true 启用流式响应。'
                value:
                  model: deepseek-r1
                  messages:
                  - role: user
                    content: Hello!
                  stream: true
              image_input:
                summary: 图像输入（多模态）
                description: 使用支持视觉的模型分析图像。
                value:
                  model: deepseek-r1
                  messages:
                  - role: user
                    content:
                    - type: text
                      text: What is in this image?
                    - type: image_url
                      image_url:
                        url: https://ark-project.tos-cn-beijing.volces.com/doc_image/seedream4_5_imageToimage.png
                  max_completion_tokens: 300
              functions:
                summary: 函数调用
                description: 定义工具（函数）并让模型决定是否调用。
                value:
                  model: deepseek-r1
                  messages:
                  - role: user
                    content: What is the weather in Boston?
                  tools:
                  - type: function
                    function:
                      name: get_current_weather
                      description: Get the current weather in a given location
                      parameters:
                        type: object
                        properties:
                          location:
                            type: string
                            description: The city and state, e.g. San Francisco, CA
                          unit:
                            type: string
                            enum:
                            - celsius
                            - fahrenheit
                        required:
                        - location
                  tool_choice: auto
                  max_completion_tokens: 150
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ChatCompletionResponse"
              examples:
                default-response:
                  summary: 基础响应
                  description: 对应基础聊天请求的响应示例。
                  value:
                    id: chatcmpl-cdc11700-f52c-99a3-866c-cfac2a0b254c
                    object: chat.completion
                    created: 1772859125
                    model: deepseek-r1
                    choices:
                    - index: 0
                      message:
                        role: assistant
                        content: "Hello! How can I help you today? \U0001F60A"
                      finish_reason: stop
                    usage:
                      prompt_tokens: 15
                      completion_tokens: 11
                      total_tokens: 26
                image_input-response:
                  summary: 图像输入响应
                  description: 模型根据图像内容生成的描述。
                  value:
                    id: chatcmpl-856cd72d-f840-92da-a0b3-65f0061ac378
                    object: chat.completion
                    created: 1772861532
                    model: deepseek-r1
                    choices:
                    - index: 0
                      message:
                        role: assistant
                        content: |-
                          Of course. This is an image of a stylized, cartoon-style drawing of a **dragon wearing a backpack and holding a walking stick**.

                          Here are the details:

                          *   **Main Subject:** A friendly-looking dragon.
                          *   **Attire/Accessories:**
                              *   It's wearing a **backpack** with a strap across its chest.
                              *   It's holding a long **walking stick** or trekking pole in its right hand (claw).
                          *   **Setting:** The dragon appears to be on a journey or hike, walking on a simple ground line.
                          *   **Style:** The image is a black and white line drawing, likely intended as a coloring page for children. The lines are clear and simple, making it easy to color.

                          In short, it's an illustration of an adventurous dragon, ready for a hike or a quest.
                      finish_reason: stop
                    usage:
                      prompt_tokens: 13
                      completion_tokens: 179
                      total_tokens: 192
                functions-response:
                  summary: 函数调用响应
                  description: 模型返回一个函数调用请求。
                  value:
                    id: chatcmpl-7709ac0a-5dc2-9791-81ef-1364bf331761
                    object: chat.completion
                    created: 1772861551
                    model: deepseek-r1
                    choices:
                    - index: 0
                      message:
                        role: assistant
                        content: I'll check the current weather in Boston for
                        tool_calls:
                        - id: chatcmpl-tool-6701c1adf7ab40b598c423c3530190b9
                          type: function
                          function:
                            name: get_current_weather
                            arguments: '{"location": "Boston, MA"}'
                      finish_reason: tool_calls
                    usage:
                      prompt_tokens: 198
                      completion_tokens: 28
                      total_tokens: 226
            text/event-stream:
              schema:
                type: string
                description: '流式响应以 Server-Sent Events 格式返回，每个事件是一行以 ''data: '' 开头的
                  JSON 数据块，最后以 ''data: [DONE]'' 结束。'
              examples:
                streaming-response:
                  summary: 流式响应示例
                  description: 展示流式聊天过程中陆续发送的事件。
                  value: "data: {\"id\":\"chatcmpl-2e08cd46-ddf8-9aef-bce0-f94395447528\",\"object\":\"chat.completion.chunk\",\"created\":1772861378,\"model\":\"deepseek-r1\",\"choices\":[{\"index\":0,\"delta\":{\"content\":\"Hello\",\"role\":\"assistant\"}}]}\ndata:
                    {\"id\":\"chatcmpl-2e08cd46-ddf8-9aef-bce0-f94395447528\",\"object\":\"chat.completion.chunk\",\"created\":1772861378,\"model\":\"deepseek-r1\",\"choices\":[{\"index\":0,\"delta\":{\"content\":\"!
                    How\"}}]}\ndata: {\"id\":\"chatcmpl-2e08cd46-ddf8-9aef-bce0-f94395447528\",\"object\":\"chat.completion.chunk\",\"created\":1772861378,\"model\":\"deepseek-r1\",\"choices\":[{\"index\":0,\"delta\":{\"content\":\"
                    can I help\"}}]}\ndata: {\"id\":\"chatcmpl-2e08cd46-ddf8-9aef-bce0-f94395447528\",\"object\":\"chat.completion.chunk\",\"created\":1772861378,\"model\":\"deepseek-r1\",\"choices\":[{\"index\":0,\"delta\":{\"content\":\"
                    you today\"}}]}\ndata: {\"id\":\"chatcmpl-2e08cd46-ddf8-9aef-bce0-f94395447528\",\"object\":\"chat.completion.chunk\",\"created\":1772861378,\"model\":\"deepseek-r1\",\"choices\":[{\"index\":0,\"delta\":{\"content\":\"?
                    \U0001F60A\"}}]}\ndata: {\"id\":\"chatcmpl-2e08cd46-ddf8-9aef-bce0-f94395447528\",\"object\":\"chat.completion.chunk\",\"created\":1772861378,\"model\":\"deepseek-r1\",\"choices\":[{\"finish_reason\":\"stop\",\"index\":0,\"delta\":{}}]}\ndata:
                    [DONE]\n"
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
  "/v1/completions":
    post:
      tags:
      - completions_deepseek
      summary: 创建文本补全
      description: 基于提供的提示，生成一个或多个补全结果。与 OpenAI 的 Completions API 兼容。
      operationId: createCompletion_deepseek
      security:
      - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateCompletionRequest"
            examples:
              default:
                summary: 基础
                description: 一个简单的文本补全示例。
                value:
                  model: deepseek-r1
                  prompt: Say this is a test
                  max_tokens: 7
                  temperature: 0
                  n: 1
                  stream: false
              streaming:
                summary: 流式
                description: '通过设置 stream: true 启用流式响应。'
                value:
                  model: deepseek-r1
                  prompt: Say this is a test
                  max_tokens: 7
                  temperature: 0
                  stream: true
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/CompletionResponse"
              examples:
                default-response:
                  summary: 基础响应
                  description: 对应基础文本补全请求的响应示例。
                  value:
                    id: '02177286136439468d44c5a45de4f1e59cc8a01ee3524bc4cf5a9'
                    object: text_completion
                    created: 1772861365
                    model: deepseek-r1
                    choices:
                    - text: This is a test.
                      index: 0
                      finish_reason: stop
                    usage:
                      prompt_tokens: 10
                      completion_tokens: 6
                      total_tokens: 16
            text/event-stream:
              schema:
                type: string
                description: '流式响应以 Server-Sent Events 格式返回，每个事件是一行以 ''data: '' 开头的
                  JSON 数据块，最后以 ''data: [DONE]'' 结束。'
              examples:
                streaming-response:
                  summary: 流式响应示例
                  description: 展示流式文本补全过程中陆续发送的事件。
                  value: |
                    data: {"id":"02177286136439468d44c5a45de4f1e59cc8a01ee3524bc4cf5a9","object":"text_completion","created":1772861365,"model":"deepseek-r1","choices":[{"text":"This","index":0,"finish_reason":null}]}
                    data: {"id":"02177286136439468d44c5a45de4f1e59cc8a01ee3524bc4cf5a9","object":"text_completion","created":1772861365,"model":"deepseek-r1","choices":[{"text":" is","index":0,"finish_reason":null}]}
                    data: {"id":"02177286136439468d44c5a45de4f1e59cc8a01ee3524bc4cf5a9","object":"text_completion","created":1772861365,"model":"deepseek-r1","choices":[{"text":" a","index":0,"finish_reason":null}]}
                    data: {"id":"02177286136439468d44c5a45de4f1e59cc8a01ee3524bc4cf5a9","object":"text_completion","created":1772861365,"model":"deepseek-r1","choices":[{"text":" test","index":0,"finish_reason":null}]}
                    data: {"id":"02177286136439468d44c5a45de4f1e59cc8a01ee3524bc4cf5a9","object":"text_completion","created":1772861365,"model":"deepseek-r1","choices":[{"text":".","index":0,"finish_reason":"stop"}]}
                    data: [DONE]
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
  "/v1/messages":
    post:
      tags:
      - messages_deepseek
      summary: 创建 Messages 消息
      description: 使用 Anthropic Messages 兼容格式创建消息响应。
      operationId: createMessage_deepseek
      security:
      - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateMessagesRequest"
            examples:
              default:
                summary: 基础
                value:
                  model: deepseek/deepseek-v4-flash
                  messages:
                  - role: user
                    content: Hello
                  max_tokens: 128
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/MessageResponse"
              examples:
                default:
                  summary: 基础响应
                  value:
                    id: msg_123
                    type: message
                    role: assistant
                    model: deepseek/deepseek-v4-flash
                    content:
                    - type: text
                      text: Hello! How can I help you today?
                    stop_reason: end_turn
                    usage:
                      input_tokens: 12
                      output_tokens: 9
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
components:
  "$ref": "./_common.yaml#/components"
