---
openapi: 3.1.0
info:
  "$ref": "./_common.yaml#/info"
servers:
  "$ref": "./_common.yaml#/servers"
tags:
- "$ref": "./_common.yaml#/tags/0"
- "$ref": "./_common.yaml#/tags/1"
- "$ref": "./_common.yaml#/tags/2"
- "$ref": "./_common.yaml#/tags/3"
- "$ref": "./_common.yaml#/tags/4"
- "$ref": "./_common.yaml#/tags/5"
- name: chat_completions_volcengine
  x-parent: chat_completions
  x-page-title: Volcengine
  x-page-icon: brain
  description: Volcengine 的对话生成 API
- name: responses_volcengine
  x-parent: chat_completions
  x-page-title: Volcengine
  x-page-icon: brain
  description: Volcengine 的 Responses 协议 API
- name: image_generations_volcengine
  x-parent: image_generations
  x-page-title: Volcengine
  x-page-icon: image
  description: Volcengine 的图像生成 API
- name: image_edits_volcengine
  x-parent: image_edits
  x-page-title: Volcengine
  x-page-icon: image
  description: Volcengine 的图像编辑 API
- name: video_generations_volcengine
  x-parent: video_generations
  x-page-title: Volcengine
  x-page-icon: video
  description: Volcengine 的视频生成 API
paths:
  "/v1/chat/completions":
    post:
      tags:
      - chat_completions_volcengine
      summary: 创建对话补全
      description: 提供与 OpenAI Chat Completions 兼容的对话接口。具体支持的参数和行为因模型而异。
      operationId: createChatCompletion_volcengine
      security:
      - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateChatCompletionRequest"
            examples:
              default:
                summary: 基础
                description: 一个简单的对话补全示例。
                value:
                  model: doubao-seed-2-0-lite-260215
                  messages:
                  - role: user
                    content: Hello!
                  max_completion_tokens: 50
                  temperature: 0.7
                  n: 1
                  stream: false
              streaming:
                summary: 流式
                description: '通过设置 stream: true 启用流式响应。'
                value:
                  model: doubao-seed-2-0-lite-260215
                  messages:
                  - role: user
                    content: Hello!
                  stream: true
              image_input:
                summary: 图像输入（多模态）
                description: 使用支持视觉的模型分析图像。
                value:
                  model: doubao-seed-2-0-lite-260215
                  messages:
                  - role: user
                    content:
                    - type: text
                      text: What is in this image?
                    - type: image_url
                      image_url:
                        url: https://ark-project.tos-cn-beijing.volces.com/doc_image/seedream4_5_imageToimage.png
                  max_completion_tokens: 300
              functions:
                summary: 函数调用
                description: 定义工具（函数）并让模型决定是否调用。
                value:
                  model: doubao-seed-2-0-lite-260215
                  messages:
                  - role: user
                    content: What is the weather in Boston?
                  tools:
                  - type: function
                    function:
                      name: get_current_weather
                      description: Get the current weather in a given location
                      parameters:
                        type: object
                        properties:
                          location:
                            type: string
                            description: The city and state, e.g. San Francisco, CA
                          unit:
                            type: string
                            enum:
                            - celsius
                            - fahrenheit
                        required:
                        - location
                  tool_choice: auto
                  max_completion_tokens: 150
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ChatCompletionResponse"
              examples:
                default-response:
                  summary: 基础响应
                  description: 对应基础对话补全请求的响应示例。
                  value:
                    id: '021772864435690b7e0a86771f3aae54bdc5a127ef95baa9c2b48'
                    object: chat.completion
                    created: 1772864438
                    model: doubao-seed-2-0-lite-260215
                    choices:
                    - index: 0
                      message:
                        role: assistant
                        content: "Hello there! \U0001F60A How can I assist you today?"
                        reasoning_content: "用户说\"Hello!\"，我需要回应一个友好的问候。首先，保持自然亲切，比如\"Hello
                          there! \U0001F60A How can I assist you today?\"这样既回应了问候，又表达了愿意帮忙的态度，符合AI的角色设定。检查一下，语言简洁友好，带有表情符号更生动，应该没问题。"
                      finish_reason: stop
                    usage:
                      prompt_tokens: 50
                      completion_tokens: 83
                      total_tokens: 133
                    service_tier: default
                image_input-response:
                  summary: 图像输入响应
                  description: 模型根据图像内容生成的描述。
                  value:
                    id: '021772864507442454c0d8025bd4547674d07aeb10e65a37260a1'
                    object: chat.completion
                    created: 1772864518
                    model: doubao-seed-2-0-lite-260215
                    choices:
                    - index: 0
                      message:
                        role: assistant
                        content: |-
                          This is a futuristic, surreal, cyberpunk-style digital or 3D-rendered artwork:
                          1.  The central subject is a humanoid figure, appearing feminine, posed dynamically with their head tilted back, arms outstretched, in front of a simple studio white backdrop on black support rigs.
                          2.  The figure is covered in a **glossy, reflective liquid chrome/silver metallic substance** that forms an organic, fragmented "garment" with sharp, tendril-like, drippy edges, and also coats their head, forming spiky, wet-look "hair", arms, and hands. The material looks like it's in a state of transformation, as if melting or solidifying onto the body.
                          3.  The bright studio lighting emphasizes the highly reflective, polished surface of the metallic coating, creating strong highlights and deep shadows that give the material a viscous, molten appearance.
                          4.  The overall aesthetic is sci-fi, futuristic high-fashion, with a biomechanical, otherworldly, almost "liquid metal being" vibe, recalling cyborg or synthetic entity concepts.
                        reasoning_content: |-
                          Got it, let's break down this image. First, it's a futuristic, cyberpunk-style 3D (or AI-generated) art piece of a figure (appears to be a woman) in a studio setting, in front of a white backdrop stand.

                          The figure is covered in a **liquid-like, reflective metallic (silver/chrome) substance** that forms a fragmented, organic "dress" with sharp, tendril-like, drippy edges, and also covers her head (spiky, wet-looking chrome hair/coating) and parts of her arms. Her pose is dramatic: head tilted back, arms outstretched, looking upward, giving a sense of transformation or a futuristic, otherworldly vibe.

                          The lighting is bright, studio-style, highlighting the reflective, glossy surface of the chrome material, creating strong highlights and shadows that emphasize the liquid, sculpted texture. The overall aesthetic is sci-fi, futuristic fashion, with a surreal, biomechanical/liquid metal feel, like a being made of or covered in a shifting, molten chrome substance.
                      finish_reason: stop
                    usage:
                      prompt_tokens: 540
                      completion_tokens: 452
                      total_tokens: 992
                    service_tier: default
                functions-response:
                  summary: 函数调用响应
                  description: 模型返回一个函数调用请求。
                  value:
                    id: '02177286456308318cc8b35e794a1d5ce66758b690d3ae1fd30df'
                    object: chat.completion
                    created: 1772864571
                    model: doubao-seed-2-0-lite-260215
                    choices:
                    - index: 0
                      message:
                        role: assistant
                        content: ''
                        tool_calls:
                        - id: call_xlu24zqz1ptz3git9mwjmn9x
                          type: function
                          function:
                            name: get_current_weather
                            arguments: ' {"location": "Boston, MA"}'
                        reasoning_content: Got it, let's see. The user is asking about
                          the weather in Boston. The function available is get_current_weather,
                          which requires location and optionally unit. The location
                          here is Boston, so I need to specify that. Wait, do I need
                          to include state? The example uses "San Francisco, CA",
                          but Boston is in Massachusetts, so maybe "Boston, MA" is
                          better, but maybe just "Boston" works too? Wait, the function's
                          location parameter says city and state, but maybe if I just
                          put Boston, it might still get it, but to be precise, I
                          should include MA. Also, the unit isn't specified by the
                          user, so I can either leave it out (since it's not required)
                          or ask? Wait no, the required parameter is location, so
                          unit is optional. So I can call the function with location
                          "Boston, MA" and maybe not include unit, or let it default?
                          Wait the function parameters say unit is optional, so I
                          can omit it, but maybe the user would prefer a specific
                          unit? But since they didn't ask, I just call with location
                          first. Let me structure the function call correctly. So
                          the function name is get_current_weather, parameters location
                          is "Boston, MA". Let me write that in the required format.
                      finish_reason: tool_calls
                    usage:
                      prompt_tokens: 459
                      completion_tokens: 301
                      total_tokens: 760
                    service_tier: default
            text/event-stream:
              schema:
                type: string
                description: '流式响应以 Server-Sent Events 格式返回，每个事件是一行以 ''data: '' 开头的
                  JSON 数据块，最后以 ''data: [DONE]'' 结束。'
              examples:
                streaming-response:
                  summary: 流式响应示例
                  description: 展示流式聊天过程中陆续发送的事件。
                  value: |
                    data: {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"doubao-seed-2-0-lite-260215","choices":[{"index":0,"delta":{"role":"assistant"},"finish_reason":null}]}
                    data: {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"doubao-seed-2-0-lite-260215","choices":[{"index":0,"delta":{"content":"Hello"},"finish_reason":null}]}
                    data: {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"doubao-seed-2-0-lite-260215","choices":[{"index":0,"delta":{"content":" there!"},"finish_reason":null}]}
                    data: {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"doubao-seed-2-0-lite-260215","choices":[{"index":0,"delta":{},"finish_reason":"stop"}]}
                    data: [DONE]
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
  "/v1/responses":
    post:
      tags:
      - responses_volcengine
      summary: 创建 Responses 响应
      description: 提供与 OpenAI Responses 兼容的接口。具体支持的参数和行为因模型而异。
      operationId: createResponse_volcengine
      security:
      - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateResponseRequest"
            examples:
              default:
                summary: 基础
                description: 一个纯文本的基础 Responses 请求示例。
                value:
                  model: doubao-seed-2-0-lite-260215
                  input: Hello
                  stream: false
              streaming:
                summary: 流式
                description: '通过设置 stream: true 启用语义化事件流返回。'
                value:
                  model: doubao-seed-2-0-lite-260215
                  input:
                  - role: user
                    content:
                    - type: input_text
                      text: Write a short welcome message for a new user.
                  stream: true
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ResponseObject"
              examples:
                default:
                  summary: 基础响应
                  value:
                    id: resp_123
                    object: response
                    model: doubao-seed-2-0-lite-260215
                    output:
                    - id: msg_123
                      type: message
                      role: assistant
                      status: completed
                      content:
                      - type: output_text
                        text: Hello! How can I help you today?
                    usage:
                      input_tokens: 12
                      output_tokens: 9
                      total_tokens: 21
            text/event-stream:
              schema:
                type: string
                description: Responses 流式返回使用 Server-Sent Events，并携带带类型的语义化事件。
              examples:
                streaming-response:
                  summary: 流式响应示例
                  description: 展示 Responses 流式调用期间的最小事件序列。
                  value: |
                    data: {"type":"response.created","sequence_number":0,"response":{"id":"resp_123","object":"response","created_at":1741487325,"status":"in_progress","model":"doubao-seed-2-0-lite-260215"}}
                    data: {"type":"response.output_text.delta","sequence_number":1,"item_id":"msg_123","output_index":0,"content_index":0,"delta":"Hello"}
                    data: {"type":"response.output_text.delta","sequence_number":2,"item_id":"msg_123","output_index":0,"content_index":0,"delta":" there!"}
                    data: {"type":"response.completed","sequence_number":3,"response":{"id":"resp_123","object":"response","created_at":1741487325,"status":"completed","model":"doubao-seed-2-0-lite-260215","output":[{"id":"msg_123","type":"message","role":"assistant","status":"completed","content":[{"type":"output_text","text":"Hello there!"}]}]}}
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
  "/v1/images/generations":
    post:
      tags:
      - image_generations_volcengine
      summary: 生成图像
      description: 提供与 OpenAI Images 兼容的图像生成接口。具体支持的能力因模型而异。
      operationId: createImage_volcengine
      security:
      - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateImageGenerationRequest"
            examples:
              default:
                summary: 基础
                description: 一个简单的图像生成示例。
                value:
                  model: doubao-seedream-4-5-251128
                  prompt: A cat wearing a hat
                  n: 1
                  size: 1024x1024
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ImageResponse"
              examples:
                default-response:
                  summary: 基础响应
                  description: 对应基础图像生成请求的响应示例。
                  value:
                    created: 1677825464
                    data:
                    - url: https://example.com/cat-hat.png
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
  "/v1/images/edits":
    post:
      tags:
      - image_edits_volcengine
      summary: 编辑图像
      description: 提供与 OpenAI Images 兼容的图像编辑接口。具体支持的能力因模型而异。
      operationId: createImageEdit_volcengine
      security:
      - APIKeyHeader: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              "$ref": "#/components/schemas/CreateImageEditRequest"
            examples:
              default:
                summary: 基础图像编辑
                description: 编辑图像的基础示例。
                value:
                  model: doubao-seedream-4-5-251128
                  image:
                  - "@/path/to/image.png"
                  prompt: Add a hat to the cat
                  size: 1024x1024
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ImageResponse"
              examples:
                default-response:
                  summary: 基础响应
                  description: 对应基础图像编辑请求的响应示例。
                  value:
                    created: 1677825464
                    data:
                    - url: https://example.com/edited-image.png
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
  "/v1/videos":
    post:
      tags:
      - video_generations_volcengine
      summary: 创建视频任务
      description: 提供与 OpenAI Videos 兼容的视频生成接口。具体支持的能力因模型而异。
      operationId: createVideo_volcengine
      security:
      - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateVideoRequest"
            examples:
              text_to_video:
                summary: 文生视频
                description: acceptance 已验证的纯文本 Seedance 请求。
                value:
                  model: doubao-seedance-2-0-260128
                  prompt: 写实风格，晴朗的蓝天之下，一大片白色的雏菊花田，镜头逐渐拉近，最终定格在一朵雏菊花的特写上，花瓣上有几颗晶莹的露珠
                  duration: 5
                  ratio: '16:9'
                  resolution: 720p
                  generate_audio: false
                  watermark: true
              first_frame_image_to_video:
                summary: 首帧图生视频
                description: 使用首帧图片引用，并生成视频音频。
                value:
                  model: doubao-seedance-2-0-260128
                  prompt: 女孩抱着狐狸，女孩睁开眼，温柔地看向镜头，狐狸友善地抱着，镜头缓缓拉出，女孩的头发被风吹动，可以听到风声
                  duration: 5
                  ratio: adaptive
                  resolution: 720p
                  generate_audio: true
                  watermark: false
                  image:
                    url: https://ark-project.tos-cn-beijing.volces.com/doc_image/i2v_foxrgirl.png
                    role: first_frame
              first_last_frame_image_to_video:
                summary: 首尾帧图生视频
                description: 分别提供首帧和尾帧图片。
                value:
                  model: doubao-seedance-2-0-260128
                  prompt: 360度环绕运镜
                  duration: 5
                  ratio: adaptive
                  resolution: 720p
                  generate_audio: false
                  watermark: true
                  image:
                  - url: https://ark-project.tos-cn-beijing.volces.com/doc_image/r2v_tea_pic1.jpg
                    role: first_frame
                  - url: https://ark-project.tos-cn-beijing.volces.com/doc_image/r2v_tea_pic2.jpg
                    role: last_frame
              multimodal_reference:
                summary: 图片、视频和音频参考
                description: 组合参考图、参考视频和参考音频。
                value:
                  model: doubao-seedance-2-0-260128
                  prompt: 全程使用视频1的第一视角构图，全程使用音频1作为背景音乐。第一人称视角果茶宣传广告，seedance牌「苹苹安安」苹果果茶限定款；首帧为图片1，尾帧定格为图片2。背景声音统一为女生音色。
                  duration: 11
                  ratio: '16:9'
                  resolution: 720p
                  generate_audio: true
                  watermark: true
                  image:
                  - url: https://ark-project.tos-cn-beijing.volces.com/doc_image/r2v_tea_pic1.jpg
                    role: reference_image
                  - url: https://ark-project.tos-cn-beijing.volces.com/doc_image/r2v_tea_pic2.jpg
                    role: reference_image
                  video:
                    url: https://ark-project.tos-cn-beijing.volces.com/doc_video/r2v_tea_video1.mp4
                    role: reference_video
                  audio:
                    url: https://ark-project.tos-cn-beijing.volces.com/doc_audio/r2v_tea_audio1.mp3
                    role: reference_audio
              native_content_multimodal:
                summary: 原生 Seedance content
                description: 通过 extra_body 透传原生 content，acceptance 已覆盖。
                value:
                  model: doubao-seedance-2-0-260128
                  prompt: This prompt is ignored because native Seedance content is
                    supplied.
                  generate_audio: true
                  watermark: true
                  duration: 11
                  ratio: '16:9'
                  resolution: 720p
                  extra_body:
                    content:
                    - type: text
                      text: 全程使用视频1的第一视角构图，全程使用音频1作为背景音乐。第一人称视角果茶宣传广告，首帧为图片1，尾帧定格为图片2。
                    - type: image_url
                      image_url:
                        url: https://ark-project.tos-cn-beijing.volces.com/doc_image/r2v_tea_pic1.jpg
                      role: reference_image
                    - type: image_url
                      image_url:
                        url: https://ark-project.tos-cn-beijing.volces.com/doc_image/r2v_tea_pic2.jpg
                      role: reference_image
                    - type: video_url
                      video_url:
                        url: https://ark-project.tos-cn-beijing.volces.com/doc_video/r2v_tea_video1.mp4
                      role: reference_video
                    - type: audio_url
                      audio_url:
                        url: https://ark-project.tos-cn-beijing.volces.com/doc_audio/r2v_tea_audio1.mp3
                      role: reference_audio
                    duration: 11
                    ratio: '16:9'
                    resolution: 720p
                    generate_audio: true
                    watermark: true
              passthrough_parameters:
                summary: 厂家透传参数
                description: 通过 extra_body 透传厂家特有字段。
                value:
                  model: doubao-seedance-2-0-260128
                  prompt: 写实风格，镜头平稳推进到一片白色雏菊花田。
                  duration: 5
                  ratio: '16:9'
                  resolution: 720p
                  generate_audio: false
                  watermark: false
                  extra_body:
                    service_tier: flex
                    camera_fixed: false
                    seed: 20260603
                    priority: 1
                    callback_url: https://example.com/aillm-release/seedance/callback
                    execution_expires_after: 3600
              seconds_size_mapping:
                summary: seconds 和 size 兼容字段
                description: 使用 OpenAI 兼容的 seconds 和 size 字段；网关会映射为 Seedance 的 duration、ratio
                  和 resolution。
                value:
                  model: doubao-seedance-2-0-260128
                  prompt: 宽银幕镜头，一只纸船缓慢漂过晨雾中的湖面。
                  seconds: '4'
                  size: 2560x1080
                  generate_audio: false
                  watermark: false
      responses:
        '200':
          description: 视频任务已创建
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/VideoTask"
              examples:
                queued:
                  summary: 排队中的任务
                  value:
                    id: video_seedance_123
                    object: video
                    created_at: 1770000000
                    status: queued
                    model: doubao-seedance-2-0-260128
                    usage:
                      duration_seconds: 5
                      video_resolution: 720p
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
    get:
      tags:
      - video_generations_volcengine
      summary: 列出视频任务
      description: 列出当前 API key 下的视频任务，可按模型、状态和页码过滤。已有 video_id 时，可直接调用查询或内容下载接口获取状态和视频
        URL。
      operationId: listVideos_volcengine
      security:
      - APIKeyHeader: []
      parameters:
      - name: custom_llm_provider
        in: query
        description: 供应商选择参数。Seedance 任务可使用 volcengine。
        schema:
          type: string
        example: volcengine
      - name: model
        in: query
        description: 按模型过滤。
        schema:
          type: string
        example: doubao-seedance-2-0-260128
      - name: limit
        in: query
        description: 每页数量，最大 100。
        schema:
          type: integer
        example: 20
      - name: after
        in: query
        description: 兼容参数。建议使用 page_num。
        schema:
          type: string
      - name: order
        in: query
        description: 兼容参数。
        deprecated: true
        schema:
          type: string
      - name: status
        in: query
        description: 按状态过滤，例如 completed 或 in_progress。
        schema:
          type: string
        example: completed
      - name: filter.status
        in: query
        description: 状态过滤的兼容写法。
        schema:
          type: string
        example: succeeded
      - name: filter.model
        in: query
        description: 模型过滤的兼容写法。推荐使用 model。
        schema:
          type: string
        example: doubao-seedance-2-0-260128
      - name: page_size
        in: query
        description: 每页数量的兼容写法。推荐使用 limit。
        schema:
          type: integer
        example: 1
      - name: page_num
        in: query
        description: 页码，从 1 开始。
        schema:
          type: integer
        example: 2
      - name: page_token
        in: query
        description: 兼容参数。建议使用 page_num。
        deprecated: true
        schema:
          type: string
        example: video_seedance_123
      responses:
        '200':
