                "$ref": "#/components/schemas/VideoListResponse"
              examples:
                filtered:
                  summary: 过滤后的列表
                  value:
                    object: list
                    has_more: true
                    data:
                    - id: video_seedance_124
                      object: video
                      status: completed
                      model: doubao-seedance-2-0-260128
                      seconds: '5'
                      size: 1280x720
