  "/v1/videos/{video_id}":
    get:
      tags:
      - video_generations_volcengine
      summary: 查询视频任务
      description: 提供与 OpenAI Videos 兼容的视频生成接口。具体支持的能力因模型而异。
      operationId: retrieveVideo_volcengine
      security:
      - APIKeyHeader: []
      parameters:
      - name: video_id
        in: path
        required: true
        description: 创建视频任务返回的任务 ID。
        schema:
          type: string
        example: video_seedance_123
      responses:
        '200':
          description: 视频任务
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/VideoTask"
              examples:
                completed:
                  summary: 已完成任务
                  value:
                    id: video_seedance_123
                    object: video
                    created_at: 1770000000
                    completed_at: 1770000012
                    status: completed
                    model: doubao-seedance-2-0-260128
                    seconds: '5'
                    size: 1280x720
                    usage:
                      duration_seconds: 5
                      video_resolution: 720p
                failed:
                  summary: 失败任务
                  value:
                    id: video_seedance_125
                    object: video
                    status: failed
                    model: doubao-seedance-2-0-260128
                    seconds: '5'
                    error:
                      code: ProviderVideoGenerationFailed
                      message: Video generation failed.
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '404':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
    delete:
      tags:
      - video_generations_volcengine
      summary: 取消或删除视频任务
      description: 取消排队中的视频生成任务，或删除已结束的视频生成任务记录。VolcEngine 不允许删除进行中的任务；当任务仍为 running
        / in_progress 时，上游会返回 InvalidAction.RunningTaskDeletion / 409 Conflict，AILLM
        会映射为 OpenAI-style 错误文案。
      operationId: deleteVideo_volcengine
      security:
      - APIKeyHeader: []
      parameters:
      - name: video_id
        in: path
        required: true
        description: 视频任务 ID。
        schema:
          type: string
        example: video_seedance_123
      responses:
        '200':
          description: 删除或取消后的任务对象
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/VideoTask"
              examples:
                active_cancelled:
                  summary: 活跃任务已取消
                  value:
                    id: video_seedance_123
                    object: video
                    status: cancelled
                    model: doubao-seedance-2-0-260128
                completed_retained:
                  summary: 已完成任务保持完成状态
                  value:
                    id: video_seedance_124
                    object: video
                    status: completed
                    model: doubao-seedance-2-0-260128
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '404':
          "$ref": "#/components/responses/ErrorResponse"
        '409':
          description: 任务正在运行，不能删除
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
              example:
                error:
                  message: Cannot delete a video generation task while it is running.
                    Queued tasks may be canceled, and finished task records may be
                    deleted. Check the task status and retry after it is no longer
                    running.
                  type: invalid_request_error
                  code: conflict
                  request_id: req_123
        '429':
          "$ref": "#/components/responses/ErrorResponse"
