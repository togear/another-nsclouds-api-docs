---
openapi: 3.1.0
info:
  "$ref": "./_common.yaml#/info"
servers:
  "$ref": "./_common.yaml#/servers"
tags:
- "$ref": "./_common.yaml#/tags/0"
- "$ref": "./_common.yaml#/tags/1"
- "$ref": "./_common.yaml#/tags/2"
- "$ref": "./_common.yaml#/tags/3"
- "$ref": "./_common.yaml#/tags/4"
- name: chat_completions_deepseek
  x-parent: chat_completions
  x-page-title: DeepSeek
  x-page-icon: brain
  description: DeepSeek's chat completions API
- name: messages_deepseek
  x-parent: chat_completions
  x-page-title: DeepSeek
  x-page-icon: brain
  description: DeepSeek's Messages protocol API
- name: responses_deepseek
  x-parent: chat_completions
  x-page-title: DeepSeek
  x-page-icon: brain
  description: DeepSeek's Responses API
paths:
  "/v1/chat/completions":
    post:
      tags:
      - chat_completions_deepseek
      summary: Create chat completion
      description: Generate model response based on input messages. Fully compatible
        with OpenAI's Chat API.
      operationId: createChatCompletion_deepseek
      security:
      - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateChatCompletionRequest"
            examples:
              default:
                summary: Basic
                description: A simple conversation example with system prompt and
                  user message.
                value:
                  model: deepseek-r1
                  messages:
                  - role: system
                    content: You are a helpful assistant.
                  - role: user
                    content: Hello!
                  temperature: 1
                  max_completion_tokens: 50
                  n: 1
                  stream: false
              streaming:
                summary: Streaming
                description: 'Enable streaming response by setting stream: true.'
                value:
                  model: deepseek-r1
                  messages:
                  - role: user
                    content: Hello!
                  stream: true
              image_input:
                summary: Image Input (Multimodal)
                description: Use vision-enabled model to analyze images.
                value:
                  model: deepseek-r1
                  messages:
                  - role: user
                    content:
                    - type: text
                      text: What is in this image?
                    - type: image_url
                      image_url:
                        url: https://ark-project.tos-cn-beijing.volces.com/doc_image/seedream4_5_imageToimage.png
                  max_completion_tokens: 300
              functions:
                summary: Function Calling
                description: Define tools (functions) and let the model decide whether
                  to call them.
                value:
                  model: deepseek-r1
                  messages:
                  - role: user
                    content: What is the weather in Boston?
                  tools:
                  - type: function
                    function:
                      name: get_current_weather
                      description: Get the current weather in a given location
                      parameters:
                        type: object
                        properties:
                          location:
                            type: string
                            description: The city and state, e.g. San Francisco, CA
                          unit:
                            type: string
                            enum:
                            - celsius
                            - fahrenheit
                        required:
                        - location
                  tool_choice: auto
                  max_completion_tokens: 150
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ChatCompletionResponse"
              examples:
                default-response:
                  summary: Basic Response
                  description: Response example corresponding to basic chat request.
                  value:
                    id: chatcmpl-cdc11700-f52c-99a3-866c-cfac2a0b254c
                    object: chat.completion
                    created: 1772859125
                    model: deepseek-r1
                    choices:
                    - index: 0
                      message:
                        role: assistant
                        content: "Hello! How can I help you today? \U0001F60A"
                      finish_reason: stop
                    usage:
                      prompt_tokens: 15
                      completion_tokens: 11
                      total_tokens: 26
                image_input-response:
                  summary: Image Input Response
                  description: Model's description generated based on image content.
                  value:
                    id: chatcmpl-856cd72d-f840-92da-a0b3-65f0061ac378
                    object: chat.completion
                    created: 1772861532
                    model: deepseek-r1
                    choices:
                    - index: 0
                      message:
                        role: assistant
                        content: |-
                          Of course. This is an image of a stylized, cartoon-style drawing of a **dragon wearing a backpack and holding a walking stick**.

                          Here are the details:

                          *   **Main Subject:** A friendly-looking dragon.
                          *   **Attire/Accessories:**
                              *   It's wearing a **backpack** with a strap across its chest.
                              *   It's holding a long **walking stick** or trekking pole in its right hand (claw).
                          *   **Setting:** The dragon appears to be on a journey or hike, walking on a simple ground line.
                          *   **Style:** The image is a black and white line drawing, likely intended as a coloring page for children. The lines are clear and simple, making it easy to color.

                          In short, it's an illustration of an adventurous dragon, ready for a hike or a quest.
                      finish_reason: stop
                    usage:
                      prompt_tokens: 13
                      completion_tokens: 179
                      total_tokens: 192
                functions-response:
                  summary: Function Call Response
                  description: Model returns a function call request.
                  value:
                    id: chatcmpl-7709ac0a-5dc2-9791-81ef-1364bf331761
                    object: chat.completion
                    created: 1772861551
                    model: deepseek-r1
                    choices:
                    - index: 0
                      message:
                        role: assistant
                        content: I'll check the current weather in Boston for
                        tool_calls:
                        - id: chatcmpl-tool-6701c1adf7ab40b598c423c3530190b9
                          type: function
                          function:
                            name: get_current_weather
                            arguments: '{"location": "Boston, MA"}'
                      finish_reason: tool_calls
                    usage:
                      prompt_tokens: 198
                      completion_tokens: 28
                      total_tokens: 226
            text/event-stream:
              schema:
                type: string
                description: 'Streaming response is returned in Server-Sent Events
                  format, each event is a line of JSON data block starting with ''data:
                  '', ending with ''data: [DONE]''.'
              examples:
                streaming-response:
                  summary: Streaming Response Example
                  description: Shows events sent sequentially during streaming chat
                    process.
                  value: "data: {\"id\":\"chatcmpl-2e08cd46-ddf8-9aef-bce0-f94395447528\",\"object\":\"chat.completion.chunk\",\"created\":1772861378,\"model\":\"deepseek-r1\",\"choices\":[{\"index\":0,\"delta\":{\"content\":\"Hello\",\"role\":\"assistant\"}}]}\ndata:
                    {\"id\":\"chatcmpl-2e08cd46-ddf8-9aef-bce0-f94395447528\",\"object\":\"chat.completion.chunk\",\"created\":1772861378,\"model\":\"deepseek-r1\",\"choices\":[{\"index\":0,\"delta\":{\"content\":\"!
                    How\"}}]}\ndata: {\"id\":\"chatcmpl-2e08cd46-ddf8-9aef-bce0-f94395447528\",\"object\":\"chat.completion.chunk\",\"created\":1772861378,\"model\":\"deepseek-r1\",\"choices\":[{\"index\":0,\"delta\":{\"content\":\"
                    can I help\"}}]}\ndata: {\"id\":\"chatcmpl-2e08cd46-ddf8-9aef-bce0-f94395447528\",\"object\":\"chat.completion.chunk\",\"created\":1772861378,\"model\":\"deepseek-r1\",\"choices\":[{\"index\":0,\"delta\":{\"content\":\"
                    you today\"}}]}\ndata: {\"id\":\"chatcmpl-2e08cd46-ddf8-9aef-bce0-f94395447528\",\"object\":\"chat.completion.chunk\",\"created\":1772861378,\"model\":\"deepseek-r1\",\"choices\":[{\"index\":0,\"delta\":{\"content\":\"?
                    \U0001F60A\"}}]}\ndata: {\"id\":\"chatcmpl-2e08cd46-ddf8-9aef-bce0-f94395447528\",\"object\":\"chat.completion.chunk\",\"created\":1772861378,\"model\":\"deepseek-r1\",\"choices\":[{\"finish_reason\":\"stop\",\"index\":0,\"delta\":{}}]}\ndata:
                    [DONE]\n"
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
  "/v1/messages":
    post:
      tags:
      - messages_deepseek
      summary: Create Message
      description: Create a message using Anthropic Messages-compatible payload.
      operationId: createMessage_deepseek
      security:
      - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateMessagesRequest"
            examples:
              default:
                summary: Basic
                value:
                  model: deepseek-v4-flash
                  messages:
                  - role: user
                    content: Hello
                  max_tokens: 128
      responses:
        '200':
          description: Success Response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/MessageResponse"
              examples:
                default:
                  summary: Basic Response
                  value:
                    id: msg_123
                    type: message
                    role: assistant
                    model: deepseek-v4-flash
                    content:
                    - type: text
                      text: Hello! How can I help you today?
                    stop_reason: end_turn
                    usage:
                      input_tokens: 12
                      output_tokens: 9
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
  "/v1/responses":
    post:
      tags:
      - responses_deepseek
      summary: Create Response
      description: Create a model response using OpenAI Responses-compatible payload.
      operationId: createResponse_deepseek
      security:
      - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateResponseRequest"
            examples:
              default:
                summary: Basic
                value:
                  model: deepseek-v3.2
                  input: Hello
                  stream: false
      responses:
        '200':
          description: Success Response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ResponseObject"
              examples:
                default:
                  summary: Basic Response
                  value:
                    id: resp_123
                    object: response
                    model: deepseek-v3.2
                    output:
                    - id: msg_123
                      type: message
                      role: assistant
                      status: completed
                      content:
                      - type: output_text
                        text: Hello! How can I help you today?
                    usage:
                      input_tokens: 12
                      output_tokens: 9
                      total_tokens: 21
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
components:
  "$ref": "./_common.yaml#/components"
