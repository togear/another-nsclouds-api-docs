---
openapi: 3.1.0
info:
  "$ref": "./_common.yaml#/info"
servers:
  "$ref": "./_common.yaml#/servers"
tags:
- "$ref": "./_common.yaml#/tags/0"
- "$ref": "./_common.yaml#/tags/1"
- "$ref": "./_common.yaml#/tags/2"
- "$ref": "./_common.yaml#/tags/3"
- "$ref": "./_common.yaml#/tags/4"
- name: chat_completions_xiaomi
  x-parent: chat_completions
  x-page-title: Xiaomi
  x-page-icon: brain
  description: Xiaomi's chat completions API
paths:
  "/v1/chat/completions":
    post:
      tags:
      - chat_completions_xiaomi
      summary: Create Chat Completion
      description: Generate model responses based on input messages. Fully compatible
        with OpenAI's Chat API.
      operationId: createChatCompletion_xiaomi
      security:
      - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateChatCompletionRequest"
            examples:
              default:
                summary: Basic
                description: A simple conversation example with system prompt and
                  user message.
                value:
                  model: mimo-v2.5
                  messages:
                  - role: system
                    content: You are a helpful assistant.
                  - role: user
                    content: Hello!
                  temperature: 1
                  max_completion_tokens: 50
                  n: 1
                  stream: false
              streaming:
                summary: Streaming
                description: 'Enable streaming response by setting stream: true.'
                value:
                  model: mimo-v2.5
                  messages:
                  - role: system
                    content: You are a helpful assistant.
                  - role: user
                    content: Tell me a story.
                  temperature: 0.7
                  max_completion_tokens: 100
                  stream: true
              image_input:
                summary: Image Input (URL)
                description: Analyze one or more images by URL using image_url parts.
                value:
                  model: mimo-v2.5
                  messages:
                  - role: user
                    content:
                    - type: text
                      text: What is in this image?
                    - type: image_url
                      image_url:
                        url: https://ark-project.tos-cn-beijing.volces.com/doc_image/seedream4_5_imageToimage.png
                  max_completion_tokens: 300
              functions:
                summary: Function Calling
                description: Define tools (functions) and let the model decide whether
                  to call them.
                value:
                  model: mimo-v2.5
                  messages:
                  - role: user
                    content: Read the content of the file report.txt
                  tools:
                  - type: function
                    function:
                      name: read_file
                      description: Read the content of a file
                      parameters:
                        type: object
                        properties:
                          file_path:
                            type: string
                            description: The path to the file to read
                        required:
                        - file_path
                  tool_choice: auto
                  max_completion_tokens: 150
      responses:
        '200':
          description: Success Response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ChatCompletionResponse"
              examples:
                default-response:
                  summary: Basic Response
                  description: Response example for basic chat request.
                  value:
                    id: chatcmpl-BPzJw3iWI2jtsjCnR0rRCBvLCETq7
                    created: 1773197421
                    model: mimo-v2.5
                    object: chat.completion
                    choices:
                    - index: 0
                      message:
                        role: assistant
                        content: Hi! How can I help today? I can answer questions,
                          explain topics, brainstorm ideas, write or edit text, solve
                          problems, or analyze images.
                      finish_reason: stop
                    usage:
                      completion_tokens: 174
                      prompt_tokens: 8
                      total_tokens: 182
                      completion_tokens_details:
                        reasoning_tokens: 128
                image_input-response:
                  summary: Image Input Response
                  description: Model-generated description based on image content.
                  value:
                    id: chatcmpl-s71Ce6GRN8PzAOB0PbVmNFGdSlGjS
                    created: 1773197559
                    model: mimo-v2.5
                    object: chat.completion
                    choices:
                    - index: 0
                      message:
                        role: assistant
                        content: The image shows a person posing in a studio setup
                          against a white backdrop, wearing a shiny, chrome-like metallic
                          outfit with spiky, futuristic elements (including headpiece/hair).
                          The face area is blurred/pixelated.
                      finish_reason: stop
                    usage:
                      completion_tokens: 49
                      prompt_tokens: 704
                      total_tokens: 753
                functions-response:
                  summary: Function Calling Response
                  description: Model returns a function call request.
                  value:
                    id: chatcmpl-ZjQIwmTgiAmyXrAeTCcoNXvvqiprq
                    created: 1773197541
                    model: mimo-v2.5
                    object: chat.completion
                    choices:
                    - index: 0
                      message:
                        role: assistant
                        content: I can't directly access or read files on your system.
                          If you'd like to share the content of report.txt, you can
                          copy and paste it here, and I'll help you analyze or work
                          with it.
                      finish_reason: stop
                    usage:
                      completion_tokens: 74
                      prompt_tokens: 13
                      total_tokens: 87
            text/event-stream:
              schema:
                type: string
                description: 'Streaming responses are returned in Server-Sent Events
                  format, each event is a JSON data block starting with ''data: ''
                  and ending with ''data: [DONE]''.'
              examples:
                streaming-response:
                  summary: Streaming Response Example
                  description: Shows events sent sequentially during streaming chat
                    process.
                  value: |
                    data: {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"mimo-v2.5","choices":[{"index":0,"delta":{"role":"assistant"},"finish_reason":null}]}
                    data: {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"mimo-v2.5","choices":[{"index":0,"delta":{"content":"Hello"},"finish_reason":null}]}
                    data: {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"mimo-v2.5","choices":[{"index":0,"delta":{"content":" there!"},"finish_reason":null}]}
                    data: {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"mimo-v2.5","choices":[{"index":0,"delta":{},"finish_reason":"stop"}]}
                    data: [DONE]
        '400':
          "$ref": "#/components/responses/ErrorResponse"
        '401':
          "$ref": "#/components/responses/ErrorResponse"
        '429':
          "$ref": "#/components/responses/ErrorResponse"
components:
  "$ref": "./_common.yaml#/components"
