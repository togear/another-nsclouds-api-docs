openapi: 3.1.0
info:
  title: NSCloud AI API Documentation
  description: API documentation for OpenAI-compatible and provider-compatible AI endpoints.
  version: 1.11.0
servers:
  - url: ${SERVER_URL}
    description: ${SERVER_DESCRIPTION}

tags:
  - name: chat_completions
    x-page-title: Chat Completions
    x-page-icon: message
    description: Chat completion related APIs.
  - name: embeddings
    x-page-title: Embeddings
    x-page-icon: database
    description: Embedding related APIs for generating vector representations of text
  - name: image_generations
    x-page-title: Image Generations
    x-page-icon: image
    description: Image generation related APIs for creating images from text prompts
  - name: image_edits
    x-page-title: Image Edits
    x-page-icon: edit
    description: Image editing related APIs for creating edited images from original images and prompts
  - name: audio_transcriptions
    x-page-title: Audio Transcriptions
    x-page-icon: microphone
    description: Audio transcription related APIs for transcribing audio files to text
  - name: video_generations
    x-page-title: Video Generations
    x-page-icon: video
    description: Video generation related APIs for creating, polling, downloading, listing, and cancelling video tasks

components:
  schemas:
    ChatMessageTextPart:
      type: object
      description: Text content part.
      properties:
        type:
          type: string
          description: Part type.
          enum:
            - text
        text:
          type: string
          description: Text content.
      required:
        - type
        - text

    ChatMessageImageUrl:
      type: object
      description: Image URL payload.
      properties:
        url:
          type: string
          description: Publicly accessible image URL or image data URL. Common image formats are supported; PNG may be used in examples.
        detail:
          type: string
          description: Optional image understanding detail level.
          enum:
            - auto
            - low
            - high
      required:
        - url

    ChatMessageImagePart:
      type: object
      description: Image input content part. Add multiple image_url parts to send multiple images.
      properties:
        type:
          type: string
          description: Part type.
          enum:
            - image_url
        image_url:
          $ref: '#/components/schemas/ChatMessageImageUrl'
      required:
        - type
        - image_url

    ChatMessageInputAudio:
      type: object
      description: Audio input payload.
      properties:
        data:
          type: string
          description: Base64-encoded audio data.
        format:
          type: string
          description: Audio format.
          enum:
            - wav
            - mp3
      required:
        - data
        - format

    ChatMessageInputAudioPart:
      type: object
      description: Audio input content part.
      properties:
        type:
          type: string
          description: Part type.
          enum:
            - input_audio
        input_audio:
          $ref: '#/components/schemas/ChatMessageInputAudio'
      required:
        - type
        - input_audio

    ChatMessageFileObject:
      type: object
      description: File payload passed in a Chat Completions content part. Chat file parts support inline file_data and keep OpenAI-compatible file_id; file_data is recommended today. They do not support file_url. Use Responses input_file.file_url for external file URLs.
      properties:
        file_id:
          type: string
          description: OpenAI-compatible field. Previously uploaded file ID from the Files API; this platform capability is under construction/adaptation, and actual availability depends on file hosting and model-side support.
        file_data:
          type: string
          description: Inline base64-encoded file content, recommended today.
        filename:
          type: string
          description: File name used together with inline file content.
      anyOf:
        - required:
            - file_id
        - required:
            - file_data
      additionalProperties: false

    ChatMessageFilePart:
      type: object
      description: File input content part for Chat Completions. Supports file_data and keeps file_id compatibility; external file URLs are not supported here. Use Responses input_file.file_url instead.
      properties:
        type:
          type: string
          description: Part type.
          enum:
            - file
        file:
          $ref: '#/components/schemas/ChatMessageFileObject'
      required:
        - type
        - file

    ChatToolFunction:
      type: object
      description: Function definition used by tool declarations.
      properties:
        name:
          type: string
          description: Function name.
        description:
          type: string
          description: Human-readable function description.
        parameters:
          type: object
          description: JSON Schema describing function arguments.
          additionalProperties: true
        strict:
          type: boolean
          description: Whether to enforce strict schema adherence.
      required:
        - name
      additionalProperties: true

    ChatCustomTool:
      type: object
      description: Custom tool definition used by tool declarations.
      properties:
        name:
          type: string
          description: Custom tool name.
        description:
          type: string
          description: Human-readable custom tool description.
        format:
          type: object
          description: Optional custom tool input format definition.
          additionalProperties: true
      required:
        - name
      additionalProperties: true

    ChatFunctionToolDefinition:
      type: object
      description: Function tool declaration for Chat Completions.
      properties:
        type:
          type: string
          description: Tool type.
          enum:
            - function
        function:
          $ref: '#/components/schemas/ChatToolFunction'
      required:
        - type
        - function
      additionalProperties: true

    ChatCustomToolDefinition:
      type: object
      description: Custom tool declaration for Chat Completions.
      properties:
        type:
          type: string
          description: Tool type.
          enum:
            - custom
        custom:
          $ref: '#/components/schemas/ChatCustomTool'
      required:
        - type
        - custom
      additionalProperties: true

    ChatToolDefinition:
      description: Tool declaration for Chat Completions.
      oneOf:
        - $ref: '#/components/schemas/ChatFunctionToolDefinition'
        - $ref: '#/components/schemas/ChatCustomToolDefinition'

    ChatNamedFunctionToolChoice:
      type: object
      description: Explicitly choose a named function tool.
      properties:
        type:
          type: string
          enum:
            - function
        function:
          type: object
          properties:
            name:
              type: string
              description: Function tool name.
          required:
            - name
          additionalProperties: true
      required:
        - type
        - function
      additionalProperties: true

    ChatNamedCustomToolChoice:
      type: object
      description: Explicitly choose a named custom tool.
      properties:
        type:
          type: string
          enum:
            - custom
        custom:
          type: object
          properties:
            name:
              type: string
              description: Custom tool name.
          required:
            - name
          additionalProperties: true
      required:
        - type
        - custom
      additionalProperties: true

    ChatAllowedToolsChoice:
      type: object
      description: Restrict tool choice to an allowed subset of tools.
      properties:
        type:
          type: string
          enum:
            - allowed_tools
        allowed_tools:
          type: object
          description: Allowed tool choice configuration.
          properties:
            mode:
              type: string
              description: Tool selection mode for the allowed subset.
            tools:
              type: array
              description: Allowed tool declarations.
              items:
                $ref: '#/components/schemas/ChatToolDefinition'
          required:
            - mode
            - tools
          additionalProperties: true
      required:
        - type
        - allowed_tools
      additionalProperties: true

    ChatToolChoice:
      description: Tool choice strategy.
      anyOf:
        - type: string
          description: Simple strategy such as none, auto, or required.
          enum:
            - none
            - auto
            - required
        - $ref: '#/components/schemas/ChatNamedFunctionToolChoice'
        - $ref: '#/components/schemas/ChatNamedCustomToolChoice'
        - $ref: '#/components/schemas/ChatAllowedToolsChoice'
        - type: object
          description: Provider-specific tool choice object.
          additionalProperties: true

    ChatResponseFormat:
      type: object
      description: Structured output format configuration.
      properties:
        type:
          type: string
          description: Response format type such as text, json_object, or json_schema.
        json_schema:
          type: object
          description: JSON Schema configuration when type=json_schema.
          additionalProperties: true
      additionalProperties: true

    ChatAudioRequestConfig:
      type: object
      description: Audio output request configuration.
      properties:
        voice:
          type: string
          description: Voice name for audio output.
        format:
          type: string
          description: Audio format.
      additionalProperties: true

    ChatAudioResponseMetadata:
      type: object
      description: Audio metadata returned with a chat message.
      properties:
        id:
          type: string
          description: Audio object identifier.
        expires_at:
          type: integer
          description: Expiration timestamp when provided.
        transcript:
          type: string
          description: Transcript associated with the audio output.
      additionalProperties: true

    ChatStreamOptions:
      type: object
      description: Streaming options for Chat Completions.
      properties:
        include_usage:
          type: boolean
          description: Include a final usage chunk in streamed responses.
        include_obfuscation:
          type: boolean
          description: Include obfuscation metadata when supported.
      additionalProperties: true

    ChatCompletionFunctionCall:
      type: object
      description: Deprecated function call structure returned by some models.
      properties:
        name:
          type: string
          description: Function name.
        arguments:
          type: string
          description: JSON string containing function arguments.
      additionalProperties: true

    ChatCompletionFunctionToolCall:
      type: object
      description: Function tool call emitted by the assistant.
      properties:
        id:
          type: string
          description: Tool call identifier.
        type:
          type: string
          description: Tool call type.
          enum:
            - function
        function:
          $ref: '#/components/schemas/ChatCompletionFunctionCall'
      required:
        - id
        - type
        - function
      additionalProperties: true

    ChatCompletionCustomToolCall:
      type: object
      description: Custom tool call emitted by the assistant.
      properties:
        id:
          type: string
          description: Tool call identifier.
        type:
          type: string
          description: Tool call type.
          enum:
            - custom
        custom:
          type: object
          description: Custom tool call payload.
          additionalProperties: true
      required:
        - id
        - type
        - custom
      additionalProperties: true

    ChatCompletionToolCall:
      description: Tool call emitted by the assistant.
      oneOf:
        - $ref: '#/components/schemas/ChatCompletionFunctionToolCall'
        - $ref: '#/components/schemas/ChatCompletionCustomToolCall'

    ChatCompletionAnnotation:
      type: object
      description: Annotation attached to a response message.
      additionalProperties: true

    ChatTextOnlyContent:
      description: Text-only chat message content.
      oneOf:
        - type: string
          description: Plain text content.
        - type: array
          description: Array of text content parts.
          items:
            $ref: '#/components/schemas/ChatMessageTextPart'

    ChatUserMessage:
      type: object
      description: User message. Supports text, image, audio, and file input parts.
      properties:
        role:
          type: string
          enum:
            - user
        name:
          type: string
          description: Optional participant name.
        content:
          description: User message content.
          oneOf:
            - type: string
              description: Plain text content.
            - type: array
              description: Array of structured multimodal content parts.
              items:
                oneOf:
                  - $ref: '#/components/schemas/ChatMessageTextPart'
                  - $ref: '#/components/schemas/ChatMessageImagePart'
                  - $ref: '#/components/schemas/ChatMessageInputAudioPart'
                  - $ref: '#/components/schemas/ChatMessageFilePart'
      required:
        - role
        - content
      additionalProperties: true

    ChatDeveloperMessage:
      type: object
      description: Developer message. Supports text-only content.
      properties:
        role:
          type: string
          enum:
            - developer
        name:
          type: string
          description: Optional participant name.
        content:
          $ref: '#/components/schemas/ChatTextOnlyContent'
      required:
        - role
        - content
      additionalProperties: true

    ChatSystemMessage:
      type: object
      description: System message. Supports text-only content.
      properties:
        role:
          type: string
          enum:
            - system
        name:
          type: string
          description: Optional participant name.
        content:
          $ref: '#/components/schemas/ChatTextOnlyContent'
      required:
        - role
        - content
      additionalProperties: true

    ChatAssistantMessage:
      type: object
      description: Assistant message, including optional tool calls.
      properties:
        role:
          type: string
          enum:
            - assistant
        name:
          type: string
          description: Optional participant name.
        content:
          description: Assistant message content.
          oneOf:
            - $ref: '#/components/schemas/ChatTextOnlyContent'
            - type: 'null'
              description: Null content, typically used when assistant emits tool calls.
        tool_calls:
          type: array
          description: Tool calls emitted by the assistant.
          items:
            $ref: '#/components/schemas/ChatCompletionToolCall'
        function_call:
          oneOf:
            - $ref: '#/components/schemas/ChatCompletionFunctionCall'
            - type: 'null'
          description: Deprecated single function call payload.
        refusal:
          type:
            - string
            - 'null'
          description: Refusal text when the model declines the request.
        audio:
          oneOf:
            - $ref: '#/components/schemas/ChatAudioResponseMetadata'
            - type: 'null'
          description: Audio payload metadata associated with the message.
      required:
        - role
      additionalProperties: true

    ChatToolMessage:
      type: object
      description: Tool result message. Supports text-only content and requires the related tool call ID.
      properties:
        role:
          type: string
          enum:
            - tool
        content:
          $ref: '#/components/schemas/ChatTextOnlyContent'
        tool_call_id:
          type: string
          description: Tool call identifier this message responds to.
      required:
        - role
        - content
        - tool_call_id
      additionalProperties: true

    ChatFunctionMessage:
      type: object
      description: Deprecated function result message. Use tool messages for new integrations.
      properties:
        role:
          type: string
          enum:
            - function
        name:
          type: string
          description: Function name.
        content:
          type:
            - string
            - 'null'
          description: Function result content.
      required:
        - role
        - name
        - content
      additionalProperties: true

    ChatMessage:
      description: Chat message object.
      oneOf:
        - $ref: '#/components/schemas/ChatDeveloperMessage'
        - $ref: '#/components/schemas/ChatSystemMessage'
        - $ref: '#/components/schemas/ChatUserMessage'
        - $ref: '#/components/schemas/ChatAssistantMessage'
        - $ref: '#/components/schemas/ChatToolMessage'
        - $ref: '#/components/schemas/ChatFunctionMessage'

    Usage:
      type: object
      description: Token usage summary.
      properties:
        prompt_tokens:
          type: integer
          description: Number of input tokens consumed.
        completion_tokens:
          type: integer
          description: Number of output tokens consumed.
        total_tokens:
          type: integer
          description: Total number of tokens consumed.
        input_tokens:
          type: integer
          description: Number of input tokens consumed for protocols that expose this field.
        output_tokens:
          type: integer
          description: Number of output tokens consumed for protocols that expose this field.
        completion_tokens_details:
          type: object
          description: Optional breakdown of completion token usage.
          properties:
            reasoning_tokens:
              type: integer
              description: Tokens consumed by reasoning or chain-of-thought style generation.
          additionalProperties: true
        input_tokens_details:
          type: object
          description: Optional breakdown of input token usage.
          properties:
            text_tokens:
              type: integer
              description: Input tokens attributed to text.
            image_tokens:
              type: integer
              description: Input tokens attributed to images.
          additionalProperties: true

    CreateChatCompletionRequest:
      type: object
      description: Chat Completions request body.
      properties:
        model:
          type: string
          description: Model ID to invoke.
        messages:
          type: array
          description: Ordered conversation history sent to the model.
          items:
            $ref: '#/components/schemas/ChatMessage'
        temperature:
          type: number
          description: Sampling temperature. Higher values make output more random.
          default: 1
        top_p:
          type: number
          description: Nucleus sampling parameter.
        presence_penalty:
          type: number
          description: Penalize tokens based on whether they have appeared.
        frequency_penalty:
          type: number
          description: Penalize tokens based on how frequently they have appeared.
        stop:
          description: Up to four stop sequences.
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        max_completion_tokens:
          type: integer
          description: Maximum number of output tokens the model may generate.
        n:
          type: integer
          description: Number of candidate completions to generate.
          default: 1
        seed:
          type: integer
          description: Best-effort deterministic sampling seed.
        reasoning_effort:
          type: string
          description: Reasoning effort level for supported reasoning models.
        response_format:
          $ref: '#/components/schemas/ChatResponseFormat'
        modalities:
          type: array
          description: Requested output modalities, such as text or audio.
          items:
            type: string
        audio:
          $ref: '#/components/schemas/ChatAudioRequestConfig'
        store:
          type: boolean
          description: Whether to store the response for later retrieval or distillation.
        metadata:
          type: object
          description: Developer-defined metadata associated with the request.
          additionalProperties: true
        service_tier:
          type: string
          description: Requested service tier when supported.
        user:
          type: string
          description: End-user identifier.
        tools:
          type: array
          description: Tool declarations available to the model.
          items:
            $ref: '#/components/schemas/ChatToolDefinition'
        tool_choice:
          $ref: '#/components/schemas/ChatToolChoice'
        parallel_tool_calls:
          type: boolean
          description: Whether the model may emit multiple tool calls in parallel.
        stream:
          type: boolean
          description: Whether to return the response as a stream.
          default: false
        stream_options:
          $ref: '#/components/schemas/ChatStreamOptions'
      required:
        - model
        - messages

    ChatCompletionResponseMessage:
      type: object
      description: A generated message in a chat completion.
      properties:
        role:
          type: string
          description: Role of the generated message, usually assistant.
        content:
          description: Generated message text. May be null in some tool-calling flows.
          type:
            - string
            - 'null'
        refusal:
          type:
            - string
            - 'null'
          description: Refusal text when the assistant declines to answer.
        annotations:
          type: array
          description: Optional annotations such as citations or URL references.
          items:
            $ref: '#/components/schemas/ChatCompletionAnnotation'
        tool_calls:
          type: array
          description: Tool calls emitted by the assistant.
          items:
            $ref: '#/components/schemas/ChatCompletionToolCall'
        function_call:
          oneOf:
            - $ref: '#/components/schemas/ChatCompletionFunctionCall'
            - type: 'null'
          description: Deprecated single function call payload.
        audio:
          oneOf:
            - $ref: '#/components/schemas/ChatAudioResponseMetadata'
            - type: 'null'
          description: Audio payload returned with the message.

    ChatCompletionChoice:
      type: object
      description: A single chat completion candidate.
      properties:
        index:
          type: integer
          description: Zero-based position of this choice in the returned list.
        message:
          $ref: '#/components/schemas/ChatCompletionResponseMessage'
        finish_reason:
          description: Reason generation stopped, such as stop, length, or tool_calls.
          type:
            - string
            - 'null'
        logprobs:
          type:
            - object
            - 'null'
          description: Optional token-level log probability details.
          additionalProperties: true

    ChatCompletionResponse:
      type: object
      description: Chat Completions success response.
      properties:
        id:
          type: string
          description: Unique response ID.
        object:
          type: string
          description: Object type, usually chat.completion.
        created:
          type: integer
          description: Unix timestamp in seconds when the response was created.
        model:
          type: string
          description: Model ID actually used for the request.
        service_tier:
          type: string
          description: Service tier used for the request when provided.
        system_fingerprint:
          type: string
          description: Backend configuration fingerprint when available.
        request_id:
          type: string
          description: Request identifier when exposed by the provider.
        choices:
          type: array
          description: Candidate outputs returned by the model.
          items:
            $ref: '#/components/schemas/ChatCompletionChoice'
        usage:
          $ref: '#/components/schemas/Usage'

    CreateCompletionRequest:
      type: object
      description: Text Completions request body.
      properties:
        model:
          type: string
          description: Model ID to invoke.
        prompt:
          description: Prompt used for text completion. Can be a single string or an array of strings.
          oneOf:
            - type: string
              description: Single prompt string.
            - type: array
              description: Multiple prompt strings.
              items:
                type: string
        temperature:
          type: number
          description: Sampling temperature. Higher values make output more random.
          default: 1
        max_tokens:
          type: integer
          description: Maximum number of output tokens.
        n:
          type: integer
          description: Number of completion candidates to return.
          default: 1
        stream:
          type: boolean
          description: Whether to return the response as a stream.
          default: false
      required:
        - model
        - prompt

    CompletionChoice:
      type: object
      description: A single text completion candidate.
      properties:
        text:
          type: string
          description: Generated text output.
        index:
          type: integer
          description: Zero-based position of this choice in the returned list.
        finish_reason:
          description: Reason generation stopped.
          type:
            - string
            - 'null'

    CompletionResponse:
      type: object
      description: Text Completions success response.
      properties:
        id:
          type: string
          description: Unique response ID.
        object:
          type: string
          description: Object type, usually text_completion.
        created:
          type: integer
          description: Unix timestamp in seconds when the response was created.
        model:
          type: string
          description: Model ID actually used for the request.
        choices:
          type: array
          description: Completion candidates returned by the model.
          items:
            $ref: '#/components/schemas/CompletionChoice'
        usage:
          $ref: '#/components/schemas/Usage'

    MessageContentPart:
      type: object
      description: Flexible content part used by Messages-compatible protocols.
      properties:
        type:
          type: string
          description: Part type, such as text, image, tool_use, or tool_result.
        text:
          type: string
          description: Text content when the part carries plain text.
        image_url:
          type: object
          description: OpenAI-style image URL payload.
          additionalProperties: true
        source:
          type: object
          description: Anthropic-style media source payload.
          additionalProperties: true
        id:
          type: string
          description: Identifier for the content block or tool call.
        name:
          type: string
          description: Name of the tool, function, or block.
        input:
          type: object
          description: Tool input payload or other structured arguments.
          additionalProperties: true
        content:
          description: Nested content carried by some protocols, often for tool_result blocks.
          oneOf:
            - type: string
              description: Plain text nested content.
            - type: array
              description: Nested structured content parts.
              items:
                type: object
                additionalProperties: true
      additionalProperties: true

    MessagesRequestMessage:
      type: object
      description: A single input message for Messages-compatible protocols.
      properties:
        role:
          type: string
          description: Message role. Different vendors may support different role names.
        content:
          description: Message content, either plain text or an array of vendor-specific content parts.
          oneOf:
            - type: string
              description: Plain text content.
            - type: array
              description: Structured content part array.
              items:
                $ref: '#/components/schemas/MessageContentPart'
      required:
        - role
        - content
      additionalProperties: true

    CreateMessagesRequest:
      type: object
      description: Messages protocol request body.
      properties:
        model:
          type: string
          description: Model ID to invoke.
        messages:
          type: array
          description: Input message list. Content parts are intentionally permissive to preserve vendor compatibility.
          items:
            $ref: '#/components/schemas/MessagesRequestMessage'
        max_tokens:
          type: integer
          description: Maximum number of output tokens.
        stream:
          type: boolean
          description: Whether to return the response as a stream.
          default: false
      required:
        - model
        - messages
      additionalProperties: true

    MessageResponse:
      type: object
      description: Messages protocol success response.
      properties:
        id:
          type: string
          description: Unique response ID.
        type:
          type: string
          description: Object type, usually message.
        role:
          type: string
          description: Role of the returned message, usually assistant.
        model:
          type: string
          description: Model ID actually used for the request.
        content:
          type: array
          description: Returned content parts. Vendors may include text, tool calls, citations, or reasoning blocks.
          items:
            $ref: '#/components/schemas/MessageContentPart'
        stop_reason:
          type: string
          description: Reason generation stopped.
        usage:
          $ref: '#/components/schemas/Usage'
      additionalProperties: true

    ResponseInputTextPart:
      type: object
      description: Text input content part for the Responses protocol.
      properties:
        type:
          type: string
          description: Input part type.
          enum:
            - input_text
        text:
          type: string
          description: Text input value.
      required:
        - type
        - text
      additionalProperties: true

    ResponseInputImagePart:
      type: object
      description: Image input content part for the Responses protocol. Supports image_url or OpenAI-compatible file_id; image_url is recommended today. Add multiple input_image parts to send multiple images.
      properties:
        type:
          type: string
          description: Input part type.
          enum:
            - input_image
        image_url:
          type: string
          description: Publicly accessible image URL or image data URL. Common image formats are supported; for example, data:image/png;base64,...
        file_id:
          type: string
          description: OpenAI-compatible field. Previously uploaded image file ID from the Files API; this platform capability is under construction/adaptation, and actual availability depends on file hosting and model-side support.
        detail:
          type: string
          description: Detail level for image understanding, when supported.
          default: auto
          enum:
            - auto
            - low
            - high
      required:
        - type
      anyOf:
        - required:
            - image_url
        - required:
            - file_id
      additionalProperties: true

    ResponseInputFilePart:
      type: object
      description: File input content part for the Responses protocol. Supports file_url, file_data, and OpenAI-compatible file_id; file_url or file_data is recommended today. Common document and text formats are supported; PDF is only one example.
      properties:
        type:
          type: string
          description: Input part type.
          enum:
            - input_file
        file_id:
          type: string
          description: OpenAI-compatible field. Previously uploaded file ID from the Files API; this platform capability is under construction/adaptation, and actual availability depends on file hosting and model-side support.
        file_url:
          type: string
          description: Publicly accessible file URL used by file input parts, recommended today. Common document and text formats are supported.
        filename:
          type: string
          description: File name used together with file_data for inline file uploads.
        file_data:
          type: string
          description: Data URL containing base64-encoded file content, recommended today; for example, data:application/pdf;base64,... or data:text/plain;base64,...
      required:
        - type
      anyOf:
        - required:
            - file_id
        - required:
            - file_url
        - required:
            - filename
            - file_data
      additionalProperties: true

    ResponseInputContentPart:
      description: Responses input content part. Supported input types are input_text, input_image, and input_file.
      oneOf:
        - $ref: '#/components/schemas/ResponseInputTextPart'
        - $ref: '#/components/schemas/ResponseInputImagePart'
        - $ref: '#/components/schemas/ResponseInputFilePart'

    ResponseContentPart:
      type: object
      description: Flexible output content part used inside Responses output items.
      properties:
        type:
          type: string
          description: Output part type, such as output_text or tool_result.
        text:
          type: string
          description: Text value carried by the part.
        annotations:
          type: array
          description: Optional annotations attached to the content part.
          items:
            type: object
            additionalProperties: true
      additionalProperties: true

    ResponseInputItem:
      type: object
      description: Structured input item for the Responses protocol.
      properties:
        type:
          type: string
          description: Input item type, such as message.
        role:
          type: string
          description: Role associated with the input item.
        content:
          description: Input content, either plain text or structured parts.
          oneOf:
            - type: string
              description: Plain text input.
            - type: array
              description: Structured content part array.
              items:
                $ref: '#/components/schemas/ResponseInputContentPart'
      additionalProperties: true

    CreateResponseRequest:
      type: object
      description: Responses protocol request body.
      properties:
        model:
          type: string
          description: Model ID to invoke.
        input:
          description: Input payload, either plain text or an array of structured items.
          oneOf:
            - type: string
              description: Plain text input.
            - type: array
              description: Structured input array.
              items:
                $ref: '#/components/schemas/ResponseInputItem'
        stream:
          type: boolean
          description: Whether to return the response as a stream.
          default: false
      required:
        - model
        - input
      additionalProperties: true

    ResponseOutputItem:
      type: object
      description: A single item in a Responses output array.
      properties:
        id:
          type: string
          description: Unique identifier for the output item.
        type:
          type: string
          description: Output item type, such as message or tool_call.
        role:
          type: string
          description: Role associated with the output item.
        status:
          type: string
          description: Processing status for the output item, when present.
        content:
          type: array
          description: Structured output content parts.
          items:
            $ref: '#/components/schemas/ResponseContentPart'
      additionalProperties: true

    ResponseObject:
      type: object
      description: Responses protocol success response.
      properties:
        id:
          type: string
          description: Unique response ID.
        object:
          type: string
          description: Object type, usually response.
        model:
          type: string
          description: Model ID actually used for the request.
        status:
          type: string
          description: Response processing status, such as completed, failed, or incomplete.
        created_at:
          type: integer
          description: Unix timestamp in seconds when the response was created.
        output_text:
          type: string
          description: Convenience text output aggregated from output content, when provided.
        output:
          type: array
          description: Generated output items. Vendors may include messages, tool calls, reasoning, or other structured records.
          items:
            $ref: '#/components/schemas/ResponseOutputItem'
        error:
          type:
            - object
            - 'null'
          description: Error information when response generation fails.
          additionalProperties: true
        incomplete_details:
          type:
            - object
            - 'null'
          description: Details explaining why a response is incomplete.
          additionalProperties: true
        usage:
          $ref: '#/components/schemas/Usage'
      additionalProperties: true

    CreateEmbeddingRequest:
      type: object
      description: Embeddings request body.
      properties:
        model:
          type: string
          description: Model ID to invoke.
        input:
          description: Text input to embed. Can be one string or multiple strings.
          oneOf:
            - type: string
              description: Single input string.
            - type: array
              description: Multiple input strings.
              items:
                type: string
        encoding_format:
          type: string
          description: Encoding format for the returned vectors.
          enum:
            - float
            - base64
          default: float
        dimensions:
          type: integer
          description: Requested output vector dimensions. Supported only by some models.
      required:
        - model
        - input

    EmbeddingDataItem:
      type: object
      description: A single embedding result.
      properties:
        object:
          type: string
          description: Object type, usually embedding.
        embedding:
          description: Vector value, returned either as a float array or a base64 string.
          oneOf:
            - type: array
              items:
                type: number
            - type: string
        index:
          type: integer
          description: Zero-based position of this result in the input list.

    EmbeddingResponse:
      type: object
      description: Embeddings success response.
      properties:
        object:
          type: string
          description: Object type, usually list.
        data:
          type: array
          description: Embedding result list.
          items:
            $ref: '#/components/schemas/EmbeddingDataItem'
        model:
          type: string
          description: Model ID actually used for the request.
        usage:
          $ref: '#/components/schemas/Usage'

    CreateImageGenerationRequest:
      type: object
      description: Image generation request body.
      properties:
        model:
          type: string
          description: Model ID to invoke.
        prompt:
          type: string
          description: Prompt used to generate the image.
        n:
          type: integer
          description: Number of images to generate.
          default: 1
        size:
          type: string
          description: Requested output image size.
          default: 1024x1024
        quality:
          type: string
          description: Requested image quality level.
          enum:
            - standard
            - hd
          default: standard
        response_format:
          type: string
          description: Format used to return the image payload.
          enum:
            - url
            - b64_json
          default: url
      required:
        - model
        - prompt

    CreateImageEditRequest:
      type: object
      description: Image editing request body.
      properties:
        model:
          type: string
          description: Model ID to invoke.
        image:
          type: array
          description: Input image file(s) to edit. Use the image parameter; when sending multiple files with raw multipart/curl, send repeated image[] parts.
          items:
            type: string
            format: binary
        mask:
          type: string
          format: binary
          description: Optional mask file describing editable regions.
        prompt:
          type: string
          description: Prompt used to guide image editing.
        n:
          type: integer
          description: Number of images to generate.
          default: 1
        size:
          type: string
          description: Requested output image size.
          default: 1024x1024
        response_format:
          type: string
          description: Format used to return the image payload.
          enum:
            - url
            - b64_json
          default: url
      required:
        - model
        - image
        - prompt

    ImageDataItem:
      type: object
      description: A single generated image result.
      properties:
        url:
          type: string
          description: Image URL when response_format=url.
        b64_json:
          type: string
          description: Base64-encoded image bytes when response_format=b64_json.
        revised_prompt:
          type: string
          description: Prompt actually used or revised by the model.

    ImageUsage:
      type: object
      description: Resource usage summary for image generation.
      properties:
        total_tokens:
          type: integer
          description: Total token count.
        input_tokens:
          type: integer
          description: Input token count.
        output_tokens:
          type: integer
          description: Output token count.
        input_tokens_details:
          type: object
          description: Optional breakdown of input token usage.
          properties:
            text_tokens:
              type: integer
              description: Input tokens attributed to text prompts.
            image_tokens:
              type: integer
              description: Input tokens attributed to images.
          additionalProperties: true

    ImageResponse:
      type: object
      description: Image generation or edit success response.
      properties:
        created:
          type: integer
          description: Unix timestamp in seconds when the response was created.
        data:
          type: array
          description: Generated image results.
          items:
            $ref: '#/components/schemas/ImageDataItem'
        background:
          type: string
          description: Background type used for the generated image.
        output_format:
          type: string
          description: Output image format, such as png.
        quality:
          type: string
          description: Effective image quality used by the model.
        size:
          type: string
          description: Final returned image size.
        usage:
          $ref: '#/components/schemas/ImageUsage'

    VideoMediaReference:
      type: object
      description: URL-based media reference used by Seedance video generation. Roles verified in acceptance include first_frame, last_frame, reference_image, reference_video, and reference_audio.
      properties:
        url:
          type: string
          description: Publicly accessible media URL.
        role:
          type: string
          description: Role of this media item in the generation request.
          enum:
            - first_frame
            - last_frame
            - reference_image
            - reference_video
            - reference_audio
      required:
        - url

    VideoContentPart:
      type: object
      description: Native Seedance content part used when composing text, image, video, or audio references directly.
      properties:
        type:
          type: string
          enum:
            - text
            - image_url
            - video_url
            - audio_url
        text:
          type: string
          description: Text content when type=text.
        image_url:
          type: object
          properties:
            url:
              type: string
          required:
            - url
        video_url:
          type: object
          properties:
            url:
              type: string
          required:
            - url
        audio_url:
          type: object
          properties:
            url:
              type: string
          required:
            - url
        role:
          type: string
          description: Media role, such as first_frame, last_frame, reference_image, reference_video, or reference_audio.
      required:
        - type
      additionalProperties: true

    CreateVideoRequest:
      type: object
      description: Video generation request body.
      properties:
        model:
          type: string
          description: Model ID to invoke.
        prompt:
          type: string
          description: Prompt used to generate the video.
        duration:
          type: integer
          description: Requested duration in seconds. Seedance acceptance covers values from 4 to 11 seconds; model metadata currently allows 4 to 15 seconds.
        seconds:
          type: string
          description: OpenAI-compatible duration alias. The gateway maps this to duration.
        size:
          type: string
          description: OpenAI-compatible size alias. The gateway maps known sizes such as 2560x1080 to ratio and resolution.
        ratio:
          type: string
          description: Requested aspect ratio.
          enum:
            - "21:9"
            - "16:9"
            - "4:3"
            - "1:1"
            - "3:4"
            - "9:16"
            - adaptive
        resolution:
          type: string
          description: Requested output resolution.
          enum:
            - 480p
            - 720p
            - 1080p
        image:
          description: Image reference or references for image-to-video, first/last-frame, and reference-image workflows.
          oneOf:
            - $ref: '#/components/schemas/VideoMediaReference'
            - type: array
              items:
                $ref: '#/components/schemas/VideoMediaReference'
        video:
          description: Video reference or references for video edit, extension, remix, and reference-video workflows.
          oneOf:
            - $ref: '#/components/schemas/VideoMediaReference'
            - type: array
              items:
                $ref: '#/components/schemas/VideoMediaReference'
        audio:
          description: Audio reference or references for reference-audio workflows.
          oneOf:
            - $ref: '#/components/schemas/VideoMediaReference'
            - type: array
              items:
                $ref: '#/components/schemas/VideoMediaReference'
        content:
          type: array
          description: Native Seedance multimodal content list.
          items:
            $ref: '#/components/schemas/VideoContentPart'
        generate_audio:
          type: boolean
          description: Whether to generate audio with the video.
        watermark:
          type: boolean
          description: Whether to include watermarking when supported.
        return_last_frame:
          type: boolean
          description: Whether to include the generated last-frame image in the provider response.
        tools:
          type: array
          description: Tool declarations. Seedance acceptance verifies web_search through {"type":"web_search"}.
          items:
            type: object
            additionalProperties: true
        service_tier:
          type: string
          description: Provider service tier, such as flex when supported.
        callback_url:
          type: string
          description: Optional callback URL forwarded to the provider.
        execution_expires_after:
          type: integer
          description: Task execution expiry in seconds when supported.
        seed:
          type: integer
          description: Best-effort generation seed when supported.
        camera_fixed:
          type: boolean
          description: Whether the camera should remain fixed when supported.
        priority:
          type: integer
          description: Provider task priority when supported.
        extra_headers:
          type: object
          description: Additional gateway request headers.
          additionalProperties: true
        extra_body:
          type: object
          description: Additional provider request body. Acceptance covers content, source_video_url, and provider passthrough fields through extra_body.
          additionalProperties: true
      required:
        - model
        - prompt

    VideoTaskUsage:
      type: object
      description: Video task usage summary.
      properties:
        duration_seconds:
          type: number
          description: Video duration in seconds.
        video_resolution:
          type: string
          description: Effective video resolution.
        tool_usage:
          type: object
          description: Optional tool usage counters, such as web_search.
          additionalProperties: true
      additionalProperties: true

    VideoTask:
      type: object
      description: Video task object.
      properties:
        id:
          type: string
          description: Gateway-managed video task ID.
        object:
          type: string
          enum:
            - video
        status:
          type: string
          description: Task status.
          enum:
            - queued
            - in_progress
            - completed
            - failed
            - cancelled
            - expired
        created_at:
          type: integer
          description: Creation timestamp in seconds.
        completed_at:
          type: integer
          description: Completion timestamp in seconds for terminal tasks.
        model:
          type: string
          description: Model ID used by the task.
        seconds:
          type: string
          description: Effective video duration in seconds.
        size:
          type: string
          description: Effective video size when available.
        usage:
          $ref: '#/components/schemas/VideoTaskUsage'
        error:
          type: object
          description: Error payload for failed or expired tasks.
          additionalProperties: true
      required:
        - id
        - object
        - status

    VideoListResponse:
      type: object
      description: Video task list response.
      properties:
        object:
          type: string
          enum:
            - list
        data:
          type: array
          items:
            $ref: '#/components/schemas/VideoTask'
        has_more:
          type: boolean
          description: Whether another page is available.

    CreateVideoRemixRequest:
      type: object
      description: Create a new video by remixing an existing task.
      properties:
        prompt:
          type: string
        extra_body:
          type: object
          additionalProperties: true
      required:
        - prompt

    VideoTaskIdReference:
      type: object
      description: Existing gateway video task reference.
      properties:
        id:
          type: string
          description: Existing video task ID.
      required:
        - id

    CreateVideoEditRequest:
      type: object
      description: Create an edit task from an existing video.
      properties:
        prompt:
          type: string
        video:
          $ref: '#/components/schemas/VideoTaskIdReference'
        extra_body:
          type: object
          description: Additional edit inputs, such as image references, source_video_url, duration, ratio, generate_audio, and watermark.
          additionalProperties: true
      required:
        - prompt
        - video

    CreateVideoExtensionRequest:
      type: object
      description: Create an extension task from an existing video.
      properties:
        prompt:
          type: string
        seconds:
          type: string
          description: Number of seconds to extend.
        video:
          $ref: '#/components/schemas/VideoTaskIdReference'
        extra_body:
          type: object
          description: Additional extension inputs, such as source_video_url, ratio, generate_audio, and watermark.
          additionalProperties: true
      required:
        - prompt
        - seconds
        - video

    CreateTranscriptionRequest:
      type: object
      description: Audio transcription request body.
      properties:
        model:
          type: string
          description: Model ID to invoke.
        file:
          type: string
          format: binary
          description: Audio file to transcribe.
        language:
          type: string
          description: Optional language code for the audio.
        prompt:
          type: string
          description: Optional prompt to bias style, formatting, or terminology.
        response_format:
          type: string
          description: Response format for the transcription result.
          enum:
            - json
            - text
            - srt
            - verbose_json
            - vtt
          default: json
        temperature:
          type: number
          description: Sampling temperature.
          default: 0
        timestamp_granularities:
          type: array
          description: Timestamp granularities to include when response_format is verbose_json.
          items:
            type: string
            enum:
              - word
              - segment
      required:
        - model
        - file

    TranscriptionResponse:
      type: object
      description: JSON transcription response.
      properties:
        text:
          type: string
          description: Transcribed text content.

    ErrorDetail:
      type: object
      description: Error detail object.
      properties:
        message:
          type: string
          description: Human-readable error message.
        type:
          type: string
          description: Error type.
        param:
          description: Parameter associated with the error, if any.
          type:
            - string
            - 'null'
        code:
          description: Machine-readable error code, if any.
          type:
            - string
            - 'null'

    ErrorResponse:
      type: object
      description: Error response payload.
      properties:
        error:
          $ref: '#/components/schemas/ErrorDetail'

  securitySchemes:
    APIKeyHeader:
      type: http
      scheme: bearer
      description: "Authenticate using Bearer token format: 'Bearer YOUR_SECRET_TOKEN'"

  responses:
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
