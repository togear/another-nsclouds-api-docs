openapi: 3.1.0
info:
  $ref: ./_common.yaml#/info
servers:
  $ref: ./_common.yaml#/servers

tags:
  # Reference top-level feature tags from common file (to maintain navigation hierarchy)
  - $ref: ./_common.yaml#/tags/0   # chat_completions
  - $ref: ./_common.yaml#/tags/1   # embeddings
  - $ref: ./_common.yaml#/tags/2   # image_generations
  - $ref: ./_common.yaml#/tags/3   # image_edits
  - $ref: ./_common.yaml#/tags/4   # audio_transcriptions

  # ========== OpenAI vendor tags ==========
  - name: chat_completions_openai
    x-parent: chat_completions
    x-page-title: OpenAI
    x-page-icon: brain
    description: OpenAI's chat completion API
  - name: embeddings_openai
    x-parent: embeddings
    x-page-title: OpenAI
    x-page-icon: brain
    description: OpenAI's vector embedding API
  - name: image_generations_openai
    x-parent: image_generations
    x-page-title: OpenAI
    x-page-icon: brain
    description: OpenAI's image generation API
  - name: image_edits_openai
    x-parent: image_edits
    x-page-title: OpenAI
    x-page-icon: brain
    description: OpenAI's image editing API
  - name: audio_transcriptions_openai
    x-parent: audio_transcriptions
    x-page-title: OpenAI
    x-page-icon: brain
    description: OpenAI's audio transcription API

paths:
  # ========== Chat Completions ==========
  /v1/chat/completions:
    post:
      tags:
        - chat_completions_openai
      summary: Create chat completion
      description: Generate model response based on input messages. Fully compatible with OpenAI's Chat API.
      operationId: createChatCompletion_openai
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChatCompletionRequest'
            examples:
              default:
                summary: Basic
                description: A simple conversation example with system prompt and user message.
                value:
                  model: gpt-4
                  messages:
                    - role: system
                      content: You are a helpful assistant.
                    - role: user
                      content: Hello!
                  temperature: 1
                  max_completion_tokens: 50
                  'n': 1
                  stream: false
              streaming:
                summary: Streaming
                description: "Enable streaming response by setting stream: true."
                value:
                  model: gpt-4
                  messages:
                    - role: system
                      content: You are a helpful assistant.
                    - role: user
                      content: Tell me a story.
                  temperature: 0.7
                  max_completion_tokens: 100
                  stream: true
              image_input:
                summary: Image Input (Multimodal)
                description: Use vision-enabled model to analyze images.
                value:
                  model: gpt-4-vision-preview
                  messages:
                    - role: user
                      content:
                        - type: text
                          text: What's in this image?
                        - type: image_url
                          image_url:
                            url: https://example.com/cat.jpg
                  max_completion_tokens: 300
              functions:
                summary: Function Calling
                description: Define tools (functions) and let the model decide whether to call them.
                value:
                  model: gpt-4
                  messages:
                    - role: user
                      content: What's the weather in Boston?
                  tools:
                    - type: function
                      function:
                        name: get_current_weather
                        description: Get the current weather in a given location
                        parameters:
                          type: object
                          properties:
                            location:
                              type: string
                              description: The city and state, e.g. San Francisco, CA
                            unit:
                              type: string
                              enum:
                                - celsius
                                - fahrenheit
                          required:
                            - location
                  tool_choice: auto
                  max_completion_tokens: 150
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionResponse'
              examples:
                default-response:
                  summary: Basic Response
                  description: Response example corresponding to basic chat request.
                  value:
                    id: chatcmpl-123
                    object: chat.completion
                    created: 1677652288
                    model: gpt-4
                    choices:
                      - index: 0
                        message:
                          role: assistant
                          content: Hello there! How can I assist you today?
                        finish_reason: stop
                    usage:
                      prompt_tokens: 9
                      completion_tokens: 12
                      total_tokens: 21
                image_input-response:
                  summary: Image Input Response
                  description: Model's description generated based on image content.
                  value:
                    id: chatcmpl-789
                    object: chat.completion
                    created: 1677652300
                    model: gpt-4-vision-preview
                    choices:
                      - index: 0
                        message:
                          role: assistant
                          content: The image shows a cute cat sitting on a windowsill, looking outside.
                        finish_reason: stop
                    usage:
                      prompt_tokens: 123
                      completion_tokens: 15
                      total_tokens: 138
                functions-response:
                  summary: Function Call Response
                  description: Model returns a function call request.
                  value:
                    id: chatcmpl-abc
                    object: chat.completion
                    created: 1677652310
                    model: gpt-4
                    choices:
                      - index: 0
                        message:
                          role: assistant
                          content: null
                          tool_calls:
                            - id: call_123
                              type: function
                              function:
                                name: get_current_weather
                                arguments: '{"location": "Boston, MA", "unit": "fahrenheit"}'
                        finish_reason: tool_calls
                    usage:
                      prompt_tokens: 50
                      completion_tokens: 20
                      total_tokens: 70
            text/event-stream:
              schema:
                type: string
                description: "Streaming response is returned in Server-Sent Events format, each event is a line of JSON data block starting with 'data: ', ending with 'data: [DONE]'."
              examples:
                streaming-response:
                  summary: Streaming Response Example
                  description: Shows events sent continuously during streaming chat process.
                  value: |
                    data: {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"gpt-4","choices":[{"index":0,"delta":{"role":"assistant"},"finish_reason":null}]}
                    data: {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"gpt-4","choices":[{"index":0,"delta":{"content":"Hello"},"finish_reason":null}]}
                    data: {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"gpt-4","choices":[{"index":0,"delta":{"content":" there!"},"finish_reason":null}]}
                    data: {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"gpt-4","choices":[{"index":0,"delta":{},"finish_reason":"stop"}]}
                    data: [DONE]
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'

  /v1/completions:
    post:
      tags:
        - chat_completions_openai
      summary: Create text completion
      description: Generate one or more completions based on the provided prompt. Compatible with OpenAI's Completions API.
      operationId: createCompletion_openai
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCompletionRequest'
            examples:
              default:
                summary: Basic
                description: A simple text completion example.
                value:
                  model: gpt-3.5-turbo-instruct
                  prompt: Once upon a time
                  max_tokens: 50
                  temperature: 0.7
                  'n': 1
                  stream: false
              streaming:
                summary: Streaming
                description: "Enable streaming response by setting stream: true."
                value:
                  model: gpt-3.5-turbo-instruct
                  prompt: The future of AI is
                  max_tokens: 30
                  temperature: 0.8
                  stream: true
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompletionResponse'
              examples:
                default-response:
                  summary: Basic Response
                  description: Response example corresponding to basic text completion request.
                  value:
                    id: cmpl-123
                    object: text_completion
                    created: 1677652288
                    model: gpt-3.5-turbo-instruct
                    choices:
                      - text: ' in a small village, there lived a young girl named Lily.'
                        index: 0
                        finish_reason: length
                    usage:
                      prompt_tokens: 4
                      completion_tokens: 12
                      total_tokens: 16
            text/event-stream:
              schema:
                type: string
                description: "Streaming response is returned in Server-Sent Events format, each event is a line of JSON data block starting with 'data: ', ending with 'data: [DONE]'."
              examples:
                streaming-response:
                  summary: Streaming Response Example
                  description: Shows events sent continuously during streaming text completion process.
                  value: |
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"gpt-3.5-turbo-instruct","choices":[{"text":"The","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"gpt-3.5-turbo-instruct","choices":[{"text":" future","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"gpt-3.5-turbo-instruct","choices":[{"text":" of","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"gpt-3.5-turbo-instruct","choices":[{"text":" AI","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"gpt-3.5-turbo-instruct","choices":[{"text":" is","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"gpt-3.5-turbo-instruct","choices":[{"text":" bright","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"gpt-3.5-turbo-instruct","choices":[{"text":".","index":0,"finish_reason":"length"}]}
                    data: [DONE]
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'

  # ========== Embeddings ==========
  /v1/embeddings:
    post:
      tags:
        - embeddings_openai
      summary: Create embedding vectors
      description: Get vector representation of given input. Compatible with OpenAI's Embeddings API.
      operationId: createEmbedding_openai
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEmbeddingRequest'
            examples:
              default:
                summary: Basic
                description: Generate embedding vector for a single string input.
                value:
                  model: text-embedding-ada-002
                  input: The quick brown fox jumps over the lazy dog
              multiple-inputs:
                summary: Multiple Inputs
                description: Generate embedding vectors for multiple string inputs.
                value:
                  model: text-embedding-ada-002
                  input:
                    - Hello world
                    - OpenAI is amazing
              base64-format:
                summary: Base64 Format
                description: Return embedding vectors in base64 encoding.
                value:
                  model: text-embedding-3-small
                  input: Example text
                  encoding_format: base64
              with-dimensions:
                summary: Specify Dimensions
                description: Specify output dimensions.
                value:
                  model: text-embedding-3-small
                  input: Example text
                  dimensions: 256
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmbeddingResponse'
              examples:
                default-response:
                  summary: Basic Response
                  description: Basic response corresponding to single input.
                  value:
                    object: list
                    data:
                      - object: embedding
                        embedding:
                          - -0.006929283495992422
                          - -0.005336422007530928
                          - -0.024047505110502243
                        index: 0
                    model: text-embedding-ada-002
                    usage:
                      prompt_tokens: 8
                      total_tokens: 8
                multiple-inputs-response:
                  summary: Multiple Inputs Response
                  description: Response corresponding to multiple inputs, containing multiple embedding vectors.
                  value:
                    object: list
                    data:
                      - object: embedding
                        embedding:
                          - 0.1
                          - 0.2
                          - 0.3
                        index: 0
                      - object: embedding
                        embedding:
                          - 0.4
                          - 0.5
                          - 0.6
                        index: 1
                    model: text-embedding-ada-002
                    usage:
                      prompt_tokens: 6
                      total_tokens: 6
                base64-response:
                  summary: Base64 Response
                  description: Embedding vectors returned in base64 encoding.
                  value:
                    object: list
                    data:
                      - object: embedding
                        embedding: "YmFzZTY0X2VuY29kZWRfZGF0YQ=="
                        index: 0
                    model: text-embedding-3-small
                    usage:
                      prompt_tokens: 2
                      total_tokens: 2
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'

  # ========== Image Generation ==========
  /v1/images/generations:
    post:
      tags:
        - image_generations_openai
      summary: Create image
      description: Generate image based on text prompt. Compatible with OpenAI's Images API.
      operationId: createImageGeneration_openai
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateImageGenerationRequest'
            examples:
              default:
                summary: Basic
                description: Generate a 1024x1024 image.
                value:
                  model: dall-e-3
                  prompt: A cute cat sitting on a windowsill
                  'n': 1
                  size: 1024x1024
              hd-quality:
                summary: HD Quality
                description: Generate high-definition quality image.
                value:
                  model: dall-e-3
                  prompt: A futuristic cityscape at sunset
                  'n': 1
                  quality: hd
                  size: 1792x1024
              b64-json:
                summary: Base64 Format
                description: Return base64-encoded image data.
                value:
                  model: dall-e-2
                  prompt: A beautiful landscape
                  'n': 2
                  size: 512x512
                  response_format: b64_json
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponse'
              examples:
                default-response:
                  summary: Basic Response
                  description: Complete response including image URL and optional fields.
                  value:
                    created: 1680000000
                    background: opaque
                    output_format: png
                    quality: high
                    size: 1024x1024
                    data:
                      - url: https://example.com/images/cat.png
                        revised_prompt: A cute cat sitting on a windowsill, looking out at a garden
                    usage:
                      total_tokens: 100
                      input_tokens: 50
                      output_tokens: 50
                      input_tokens_details:
                        text_tokens: 10
                        image_tokens: 40
                b64-response:
                  summary: Base64 Response
                  description: Response containing base64-encoded image data and optional fields.
                  value:
                    created: 1680000001
                    background: opaque
                    output_format: png
                    quality: high
                    size: 1024x1024
                    data:
                      - b64_json: iVBORw0KGgoAAAANSUhEUgAA...
                        revised_prompt: A beautiful landscape with mountains and a lake
                      - b64_json: iVBORw0KGgoAAAANSUhEUgAA...
                    usage:
                      total_tokens: 200
                      input_tokens: 100
                      output_tokens: 100
                      input_tokens_details:
                        text_tokens: 20
                        image_tokens: 80
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'

  # ========== Image Editing ==========
  /v1/images/edits:
    post:
      tags:
        - image_edits_openai
      summary: Edit image
      description: Create edited image based on original image and text prompt. Compatible with OpenAI's Images API.
      operationId: createImageEdit_openai
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateImageEditRequest'
            encoding:
              image:
                style: form
                explode: true
            examples:
              with-mask:
                summary: With Mask
                description: Edit using image, mask, and prompt.
                value:
                  model: dall-e-2
                  image:
                    - '@person.png'
                  mask: '@mask.png'
                  prompt: Add a hat to the person
                  'n': 1
                  size: 1024x1024
              no-mask:
                summary: Without Mask
                description: Edit using only image and prompt.
                value:
                  model: dall-e-2
                  image:
                    - '@body-lotion.png'
                  prompt: Change the background to a beach
                  'n': 1
                  size: 1024x1024
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponse'
              examples:
                default-response:
                  summary: Edit Response
                  description: Return edited image and related metadata.
                  value:
                    created: 1680000002
                    background: opaque
                    output_format: png
                    quality: high
                    size: 1024x1024
                    data:
                      - url: https://example.com/images/edited.png
                        revised_prompt: A person with a hat, standing in a sunny park
                    usage:
                      total_tokens: 120
                      input_tokens: 60
                      output_tokens: 60
                      input_tokens_details:
                        text_tokens: 12
                        image_tokens: 48
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'

  # ========== Audio Transcription ==========
  /v1/audio/transcriptions:
    post:
      tags:
        - audio_transcriptions_openai
      summary: Audio transcription
      description: Transcribe audio file to text. Compatible with OpenAI's Audio API.
      operationId: createTranscription_openai
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateTranscriptionRequest'
            examples:
              default:
                summary: Basic
                description: Transcribe audio file to JSON format.
                value:
                  model: whisper-1
                  file: (binary)
                  response_format: json
              with-timestamps:
                summary: With Timestamps
                description: Get detailed transcription with word-level timestamps.
                value:
                  model: whisper-1
                  file: (binary)
                  response_format: verbose_json
                  timestamp_granularities:
                    - word
              srt-format:
                summary: SRT Subtitles
                description: Return transcription in SRT subtitle format.
                value:
                  model: whisper-1
                  file: (binary)
                  response_format: srt
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranscriptionResponse'
              examples:
                json-response:
                  summary: JSON Response
                  description: Default JSON format transcription.
                  value:
                    text: Hello, this is a test transcription.
                verbose-json-response:
                  summary: Verbose JSON Response
                  description: Detailed transcription with word-level timestamps.
                  value:
                    task: transcribe
                    language: english
                    duration: 2.95
                    text: Hello, this is a test transcription.
                    words:
                      - word: Hello
                        start: 0.1
                        end: 0.5
                      - word: this
                        start: 0.6
                        end: 0.8
                      - word: is
                        start: 0.9
                        end: 1
                      - word: a
                        start: 1.1
                        end: 1.2
                      - word: test
                        start: 1.3
                        end: 1.8
                      - word: transcription
                        start: 1.9
                        end: 2.8
            application/x-srt:
              schema:
                type: string
                description: Transcription in SRT subtitle format.
              examples:
                srt-response:
                  summary: SRT Response
                  value: |
                    1
                    00:00:00,100 --> 00:00:00,500
                    Hello

                    2
                    00:00:00,600 --> 00:00:00,800
                    this

                    3
                    00:00:00,900 --> 00:00:01,000
                    is

                    4
                    00:00:01,100 --> 00:00:01,200
                    a

                    5
                    00:00:01,300 --> 00:00:01,800
                    test

                    6
                    00:00:01,900 --> 00:00:02,800
                    transcription
            text/plain:
              schema:
                type: string
                description: Transcription in plain text format.
              examples:
                text-response:
                  summary: Plain Text Response
                  value: Hello, this is a test transcription.
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'

components:
  $ref: ./_common.yaml#/components
