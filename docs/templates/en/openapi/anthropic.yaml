openapi: 3.1.0
info:
  $ref: ./_common.yaml#/info
servers:
  $ref: ./_common.yaml#/servers

tags:
  # Reference top-level function tags from common file (to maintain navigation hierarchy)
  - $ref: ./_common.yaml#/tags/0   # chat_completions
  - $ref: ./_common.yaml#/tags/1   # embeddings
  - $ref: ./_common.yaml#/tags/2   # image_generations
  - $ref: ./_common.yaml#/tags/3   # image_edits
  - $ref: ./_common.yaml#/tags/4   # audio_transcriptions

  # ========== Anthropic vendor tags ==========
  - name: chat_completions_anthropic
    x-parent: chat_completions
    x-page-title: Anthropic
    x-page-icon: brain
    description: Anthropic's chat completion API
  - name: embeddings_anthropic
    x-parent: embeddings
    x-page-title: Anthropic
    x-page-icon: brain
    description: Anthropic's vector embedding API
  - name: image_generations_anthropic
    x-parent: image_generations
    x-page-title: Anthropic
    x-page-icon: brain
    description: Anthropic's image generation API
  - name: image_edits_anthropic
    x-parent: image_edits
    x-page-title: Anthropic
    x-page-icon: brain
    description: Anthropic's image editing API
  - name: audio_transcriptions_anthropic
    x-parent: audio_transcriptions
    x-page-title: Anthropic
    x-page-icon: brain
    description: Anthropic's audio transcription API

paths:
  # ========== Chat Completion ==========
  /v1/chat/completions:
    post:
      tags:
        - chat_completions_anthropic
      summary: Create Chat Completion
      description: Generate model responses based on input messages. Fully compatible with OpenAI's Chat API.
      operationId: createChatCompletion_anthropic
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChatCompletionRequest'
            examples:
              default:
                summary: Basic
                description: A simple conversation example with system prompt and user message.
                value:
                  model: claude-opus-4.6
                  messages:
                    - role: system
                      content: You are a helpful assistant.
                    - role: user
                      content: Hello!
                  temperature: 1
                  max_completion_tokens: 50
                  'n': 1
                  stream: false
              streaming:
                summary: Streaming
                description: Enable streaming response by setting stream True.
                value:
                  model: claude-opus-4.6
                  messages:
                    - role: system
                      content: You are a helpful assistant.
                    - role: user
                      content: Tell me a story.
                  temperature: 0.7
                  max_completion_tokens: 100
                  stream: true
              image_input:
                summary: Image Input (Multimodal)
                description: Use vision-enabled models to analyze images.
                value:
                  model: claude-opus-4.6
                  messages:
                    - role: user
                      content:
                        - type: text
                          text: What's in this image?
                        - type: image_url
                          image_url:
                            url: https://example.com/cat.jpg
                  max_completion_tokens: 300
              functions:
                summary: Function Calling
                description: Define tools (functions) and let the model decide whether to call them.
                value:
                  model: claude-opus-4.6
                  messages:
                    - role: user
                      content: What's the weather in Boston?
                  tools:
                    - type: function
                      function:
                        name: get_current_weather
                        description: Get the current weather in a given location
                        parameters:
                          type: object
                          properties:
                            location:
                              type: string
                              description: The city and state, e.g. San Francisco, CA
                            unit:
                              type: string
                              enum:
                                - celsius
                                - fahrenheit
                          required:
                            - location
                  tool_choice: auto
                  max_completion_tokens: 150
      responses:
        '200':
          description: Success Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionResponse'
              examples:
                default-response:
                  summary: Basic Response
                  description: Response example for basic chat request.
                  value:
                    id: chatcmpl-02VKOdtBIb7RkHb97f0WePbsjjQkB
                    object: chat.completion
                    created: 1773222937
                    model: claude-opus-4-6
                    choices:
                      - index: 0
                        message:
                          role: assistant
                          content: Hello! How are you doing today? Is there something I can help you with? 😊
                        finish_reason: stop
                    usage:
                      completion_tokens: 23
                      prompt_tokens: 9
                      total_tokens: 32
                image_input-response:
                  summary: Image Input Response
                  description: Description generated by the model based on image content.
                  value:
                    id: chatcmpl-789
                    object: chat.completion
                    created: 1677652300
                    model: claude-opus-4.6
                    choices:
                      - index: 0
                        message:
                          role: assistant
                          content: The image shows a cute cat sitting on a windowsill, looking outside.
                        finish_reason: stop
                    usage:
                      prompt_tokens: 123
                      completion_tokens: 15
                      total_tokens: 138
                functions-response:
                  summary: Function Calling Response
                  description: Model returns a function call request.
                  value:
                    id: chatcmpl-abc
                    object: chat.completion
                    created: 1677652310
                    model: claude-opus-4.6
                    choices:
                      - index: 0
                        message:
                          role: assistant
                          content: null
                          tool_calls:
                            - id: call_123
                              type: function
                              function:
                                name: get_current_weather
                                arguments: '{"location": "Boston, MA", "unit": "fahrenheit"}'
                        finish_reason: tool_calls
                    usage:
                      prompt_tokens: 50
                      completion_tokens: 20
                      total_tokens: 70
            text/event-stream:
              schema:
                type: string
                description: "Streaming responses are returned in Server-Sent Events format, each event is a JSON data block starting with 'data: ' and ending with 'data: [DONE]'."
              examples:
                streaming-response:
                  summary: Streaming Response Example
                  description: Shows events sent sequentially during streaming chat.
                  value: |
                    data: {"id":"chatcmpl-WWcxVVS3hexiKVbk3QCGSMV5wToGL","created":1773222960,"model":"claude-opus-4-6","object":"chat.completion.chunk","choices":[{"index":0,"delta":{"content":"Hello! How are","role":"assistant"}}]}
                    data: {"id":"chatcmpl-WWcxVVS3hexiKVbk3QCGSMV5wToGL","created":1773222960,"model":"claude-opus-4-6","object":"chat.completion.chunk","choices":[{"index":0,"delta":{"content":" you doing today? Is there anything I"}}]}
                    data: {"id":"chatcmpl-WWcxVVS3hexiKVbk3QCGSMV5wToGL","created":1773222960,"model":"claude-opus-4-6","object":"chat.completion.chunk","choices":[{"index":0,"delta":{"content":" can help you with?"}}]}
                    data: {"id":"chatcmpl-WWcxVVS3hexiKVbk3QCGSMV5wToGL","created":1773222960,"model":"claude-opus-4-6","object":"chat.completion.chunk","choices":[{"index":0,"delta":{"content":" "}}]}
                    data: {"id":"chatcmpl-WWcxVVS3hexiKVbk3QCGSMV5wToGL","created":1773222960,"model":"claude-opus-4-6","object":"chat.completion.chunk","choices":[{"index":0,"delta":{"content":"😊"}}]}
                    data: {"id":"chatcmpl-WWcxVVS3hexiKVbk3QCGSMV5wToGL","created":1773222960,"model":"claude-opus-4-6","object":"chat.completion.chunk","choices":[{"finish_reason":"stop","index":0,"delta":{}}]}
                    data: [DONE]
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'

  /v1/completions:
    post:
      tags:
        - chat_completions_anthropic
      summary: Create Text Completion
      description: Generate one or more completion results based on the provided prompt. Compatible with OpenAI's Completions API.
      operationId: createCompletion_anthropic
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCompletionRequest'
            examples:
              default:
                summary: Basic
                description: A simple text completion example.
                value:
                  model: claude-opus-4.6
                  prompt: Once upon a time
                  max_tokens: 50
                  temperature: 0.7
                  'n': 1
                  stream: false
              streaming:
                summary: Streaming
                description: "Enable streaming response by setting stream: true."
                value:
                  model: claude-opus-4.6
                  prompt: The future of AI is
                  max_tokens: 30
                  temperature: 0.8
                  stream: true

      responses:
        '200':
          description: Success Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompletionResponse'
              examples:
                default-response:
                  summary: Basic Response
                  description: Response example for basic text completion request.
                  value:
                    id: msg_01MMX9dbQ7ZPgjhMhgLPRuCz
                    object: text_completion
                    created: 1773223039
                    model: mco-4
                    choices:
                      - finish_reason: stop
                        index: 0
                        text: "This is a test."
                        logprobs: null
                    usage:
                      completion_tokens: 8
                      prompt_tokens: 12
                      total_tokens: 20
                      completion_tokens_details: null
                      prompt_tokens_details:
                        audio_tokens: null
                        cached_tokens: null
                        text_tokens: null
                        image_tokens: null
                        cached_tokens_details: {}
                      claude_cache_creation_5_m_tokens: 0
                      claude_cache_creation_1_h_tokens: 0
                      web_search_queries: 0

            text/event-stream:
              schema:
                type: string
                description: "Streaming responses are returned in Server-Sent Events format, each event is a JSON data block starting with 'data: ' and ending with 'data: [DONE]'."
              examples:
                streaming-response:
                  summary: Streaming Response Example
                  description: Shows events sent sequentially during streaming text completion.
                  value: |
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"claude-opus-4.6","choices":[{"text":"The","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"claude-opus-4.6","choices":[{"text":" future","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"claude-opus-4.6","choices":[{"text":" of","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"claude-opus-4.6","choices":[{"text":" AI","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"claude-opus-4.6","choices":[{"text":" is","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"claude-opus-4.6","choices":[{"text":" bright","index":0,"finish_reason":null}]}
                    data: {"id":"cmpl-789","object":"text_completion","created":1677652300,"model":"claude-opus-4.6","choices":[{"text":".","index":0,"finish_reason":"length"}]}
                    data: [DONE]
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'

  /v1/messages:
    post:
      tags:
        - chat_completions_anthropic
      summary: Create Message
      description: Create a message using Anthropic Messages-compatible payload.
      operationId: createMessage_anthropic
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - model
                - messages
              properties:
                model:
                  type: string
                messages:
                  type: array
                  items:
                    type: object
                    required:
                      - role
                      - content
                    properties:
                      role:
                        type: string
                      content:
                        oneOf:
                          - type: string
                          - type: array
                            items:
                              type: object
                max_tokens:
                  type: integer
                stream:
                  type: boolean
                  default: false
            examples:
              default:
                summary: Basic
                value:
                  model: claude-opus-4.6
                  messages:
                    - role: user
                      content: Hello
                  max_tokens: 128
      responses:
        '200':
          description: Success Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
              examples:
                default:
                  summary: Basic Response
                  value:
                    id: msg_123
                    type: message
                    role: assistant
                    model: claude-opus-4.6
                    content:
                      - type: text
                        text: Hello! How can I help you today?
                    stop_reason: end_turn
                    usage:
                      input_tokens: 12
                      output_tokens: 9
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'

  # ========== Vector Embeddings ==========
  /v1/embeddings:
    post:
      tags:
        - embeddings_anthropic
      summary: Create Embedding Vectors
      description: Get vector representation for given input. Compatible with OpenAI's Embeddings API.
      operationId: createEmbedding_anthropic
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEmbeddingRequest'
            examples:
              default:
                summary: Basic
                description: Generate embedding vectors for single string input.
                value:
                  model: claude-embed-1
                  input: The quick brown fox jumps over the lazy dog
              multiple-inputs:
                summary: Multiple Inputs
                description: Generate embedding vectors for multiple string inputs.
                value:
                  model: claude-embed-1
                  input:
                    - Hello world
                    - Anthropic is amazing
              base64-format:
                summary: Base64 Format
                description: Return embedding vectors in base64 encoding.
                value:
                  model: claude-embed-1
                  input: Example text
                  encoding_format: base64
              with-dimensions:
                summary: Specify Dimensions
                description: Specify output dimensions.
                value:
                  model: claude-embed-1
                  input: Example text
                  dimensions: 256
      responses:
        '200':
          description: Success Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmbeddingResponse'
              examples:
                default-response:
                  summary: Basic Response
                  description: Response for single input.
                  value:
                    object: list
                    data:
                      - object: embedding
                        embedding:
                          - -0.006929283495992422
                          - -0.005336422007530928
                          - -0.024047505110502243
                        index: 0
                    model: claude-embed-1
                    usage:
                      prompt_tokens: 8
                      total_tokens: 8
                multiple-inputs-response:
                  summary: Multiple Inputs Response
                  description: Response for multiple inputs, containing multiple embedding vectors.
                  value:
                    object: list
                    data:
                      - object: embedding
                        embedding:
                          - 0.1
                          - 0.2
                          - 0.3
                        index: 0
                      - object: embedding
                        embedding:
                          - 0.4
                          - 0.5
                          - 0.6
                        index: 1
                    model: claude-embed-1
                    usage:
                      prompt_tokens: 6
                      total_tokens: 6
                base64-response:
                  summary: Base64 Response
                  description: Embedding vectors are returned in base64 encoding.
                  value:
                    object: list
                    data:
                      - object: embedding
                        embedding: "YmFzZTY0X2VuY29kZWRfZGF0YQ=="
                        index: 0
                    model: claude-embed-1
                    usage:
                      prompt_tokens: 2
                      total_tokens: 2
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'

  # ========== Image Generation ==========
  /v1/images/generations:
    post:
      tags:
        - image_generations_anthropic
      summary: Create Image
      description: Generate images based on text prompts. Compatible with OpenAI's Images API.
      operationId: createImageGeneration_anthropic
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateImageGenerationRequest'
            examples:
              default:
                summary: Basic
                description: Generate a 1024x1024 image.
                value:
                  model: claude-3-opus-20240229
                  prompt: A cute cat sitting on a windowsill
                  'n': 1
                  size: 1024x1024
              hd-quality:
                summary: High Quality
                description: Generate high quality images.
                value:
                  model: claude-3-opus-20240229
                  prompt: A futuristic cityscape at sunset
                  'n': 1
                  quality: hd
                  size: 1792x1024
              b64-json:
                summary: Base64 Format
                description: Return base64 encoded image data.
                value:
                  model: claude-3-opus-20240229
                  prompt: A beautiful landscape
                  'n': 2
                  size: 512x512
                  response_format: b64_json
      responses:
        '200':
          description: Success Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponse'
              examples:
                default-response:
                  summary: Basic Response
                  description: Return complete response containing image URL and optional fields.
                  value:
                    created: 1680000000
                    background: opaque
                    output_format: png
                    quality: high
                    size: 1024x1024
                    data:
                      - url: https://example.com/images/cat.png
                        revised_prompt: A cute cat sitting on a windowsill, looking out at a garden
                    usage:
                      total_tokens: 100
                      input_tokens: 50
                      output_tokens: 50
                      input_tokens_details:
                        text_tokens: 10
                        image_tokens: 40
                b64-response:
                  summary: Base64 Response
                  description: Return response containing base64 encoded image data and optional fields.
                  value:
                    created: 1680000001
                    background: opaque
                    output_format: png
                    quality: high
                    size: 1024x1024
                    data:
                      - b64_json: iVBORw0KGgoAAAANSUhEUgAA...
                        revised_prompt: A beautiful landscape with mountains and a lake
                      - b64_json: iVBORw0KGgoAAAANSUhEUgAA...
                    usage:
                      total_tokens: 200
                      input_tokens: 100
                      output_tokens: 100
                      input_tokens_details:
                        text_tokens: 20
                        image_tokens: 80
            text/event-stream:
              schema:
                type: string
                description: Streaming responses are returned in Server-Sent Events format, each event consists of 'event:' and 'data:' lines.
              examples:
                streaming-response:
                  summary: Streaming Response Example
                  description: Shows intermediate and final events during image generation.
                  value: |
                    event: image_generation.partial_image

                    data: {"type":"image_generation.partial_image","b64_json":"iVBORw0K...","partial_image_index":0}


                    event: image_generation.completed

                    data: {"type":"image_generation.completed","b64_json":"iVBORw0K...","usage":{"total_tokens":100,"input_tokens":50,"output_tokens":50,"input_tokens_details":{"text_tokens":10,"image_tokens":40}}}
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'

  # ========== Image Editing ==========
  /v1/images/edits:
    post:
      tags:
        - image_edits_anthropic
      summary: Edit Image
      description: Create edited images based on original image and text prompts. Compatible with OpenAI's Images API.
      operationId: createImageEdit_anthropic
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateImageEditRequest'
            encoding:
              images:
                style: form
                explode: true
            examples:
              with-mask:
                summary: With Mask
                description: Edit using image, mask and prompt.
                value:
                  model: claude-3-opus-20240229
                  images:
                    - '@person.png'
                  mask: '@mask.png'
                  prompt: Add a hat to the person
                  'n': 1
                  size: 1024x1024
              no-mask:
                summary: Without Mask
                description: Edit using only image and prompt.
                value:
                  model: claude-3-opus-20240229
                  images:
                    - '@body-lotion.png'
                  prompt: Change the background to a beach
                  'n': 1
                  size: 1024x1024
      responses:
        '200':
          description: Success Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponse'
              examples:
                default-response:
                  summary: Edit Response
                  description: Return edited image and related metadata.
                  value:
                    created: 1680000002
                    background: opaque
                    output_format: png
                    quality: high
                    size: 1024x1024
                    data:
                      - url: https://example.com/images/edited.png
                        revised_prompt: A person with a hat, standing in a sunny park
                    usage:
                      total_tokens: 120
                      input_tokens: 60
                      output_tokens: 60
                      input_tokens_details:
                        text_tokens: 12
                        image_tokens: 48
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'

  # ========== Audio Transcription ==========
  /v1/audio/transcriptions:
    post:
      tags:
        - audio_transcriptions_anthropic
      summary: Audio Transcription
      description: Transcribe audio files to text. Compatible with OpenAI's Audio API.
      operationId: createTranscription_anthropic
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateTranscriptionRequest'
            examples:
              default:
                summary: Basic
                description: Transcribe audio file to JSON format.
                value:
                  model: claude-3-opus-20240229
                  file: (binary)
                  response_format: json
              with-timestamps:
                summary: With Timestamps
                description: Get detailed transcription with word-level timestamps.
                value:
                  model: claude-3-opus-20240229
                  file: (binary)
                  response_format: verbose_json
                  timestamp_granularities:
                    - word
              srt-format:
                summary: SRT Subtitles
                description: Return transcription in SRT subtitle format.
                value:
                  model: claude-3-opus-20240229
                  file: (binary)
                  response_format: srt
      responses:
        '200':
          description: Success Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranscriptionResponse'
              examples:
                json-response:
                  summary: JSON Response
                  description: Default JSON format transcription.
                  value:
                    text: Hello, this is a test transcription.
                verbose-json-response:
                  summary: Verbose JSON Response
                  description: Detailed transcription with word-level timestamps.
                  value:
                    task: transcribe
                    language: english
                    duration: 2.95
                    text: Hello, this is a test transcription.
                    words:
                      - word: Hello
                        start: 0.1
                        end: 0.5
                      - word: this
                        start: 0.6
                        end: 0.8
                      - word: is
                        start: 0.9
                        end: 1
                      - word: a
                        start: 1.1
                        end: 1.2
                      - word: test
                        start: 1.3
                        end: 1.8
                      - word: transcription
                        start: 1.9
                        end: 2.8
            application/x-srt:
              schema:
                type: string
                description: Transcription in SRT subtitle format.
              examples:
                srt-response:
                  summary: SRT Response
                  value: |
                    1
                    00:00:00,100 --> 00:00:00,500
                    Hello

                    2
                    00:00:00,600 --> 00:00:00,800
                    this

                    3
                    00:00:00,900 --> 00:00:01,000
                    is

                    4
                    00:00:01,100 --> 00:00:01,200
                    a

                    5
                    00:00:01,300 --> 00:00:01,800
                    test

                    6
                    00:00:01,900 --> 00:00:02,800
                    transcription
            text/plain:
              schema:
                type: string
                description: Transcription in plain text format.
              examples:
                text-response:
                  summary: Plain Text Response
                  value: Hello, this is a test transcription.
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'

components:
  $ref: ./_common.yaml#/components
